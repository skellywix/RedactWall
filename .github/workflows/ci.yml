name: CI
on:
  push: { branches: [ main, master ] }
  pull_request: {}
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - name: Engine copies in sync (shared/ == extension/lib/)
        run: npm run sync-check
      - name: Unit + integration tests
        run: npm test
      - name: Detection eval (held-out precision/recall floors)
        run: node scripts/eval-detect.js --ci
      - name: Semantic model is deterministic (no drift after retrain)
        run: |
          npm run train-semantic
          npm run sync-check
          git diff --exit-code -- shared/detect.js extension/lib/detect.js \
            || (echo "Retraining changed the model — commit the regenerated weights." && exit 1)
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t promptsentinel:ci .
