name: CI
on:
  push:
    branches: [main, master, 'codex/**']
  pull_request: {}
  workflow_dispatch: {}
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Dependency audit
        run: npm audit --omit=dev
      - name: Engine copies in sync
        run: npm run sync-check
      - name: Unit and integration tests
        run: npm test
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Browser E2E tests
        run: npm run test:browser
      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
      - name: Audit chain verifies
        run: node -e "const v=require('./server/db').verifyAuditChain(); console.log(JSON.stringify(v)); if(!v.ok) process.exit(1)"
      - name: Detection eval
        run: node scripts/eval-detect.js --ci
      - name: Semantic model is deterministic
        run: |
          npm run train-semantic
          npm run sync-check
          git diff --exit-code -- detection-engine/detect.js sensors/browser-extension/lib/detect.js \
            || (echo "Retraining changed the model; commit the regenerated weights." && exit 1)
      - name: Tests do not mutate committed config
        run: git diff --exit-code -- config/policy.json
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: docker build -t promptsentinel:ci .
