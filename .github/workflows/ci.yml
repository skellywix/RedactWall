name: CI
on:
  push:
    branches: [main, master, 'codex/**', 'claude/**']
  pull_request: {}
  workflow_dispatch: {}
jobs:
  test:
    name: test (node ${{ matrix.node-version }}, postgres ${{ matrix.postgres }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['22', '24']
        postgres: ['16-alpine']
        include:
          - node-version: '24'
            postgres: '17-alpine'
    services:
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_USER: redactwall
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U redactwall"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            console/package-lock.json
      - run: npm ci
      - name: Console dependencies
        run: npm run console:install
      - name: Console build
        run: npm run console:build
      - name: Native binding smoke
        run: npm run native:check:repair
      - name: Dependency audit
        run: npm audit --omit=dev
      - name: Generated demo guides current
        run: npm run docs:demo-guide:check
      - name: Engine copies in sync
        run: npm run sync-check
      - name: AI domain coverage current
        run: npm run ai-domains:check
      - name: Unit and integration tests
        run: npm test
        env:
          REDACTWALL_TEST_PG_URL: postgresql://redactwall@127.0.0.1:55432/postgres
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Browser E2E tests
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" npm run test:browser
      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts-node${{ matrix.node-version }}-pg${{ matrix.postgres }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
      - name: Audit chain verifies
        run: node -e "const v=require('./server/db').verifyAuditChain(); console.log(JSON.stringify(v)); if(!v.ok) process.exit(1)"
      - name: Detection eval
        run: node scripts/eval-detect.js --ci
      - name: Semantic model is deterministic
        run: |
          npm run train-semantic
          npm run sync-check
          git diff --exit-code -- detection-engine/detect.js sensors/browser-extension/lib/detect.js \
            || (echo "Retraining changed the model; commit the regenerated weights." && exit 1)
      - name: Tests do not mutate committed config
        run: git diff --exit-code -- config/policy.json
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: docker build -t redactwall:ci .
      # The gateway profile (docker-compose.yml) runs `node gateway/server.js`
      # from this same image; prove gateway/ shipped in the runtime stage.
      - name: Gateway profile smoke
        run: |
          docker run -d --name rw-gateway -e GATEWAY_PORT=4100 redactwall:ci node gateway/server.js
          ok=0
          for i in $(seq 1 20); do
            if docker exec rw-gateway node -e "fetch('http://localhost:4100/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"; then ok=1; break; fi
            sleep 1
          done
          docker logs rw-gateway
          docker rm -f rw-gateway
          [ "$ok" = "1" ] || { echo "gateway /healthz never came up (gateway/ missing from runtime image?)"; exit 1; }
