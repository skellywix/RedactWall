services:
  redactwall:
    build: .
    image: redactwall:local
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    environment:
      PORT: 4000
      NODE_ENV: ${NODE_ENV:-production}
      HTTPS: ${HTTPS:-true}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      REDACTWALL_SAAS_MODE: ${REDACTWALL_SAAS_MODE:-}
      REDACTWALL_TENANT_ID: ${REDACTWALL_TENANT_ID:-}
      REDACTWALL_SEAT_LIMIT: ${REDACTWALL_SEAT_LIMIT:-}
      REDACTWALL_REQUIRE_TENANT_CONTEXT: ${REDACTWALL_REQUIRE_TENANT_CONTEXT:-}
      REDACTWALL_REQUIRE_USER_IDENTITY: ${REDACTWALL_REQUIRE_USER_IDENTITY:-}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe!2026}
      ADMIN_TOTP_SECRET: ${ADMIN_TOTP_SECRET:-}
      AUDITOR_USER: ${AUDITOR_USER:-}
      AUDITOR_PASSWORD: ${AUDITOR_PASSWORD:-}
      REDACTWALL_SECRET: ${REDACTWALL_SECRET:-}
      REDACTWALL_DATA_KEY: ${REDACTWALL_DATA_KEY:-}
      INGEST_API_KEY: ${INGEST_API_KEY:-}
      REDACTWALL_INGEST_API_KEY: ${REDACTWALL_INGEST_API_KEY:-}
      REDACTWALL_POLICY_PATH: ${REDACTWALL_POLICY_PATH:-/data/policy.json}
      REDACTWALL_CUSTOM_DETECTORS_PATH: ${REDACTWALL_CUSTOM_DETECTORS_PATH:-/data/custom-detectors.json}
      SCIM_BEARER_TOKEN: ${SCIM_BEARER_TOKEN:-}
      REDACTWALL_SCIM_BEARER_TOKEN: ${REDACTWALL_SCIM_BEARER_TOKEN:-}
      REDACTWALL_REQUEST_TIMEOUT_MS: ${REDACTWALL_REQUEST_TIMEOUT_MS:-}
      SIEM_WEBHOOK_URL: ${SIEM_WEBHOOK_URL:-}
      SIEM_WEBHOOK_TOKEN: ${SIEM_WEBHOOK_TOKEN:-}
      SIEM_ALERT_MIN_RISK: ${SIEM_ALERT_MIN_RISK:-25}
      SIEM_ALERT_MIN_SEVERITY: ${SIEM_ALERT_MIN_SEVERITY:-3}
      REDACTWALL_DB_PATH: /data/redactwall.db
    ports:
      - "${PORT:-4000}:4000"
    volumes:
      - redactwall-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:'+(process.env.PORT||4000)+'/readyz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 4s
      start_period: 5s
      retries: 3
    stop_grace_period: 30s
    restart: unless-stopped

  # Optional AI Gateway: an OpenAI-compatible reverse proxy that gates every
  # prompt and scans every response through the control plane above. Enable with
  # `docker compose --profile gateway up`. Point applications/agents at it
  # instead of the raw provider; it fails closed when the control plane is down.
  gateway:
    build: .
    image: redactwall:local
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    command: ["node", "gateway/server.js"]
    profiles: ["gateway"]
    depends_on:
      - redactwall
    environment:
      GATEWAY_PORT: 4100
      GATEWAY_CONTROL_PLANE_URL: ${GATEWAY_CONTROL_PLANE_URL:-http://redactwall:4000}
      INGEST_API_KEY: ${INGEST_API_KEY:-}
      REDACTWALL_INGEST_API_KEY: ${REDACTWALL_INGEST_API_KEY:-}
      GATEWAY_PROVIDER: ${GATEWAY_PROVIDER:-openai}
      GATEWAY_UPSTREAM_URL: ${GATEWAY_UPSTREAM_URL:-}
      GATEWAY_UPSTREAM_API_KEY: ${GATEWAY_UPSTREAM_API_KEY:-}
      GATEWAY_REQUIRE_AGENT_TOKEN: ${GATEWAY_REQUIRE_AGENT_TOKEN:-true}
      GATEWAY_RATE_LIMIT_PER_MIN: ${GATEWAY_RATE_LIMIT_PER_MIN:-120}
      GATEWAY_AGENT_TOKENS_PATH: /data/gateway-agent-tokens.json
      REDACTWALL_DATA_DIR: /data
    ports:
      - "${GATEWAY_PORT:-4100}:4100"
    volumes:
      - redactwall-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4100/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 4s
      start_period: 5s
      retries: 3
    stop_grace_period: 15s
    restart: unless-stopped

volumes:
  redactwall-data:
