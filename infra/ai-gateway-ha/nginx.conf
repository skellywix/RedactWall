events {}

http {
  access_log off;
  error_log /dev/stderr warn;
  resolver 127.0.0.11 valid=5s ipv6=off;

  upstream redactwall_ai_gateway {
    zone redactwall_ai_gateway 64k;
    least_conn;
    server ai-gateway-a:4182 resolve max_fails=2 fail_timeout=10s;
    server ai-gateway-b:4182 resolve max_fails=2 fail_timeout=10s;
  }

  server {
    listen 4182;
    client_max_body_size 20m;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    location / {
      proxy_pass http://redactwall_ai_gateway;
      proxy_http_version 1.1;
      proxy_connect_timeout 2s;
      proxy_next_upstream error timeout;
      proxy_next_upstream_tries 2;
      proxy_next_upstream_timeout 5s;
      proxy_buffering off;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-Id $request_id;
      proxy_set_header X-RedactWall-Request-Id $request_id;
    }
  }
}
