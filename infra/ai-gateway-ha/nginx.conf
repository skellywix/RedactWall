events {}

http {
  access_log off;
  error_log /dev/stderr warn;

  upstream promptwall_ai_gateway {
    least_conn;
    server ai-gateway-a:4182 max_fails=2 fail_timeout=10s;
    server ai-gateway-b:4182 max_fails=2 fail_timeout=10s;
  }

  server {
    listen 4182;
    client_max_body_size 20m;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    location / {
      proxy_pass http://promptwall_ai_gateway;
      proxy_http_version 1.1;
      proxy_buffering off;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-Id $request_id;
      proxy_set_header X-PromptWall-Request-Id $request_id;
    }
  }
}
