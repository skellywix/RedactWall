AWSTemplateFormatVersion: '2010-09-09'
Description: RedactWall customer-silo SaaS stack using ALB, EC2, Docker, Secrets Manager, and local EBS-backed SQLite storage.

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC for the public load balancer and RedactWall host.
  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: At least two public subnets for the internet-facing load balancer.
  InstanceSubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet for the RedactWall host. It must have outbound internet access to pull the image.
  InstanceAvailabilityZone:
    Type: AWS::EC2::AvailabilityZone::Name
    Description: Availability Zone of InstanceSubnetId. The retained customer data volume is pinned here.
  DataVolumeId:
    Type: String
    AllowedPattern: '^vol-[a-f0-9]{8,17}$'
    ConstraintDescription: Must be the exact retained EBS volume id from the customer durable-data stack.
    Description: Pre-created retained encrypted evidence volume. This application stack never creates or replaces the data authority.
  DataStackName:
    Type: String
    AllowedPattern: '^[A-Za-z][-A-Za-z0-9]{0,127}$'
    Description: Exact companion CloudFormation stack that owns DataVolumeId.
  SourceDataVolumeId:
    Type: String
    Default: ''
    AllowedPattern: '^$|^vol-[a-f0-9]{8,17}$'
    ConstraintDescription: Empty for a fresh volume, or the exact prior marker volume id for an explicit snapshot restore.
    Description: One-time continuity proof for a volume restored from a snapshot. It never authorizes formatting.
  DesiredConfigSha256:
    Type: String
    AllowedPattern: '^[a-f0-9]{64}$'
    Description: Wrapper-computed digest of every explicit runtime-rendering input.
  DeploymentTemplateUrl:
    Type: String
    AllowedPattern: '^https://[a-z0-9-]{3,63}\.s3\.[a-z0-9-]+\.amazonaws\.com(?:\.cn)?/[A-Za-z0-9%._~/-]{1,900}\?versionId=[A-Za-z0-9%._~+-]{1,1200}$'
    Description: Exact version-bound S3 template URL already checksum-verified by the deployment wrapper.
  DeploymentTemplateSha256:
    Type: String
    AllowedPattern: '^[a-f0-9]{64}$'
    Description: SHA-256 of the exact deployed CloudFormation template bytes.
  DeploymentTemplateBytes:
    Type: Number
    MinValue: 1
    MaxValue: 1048576
    Description: Exact byte length of the deployed CloudFormation template.
  DeploymentProtocolSha256:
    Type: String
    AllowedPattern: '^[a-f0-9]{64}$'
    Description: SHA-256 of the root deployment protocol materialized by cfn-init.
  RecoveryBackupName:
    Type: String
    Default: ''
    AllowedPattern: '^$|^[A-Za-z0-9._-]{1,180}$'
    Description: Exact authenticated maintenance backup basename used only for explicit rollback recovery.
  RecoverySetId:
    Type: String
    Default: ''
    AllowedPattern: '^$|^[a-f0-9]{32}$'
    Description: Exact root-owned retained maintenance recovery directory id.
  RecoveryManifestName:
    Type: String
    Default: ''
    AllowedPattern: '^$|^[A-Za-z0-9._-]{1,180}$'
    Description: Exact authenticated maintenance manifest basename paired with RecoveryBackupName.
  ImageUri:
    Type: String
    MinLength: 1
    AllowedPattern: '^[0-9]{12}\.dkr\.ecr\.[a-z0-9-]+\.amazonaws\.com(?:\.cn)?/[a-z0-9]+(?:[._/-][a-z0-9]+)*@sha256:[a-f0-9]{64}$'
    ConstraintDescription: Must be a complete private ECR image URI pinned to a sha256 digest.
    Description: Immutable ECR image URI, including the sha256 digest.
  SecretArn:
    Type: String
    MinLength: 1
    AllowedPattern: '^arn:(?:aws|aws-us-gov|aws-cn):secretsmanager:[a-z0-9-]+:[0-9]{12}:secret:[A-Za-z0-9/_+=.@-]{1,512}$'
    ConstraintDescription: Must be a complete Secrets Manager secret ARN with no whitespace or shell metacharacters.
    Description: Immutable customer configuration secret with the signed license, production public trust anchor, required runtime secrets, and any complete optional identity, SIEM, or connected-license groups.
  LicenseSecretVersionId:
    Type: String
    MinLength: 32
    MaxLength: 64
    AllowedPattern: '^[A-Za-z0-9-]{32,64}$'
    ConstraintDescription: Must be the exact immutable Secrets Manager VersionId that contains the customer license and runtime secrets.
    Description: Non-secret Secrets Manager version identifier. Changing it is the deployment trigger for a rotated customer license.
  TenantId:
    Type: String
    AllowedPattern: '^[a-z0-9][a-z0-9_-]{1,62}$'
    Description: Lowercase customer tenant slug, for example cu-acme.
  DeploymentId:
    Type: String
    AllowedPattern: '^dep_[a-f0-9]{32}$'
    ConstraintDescription: Must be the exact immutable vendor-issued deployment identity.
    Description: Connected customer deployment identity issued during Owner enrollment.
  CertificateArn:
    Type: String
    MinLength: 1
    Description: Required ACM certificate ARN. HTTP always redirects to the HTTPS listener.
  PublicHostname:
    Type: String
    MinLength: 1
    AllowedPattern: '^(?=.{1,253}$)(?:[A-Za-z0-9](?:[A-Za-z0-9-]{0,61}[A-Za-z0-9])?\.)+[A-Za-z](?:[A-Za-z0-9-]{0,61}[A-Za-z0-9])?$'
    ConstraintDescription: Must be a DNS hostname without a scheme, port, path, query, or fragment.
    Description: Customer DNS hostname covered by CertificateArn, without a scheme.
  InstanceType:
    Type: String
    Default: t3.small
    AllowedValues:
      - t3.small
      - t3.medium
      - t3.large
      - m7i.large
    Description: EC2 size for the customer-silo control plane.
  RootVolumeGb:
    Type: Number
    Default: 20
    MinValue: 20
    MaxValue: 500
    Description: Encrypted replaceable operating-system root volume size. Customer evidence lives on the external retained DataVolumeId.
  AmiId:
    Type: AWS::EC2::Image::Id
    Description: Immutable AMI id selected during initial creation. Ordinary updates must not replace AppInstance.

Rules:
  RecoveryArtifactPair:
    Assertions:
      - Assert:
          Fn::Or:
            - Fn::And:
                - Fn::Equals: [!Ref RecoveryBackupName, '']
                - Fn::Equals: [!Ref RecoveryManifestName, '']
                - Fn::Equals: [!Ref RecoverySetId, '']
            - Fn::And:
                - Fn::Not: [Fn::Equals: [!Ref RecoveryBackupName, '']]
                - Fn::Not: [Fn::Equals: [!Ref RecoveryManifestName, '']]
                - Fn::Not: [Fn::Equals: [!Ref RecoverySetId, '']]
        AssertDescription: RecoverySetId, RecoveryBackupName, and RecoveryManifestName must be supplied together or all empty.

Resources:
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RedactWall ALB ingress
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RedactWall app host ingress from ALB only
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 4000
          ToPort: 4000
          SourceSecurityGroupId: !Ref AlbSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  AppLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      RetentionInDays: 90

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
      Policies:
        - PolicyName: RedactWallRuntimeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref SecretArn
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                Resource: !Sub ${AppLogGroup.Arn}:*
              - Effect: Allow
                Action:
                  - ec2:DescribeVolumes
                Resource: '*'
              - Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                Resource: !Sub arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${DataStackName}/*

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  AppInstance:
    Type: AWS::EC2::Instance
    Metadata:
      AWS::CloudFormation::Init:
        config:
          files:
            /usr/local/sbin/redactwall-deploy:
              content: !Sub |
                #!/bin/bash
                set -euo pipefail

                DEPLOY_LOCK=/run/redactwall-deploy.lock
                if [ "$(printenv REDACTWALL_DEPLOY_LOCK_HELD 2>/dev/null || true)" = 1 ]; then
                  : # redactwall-cfn-update owns the same lock across cfn-init and this command.
                else
                  exec 9>"$DEPLOY_LOCK"
                  flock 9
                fi
                MAINTENANCE_LATCH=/etc/redactwall/maintenance-latch.json
                if [ -L "$MAINTENANCE_LATCH" ] || [ -e "$MAINTENANCE_LATCH" ]; then
                  echo "A maintenance latch is active; ordinary deployment is blocked" >&2
                  exit 1
                fi
                DATA_VOLUME_ROOT=/var/lib/redactwall
                APP_DATA_DIR=/var/lib/redactwall/runtime
                RECOVERY_PARENT=/var/lib/redactwall/recovery
                DATA_VOLUME_MARKER=/var/lib/redactwall/.redactwall-volume-identity.json
                MOUNTED_DATA_SOURCE=$(readlink -f "$(findmnt -n -o SOURCE --target "$DATA_VOLUME_ROOT" 2>/dev/null || true)" 2>/dev/null || true)
                MOUNTED_DATA_SERIAL=$(lsblk -ndo SERIAL "$MOUNTED_DATA_SOURCE" 2>/dev/null | tr -d '-' | tr '[:upper:]' '[:lower:]')
                EXPECTED_DATA_SERIAL=$(printf '%s' '${DataVolumeId}' | tr -d '-' | tr '[:upper:]' '[:lower:]')
                if ! mountpoint -q "$DATA_VOLUME_ROOT" \
                  || [ -z "$MOUNTED_DATA_SOURCE" ] || [ "$MOUNTED_DATA_SERIAL" != "$EXPECTED_DATA_SERIAL" ]; then
                  echo "The retained RedactWall data volume is not mounted at the authoritative path" >&2
                  exit 1
                fi
                if [ -L "$DATA_VOLUME_MARKER" ] || [ ! -f "$DATA_VOLUME_MARKER" ] \
                  || [ "$(stat -c '%u:%g:%a:%h' "$DATA_VOLUME_MARKER")" != '0:0:600:1' ] \
                  || ! jq -e --arg volumeId '${DataVolumeId}' --arg sourceVolumeId '${SourceDataVolumeId}' --arg tenantId '${TenantId}' \
                    --arg filesystemUuid "$(findmnt -n -o UUID --target "$DATA_VOLUME_ROOT")" \
                    'type == "object"
                     and (($sourceVolumeId == "" and .version == 3 and (keys | sort) == ["filesystemUuid","tenantId","version","volumeId"])
                       or ($sourceVolumeId != "" and .version == 4 and (keys | sort) == ["filesystemUuid","sourceVolumeId","tenantId","version","volumeId"] and .sourceVolumeId == $sourceVolumeId))
                     and .volumeId == $volumeId and .tenantId == $tenantId and .filesystemUuid == $filesystemUuid' \
                    "$DATA_VOLUME_MARKER" >/dev/null; then
                  echo "The retained RedactWall data-volume identity contract is invalid" >&2
                  exit 1
                fi
                if [ -L "$APP_DATA_DIR" ] || [ ! -d "$APP_DATA_DIR" ] \
                  || [ "$(stat -c '%u:%g:%a' "$APP_DATA_DIR")" != '1000:1000:700' ]; then
                  echo "The existing RedactWall runtime directory is not trusted private state" >&2
                  exit 1
                fi
                if [ -e /etc/redactwall ] || [ -L /etc/redactwall ]; then
                  if [ -L /etc/redactwall ] || [ ! -d /etc/redactwall ] \
                    || [ "$(stat -c '%u:%g:%a' /etc/redactwall)" != '0:0:700' ]; then
                    echo "The existing RedactWall deployment directory is not trusted private state" >&2
                    exit 1
                  fi
                else
                  install -d -m 700 -o root -g root /etc/redactwall
                fi
                if [ -e /etc/redactwall/license ] || [ -L /etc/redactwall/license ]; then
                  if [ -L /etc/redactwall/license ] || [ ! -d /etc/redactwall/license ] \
                    || [ "$(stat -c '%u:%g:%a' /etc/redactwall/license)" != '0:0:700' ]; then
                    echo "The host-managed license directory is not trusted root-owned state" >&2
                    exit 1
                  fi
                else
                  install -d -m 700 -o root -g root /etc/redactwall/license
                fi
                DEPLOY_DEVICE=$(stat -c '%d' /etc/redactwall)
                if [ "$DEPLOY_DEVICE" = 0 ]; then
                  echo "The private deployment journal has no stable filesystem identity" >&2
                  exit 1
                fi

                LICENSE_FINAL=/etc/redactwall/license/redactwall.lic
                DEPLOY_STATE_DIR=/etc/redactwall
                DEPLOY_JOURNAL=/etc/redactwall/license-deploy-journal.json
                DEPLOY_COMMITTED=0
                COMMIT_ATTEMPTED=0
                ROLLBACK_RECOVERED=0
                COMMITTED_CLEANUP_PENDING=0
                TX_ID=
                TX_PHASE=
                PREVIOUS_CONTAINER_ID=
                PREVIOUS_CONTAINER_RUNNING=false
                PREVIOUS_IMAGE_URI=
                CANDIDATE_CONTAINER_ID=
                PRIOR_LICENSE_JSON=null
                CANDIDATE_LICENSE_JSON=null
                LICENSE_CHANGED=false
                DESIRED_IMAGE_URI='${ImageUri}'
                DESIRED_SECRET_ARN='${SecretArn}'
                DESIRED_LICENSE_SECRET_VERSION_ID='${LicenseSecretVersionId}'
                DESIRED_CONFIG_SHA256='${DesiredConfigSha256}'
                DESIRED_TEMPLATE_SHA256='${DeploymentTemplateSha256}'
                DESIRED_PROTOCOL_SHA256='${DeploymentProtocolSha256}'
                IMAGE_URI="$DESIRED_IMAGE_URI"
                SECRET_ARN="$DESIRED_SECRET_ARN"
                LICENSE_SECRET_VERSION_ID="$DESIRED_LICENSE_SECRET_VERSION_ID"
                CONFIG_SHA256="$DESIRED_CONFIG_SHA256"
                TEMPLATE_SHA256="$DESIRED_TEMPLATE_SHA256"
                PROTOCOL_SHA256="$DESIRED_PROTOCOL_SHA256"
                TX_IMAGE_URI="$DESIRED_IMAGE_URI"
                TX_SECRET_ARN="$DESIRED_SECRET_ARN"
                TX_LICENSE_SECRET_VERSION_ID="$DESIRED_LICENSE_SECRET_VERSION_ID"
                TX_CONFIG_SHA256="$DESIRED_CONFIG_SHA256"
                TX_TEMPLATE_SHA256="$DESIRED_TEMPLATE_SHA256"
                TX_PROTOCOL_SHA256="$DESIRED_PROTOCOL_SHA256"
                RECOVERY_BACKUP_NAME=
                RECOVERY_MANIFEST_NAME=
                APPLIED_STATE=/etc/redactwall/applied-deployment.json
                ASSERT_APPLIED_COMMAND=/usr/local/sbin/redactwall-assert-applied

                path_present() {
                  [ -e "$1" ] || [ -L "$1" ]
                }

                close_fd() {
                  eval "exec $1<&-"
                }

                desired_contract_applied() {
                  [ -x "$ASSERT_APPLIED_COMMAND" ] \
                    && "$ASSERT_APPLIED_COMMAND" \
                      --image-uri "$DESIRED_IMAGE_URI" --secret-version-id "$DESIRED_LICENSE_SECRET_VERSION_ID" \
                      --config-sha256 "$DESIRED_CONFIG_SHA256" --template-sha256 "$DESIRED_TEMPLATE_SHA256" \
                      --protocol-sha256 "$DESIRED_PROTOCOL_SHA256" >/dev/null 2>&1
                }

                reset_transaction_contract_to_desired() {
                  TX_ID=
                  TX_PHASE=
                  PREVIOUS_CONTAINER_ID=
                  PREVIOUS_CONTAINER_RUNNING=false
                  PREVIOUS_IMAGE_URI=
                  CANDIDATE_CONTAINER_ID=
                  PRIOR_LICENSE_JSON=null
                  CANDIDATE_LICENSE_JSON=null
                  LICENSE_CHANGED=false
                  RECOVERY_BACKUP_NAME=
                  RECOVERY_MANIFEST_NAME=
                  LICENSE_STAGE=
                  LICENSE_ROLLBACK=
                  LICENSE_RETIRED=
                  PREVIOUS_CONTAINER_NAME=
                  CANDIDATE_CONTAINER_NAME=
                  RECOVERY_DIR=
                  DEPLOY_COMMITTED=0
                  COMMIT_ATTEMPTED=0
                  ROLLBACK_RECOVERED=0
                  COMMITTED_CLEANUP_PENDING=0
                  IMAGE_URI="$DESIRED_IMAGE_URI"
                  SECRET_ARN="$DESIRED_SECRET_ARN"
                  LICENSE_SECRET_VERSION_ID="$DESIRED_LICENSE_SECRET_VERSION_ID"
                  CONFIG_SHA256="$DESIRED_CONFIG_SHA256"
                  TEMPLATE_SHA256="$DESIRED_TEMPLATE_SHA256"
                  PROTOCOL_SHA256="$DESIRED_PROTOCOL_SHA256"
                  TX_IMAGE_URI="$DESIRED_IMAGE_URI"
                  TX_SECRET_ARN="$DESIRED_SECRET_ARN"
                  TX_LICENSE_SECRET_VERSION_ID="$DESIRED_LICENSE_SECRET_VERSION_ID"
                  TX_CONFIG_SHA256="$DESIRED_CONFIG_SHA256"
                  TX_TEMPLATE_SHA256="$DESIRED_TEMPLATE_SHA256"
                  TX_PROTOCOL_SHA256="$DESIRED_PROTOCOL_SHA256"
                }

                artifact_json() {
                  artifact_path=$1
                  expected_uid=$2
                  expected_gid=$3
                  expected_mode=$4
                  max_bytes=$5
                  if [ -L "$artifact_path" ] || [ ! -f "$artifact_path" ]; then return 1; fi
                  exec {artifact_fd}< "$artifact_path" || return 1
                  artifact_handle="/proc/$BASHPID/fd/$artifact_fd"
                  handle_before=$(stat -Lc '%d|%i|%h|%s|%u|%g|%a|%y|%z' -- "$artifact_handle") || {
                    close_fd "$artifact_fd"
                    return 1
                  }
                  path_before=$(stat -c '%d|%i|%h|%s|%u|%g|%a|%y|%z' -- "$artifact_path") || {
                    close_fd "$artifact_fd"
                    return 1
                  }
                  if [ "$handle_before" != "$path_before" ]; then
                    close_fd "$artifact_fd"
                    return 1
                  fi
                  IFS='|' read -r artifact_dev artifact_ino artifact_nlink artifact_size artifact_uid artifact_gid artifact_mode artifact_mtime artifact_ctime <<< "$handle_before"
                  if [ "$artifact_dev" = 0 ] || [ "$artifact_ino" = 0 ] \
                    || [ "$artifact_nlink" != 1 ] || [ "$artifact_uid" != "$expected_uid" ] \
                    || [ "$artifact_gid" != "$expected_gid" ] || [ "$artifact_mode" != "$expected_mode" ] \
                    || [ "$artifact_size" -gt "$max_bytes" ]; then
                    close_fd "$artifact_fd"
                    return 1
                  fi
                  artifact_sha=$(sha256sum -- "$artifact_handle" | awk '{print $1}') || {
                    close_fd "$artifact_fd"
                    return 1
                  }
                  handle_after=$(stat -Lc '%d|%i|%h|%s|%u|%g|%a|%y|%z' -- "$artifact_handle") || {
                    close_fd "$artifact_fd"
                    return 1
                  }
                  path_after=$(stat -c '%d|%i|%h|%s|%u|%g|%a|%y|%z' -- "$artifact_path") || {
                    close_fd "$artifact_fd"
                    return 1
                  }
                  close_fd "$artifact_fd"
                  if [ "$handle_before" != "$handle_after" ] || [ "$handle_before" != "$path_after" ] \
                    || ! [[ "$artifact_sha" =~ ^[a-f0-9]{64}$ ]]; then return 1; fi
                  jq -cn \
                    --arg dev "$artifact_dev" --arg ino "$artifact_ino" --arg nlink "$artifact_nlink" \
                    --arg size "$artifact_size" --arg uid "$artifact_uid" --arg gid "$artifact_gid" \
                    --arg mode "$artifact_mode" --arg sha256 "$artifact_sha" \
                    '{dev:$dev,ino:$ino,nlink:$nlink,size:$size,uid:$uid,gid:$gid,mode:$mode,sha256:$sha256}'
                }

                artifact_matches() {
                  match_path=$1
                  expected_json=$2
                  match_uid=$3
                  match_gid=$4
                  match_mode=$5
                  match_max=$6
                  current_json=$(artifact_json "$match_path" "$match_uid" "$match_gid" "$match_mode" "$match_max") || return 1
                  jq -en --argjson current "$current_json" --argjson expected "$expected_json" '$current == $expected' >/dev/null
                }

                same_license_bytes() {
                  left_json=$1
                  right_json=$2
                  jq -en --argjson left "$left_json" --argjson right "$right_json" \
                    '$left.size == $right.size and $left.sha256 == $right.sha256' >/dev/null
                }

                sync_parent() {
                  sync -f -- "$(dirname -- "$1")"
                }

                remove_exact_private_artifact() {
                  remove_path=$1
                  remove_json=$2
                  if ! path_present "$remove_path"; then return 0; fi
                  artifact_matches "$remove_path" "$remove_json" 1000 1000 400 65536 || return 1
                  rm -- "$remove_path" || return 1
                  if path_present "$remove_path"; then return 1; fi
                  sync_parent "$remove_path"
                }

                move_exact_to_private() {
                  move_source=$1
                  move_destination=$2
                  move_json=$3
                  if path_present "$move_destination" \
                    || ! artifact_matches "$move_source" "$move_json" 1000 1000 400 65536; then return 1; fi
                  mv -nT -- "$move_source" "$move_destination" || return 1
                  if path_present "$move_source" \
                    || ! artifact_matches "$move_destination" "$move_json" 1000 1000 400 65536; then
                    if ! path_present "$move_source" && path_present "$move_destination"; then
                      mv -nT -- "$move_destination" "$move_source" >/dev/null 2>&1 || true
                    fi
                    return 1
                  fi
                  sync_parent "$move_source"
                  sync_parent "$move_destination"
                }

                publish_exact_private() {
                  publish_source=$1
                  publish_destination=$2
                  publish_json=$3
                  if path_present "$publish_destination" \
                    || ! artifact_matches "$publish_source" "$publish_json" 1000 1000 400 65536; then return 1; fi
                  mv -nT -- "$publish_source" "$publish_destination" || return 1
                  if path_present "$publish_source" \
                    || ! artifact_matches "$publish_destination" "$publish_json" 1000 1000 400 65536; then return 1; fi
                  sync_parent "$publish_source"
                  sync_parent "$publish_destination"
                }

                transaction_paths() {
                  LICENSE_STAGE="$DEPLOY_STATE_DIR/license.stage.$TX_ID"
                  LICENSE_ROLLBACK="$DEPLOY_STATE_DIR/license.rollback.$TX_ID"
                  LICENSE_RETIRED="$DEPLOY_STATE_DIR/license.retired.$TX_ID"
                  PREVIOUS_CONTAINER_NAME="redactwall-previous-$TX_ID"
                  CANDIDATE_CONTAINER_NAME="redactwall-candidate-$TX_ID"
                  RECOVERY_DIR="$RECOVERY_PARENT/$TX_ID"
                }

                journal_write() {
                  TX_PHASE=$1
                  journal_tmp=$(mktemp "$DEPLOY_STATE_DIR/.license-deploy-journal.XXXXXX")
                  jq -cn \
                    --arg tx "$TX_ID" --arg phase "$TX_PHASE" \
                    --arg imageUri "$TX_IMAGE_URI" \
                    --arg secretArn "$TX_SECRET_ARN" --arg desiredConfigSha256 "$TX_CONFIG_SHA256" \
                    --arg templateSha256 "$TX_TEMPLATE_SHA256" --arg protocolSha256 "$TX_PROTOCOL_SHA256" \
                    --arg secretVersionId "$TX_LICENSE_SECRET_VERSION_ID" \
                    --arg previousContainerId "$PREVIOUS_CONTAINER_ID" \
                    --arg previousImageUri "$PREVIOUS_IMAGE_URI" \
                    --argjson previousContainerRunning "$PREVIOUS_CONTAINER_RUNNING" \
                    --arg candidateContainerId "$CANDIDATE_CONTAINER_ID" \
                    --argjson priorLicense "$PRIOR_LICENSE_JSON" \
                    --argjson candidateLicense "$CANDIDATE_LICENSE_JSON" \
                    --argjson licenseChanged "$LICENSE_CHANGED" \
                    --arg recoveryBackupName "$RECOVERY_BACKUP_NAME" --arg recoveryManifestName "$RECOVERY_MANIFEST_NAME" \
                    '{version:1,tx:$tx,phase:$phase,imageUri:$imageUri,secretArn:$secretArn,
                      secretVersionId:$secretVersionId,desiredConfigSha256:$desiredConfigSha256,
                      templateSha256:$templateSha256,protocolSha256:$protocolSha256,
                      previousContainerId:$previousContainerId,
                      previousImageUri:$previousImageUri,
                      previousContainerRunning:$previousContainerRunning,
                      candidateContainerId:$candidateContainerId,
                      priorLicense:$priorLicense,candidateLicense:$candidateLicense,
                      licenseChanged:$licenseChanged,recoveryBackupName:$recoveryBackupName,
                      recoveryManifestName:$recoveryManifestName}' > "$journal_tmp"
                  chmod 600 "$journal_tmp"
                  sync -f -- "$journal_tmp"
                  mv -fT -- "$journal_tmp" "$DEPLOY_JOURNAL"
                  sync -f -- "$DEPLOY_STATE_DIR"
                  if [ "$(printenv REDACTWALL_DEPLOY_TEST_CRASH_AFTER 2>/dev/null || true)" = "$TX_PHASE" ]; then
                    kill -KILL "$BASHPID"
                  fi
                }

                valid_snapshot_json() {
                  jq -e '
                    type == "object"
                    and (keys | sort) == ["dev","gid","ino","mode","nlink","sha256","size","uid"]
                    and all(.dev,.ino,.nlink,.size,.uid,.gid,.mode,.sha256; type == "string")
                    and (.dev | test("^[1-9][0-9]*$")) and (.ino | test("^[1-9][0-9]*$"))
                    and .nlink == "1" and (.size | test("^[0-9]+$"))
                    and .uid == "1000" and .gid == "1000" and .mode == "400"
                    and (.sha256 | test("^[a-f0-9]{64}$"))
                  ' >/dev/null
                }

                journal_load() {
                  journal_before=$(artifact_json "$DEPLOY_JOURNAL" 0 0 600 32768) || return 1
                  if [ "$(printf '%s' "$journal_before" | jq -r '.dev')" != "$DEPLOY_DEVICE" ]; then return 1; fi
                  journal_text=$(cat -- "$DEPLOY_JOURNAL") || return 1
                  artifact_matches "$DEPLOY_JOURNAL" "$journal_before" 0 0 600 32768 || return 1
                  printf '%s' "$journal_text" | jq -e '
                    type == "object"
                    and (keys | sort) == ["candidateContainerId","candidateLicense","desiredConfigSha256","imageUri","licenseChanged","phase","previousContainerId","previousContainerRunning","previousImageUri","priorLicense","protocolSha256","recoveryBackupName","recoveryManifestName","secretArn","secretVersionId","templateSha256","tx","version"]
                    and .version == 1
                    and (.tx | type == "string" and test("^[a-f0-9]{32}$"))
                    and (.imageUri | type == "string" and test("^[0-9]{12}\\.dkr\\.ecr\\.[a-z0-9-]+\\.amazonaws\\.com(?:\\.cn)?/[a-z0-9]+(?:[._/-][a-z0-9]+)*@sha256:[a-f0-9]{64}$"))
                    and (.secretArn | type == "string" and test("^arn:(aws|aws-us-gov|aws-cn):secretsmanager:[a-z0-9-]+:[0-9]{12}:secret:[A-Za-z0-9/_+=.@-]{1,512}$"))
                    and (.desiredConfigSha256 | type == "string" and test("^[a-f0-9]{64}$"))
                    and (.templateSha256 | type == "string" and test("^[a-f0-9]{64}$"))
                    and (.protocolSha256 | type == "string" and test("^[a-f0-9]{64}$"))
                    and (.phase == "prepared" or .phase == "previous_moved" or .phase == "prior_secured"
                      or .phase == "candidate_published" or .phase == "license_unchanged"
                      or .phase == "candidate_created" or .phase == "candidate_started"
                      or .phase == "candidate_ready" or .phase == "candidate_named" or .phase == "committed")
                    and (.secretVersionId | type == "string" and test("^[A-Za-z0-9-]{32,64}$"))
                    and (.previousContainerId | type == "string" and test("^$|^[a-f0-9]{64}$"))
                    and (.previousImageUri | type == "string" and test("^$|^[0-9]{12}\\.dkr\\.ecr\\.[a-z0-9-]+\\.amazonaws\\.com(?:\\.cn)?/[a-z0-9]+(?:[._/-][a-z0-9]+)*@sha256:[a-f0-9]{64}$"))
                    and (.recoveryBackupName | type == "string" and test("^$|^[A-Za-z0-9._-]{1,180}$"))
                    and (.recoveryManifestName | type == "string" and test("^$|^[A-Za-z0-9._-]{1,180}$"))
                    and ((.previousContainerId == "" and .previousImageUri == "" and .recoveryBackupName == "" and .recoveryManifestName == "")
                      or (.previousContainerId != "" and .previousImageUri != "" and .recoveryBackupName != "" and .recoveryManifestName != ""))
                    and (.candidateContainerId | type == "string" and test("^$|^[a-f0-9]{64}$"))
                    and (.previousContainerRunning | type == "boolean")
                    and (.licenseChanged | type == "boolean")
                    and (.priorLicense == null or (.priorLicense | type == "object"))
                    and (.candidateLicense | type == "object")
                  ' >/dev/null || return 1
                  TX_ID=$(printf '%s' "$journal_text" | jq -r '.tx')
                  TX_PHASE=$(printf '%s' "$journal_text" | jq -r '.phase')
                  TX_IMAGE_URI=$(printf '%s' "$journal_text" | jq -r '.imageUri')
                  TX_SECRET_ARN=$(printf '%s' "$journal_text" | jq -r '.secretArn')
                  TX_CONFIG_SHA256=$(printf '%s' "$journal_text" | jq -r '.desiredConfigSha256')
                  TX_TEMPLATE_SHA256=$(printf '%s' "$journal_text" | jq -r '.templateSha256')
                  TX_PROTOCOL_SHA256=$(printf '%s' "$journal_text" | jq -r '.protocolSha256')
                  TX_LICENSE_SECRET_VERSION_ID=$(printf '%s' "$journal_text" | jq -r '.secretVersionId')
                  PREVIOUS_CONTAINER_ID=$(printf '%s' "$journal_text" | jq -r '.previousContainerId')
                  PREVIOUS_IMAGE_URI=$(printf '%s' "$journal_text" | jq -r '.previousImageUri')
                  PREVIOUS_CONTAINER_RUNNING=$(printf '%s' "$journal_text" | jq -c '.previousContainerRunning')
                  CANDIDATE_CONTAINER_ID=$(printf '%s' "$journal_text" | jq -r '.candidateContainerId')
                  PRIOR_LICENSE_JSON=$(printf '%s' "$journal_text" | jq -c '.priorLicense')
                  CANDIDATE_LICENSE_JSON=$(printf '%s' "$journal_text" | jq -c '.candidateLicense')
                  LICENSE_CHANGED=$(printf '%s' "$journal_text" | jq -c '.licenseChanged')
                  RECOVERY_BACKUP_NAME=$(printf '%s' "$journal_text" | jq -r '.recoveryBackupName')
                  RECOVERY_MANIFEST_NAME=$(printf '%s' "$journal_text" | jq -r '.recoveryManifestName')
                  if [ "$PRIOR_LICENSE_JSON" != null ]; then
                    printf '%s' "$PRIOR_LICENSE_JSON" | valid_snapshot_json || return 1
                  fi
                  printf '%s' "$CANDIDATE_LICENSE_JSON" | valid_snapshot_json || return 1
                  transaction_paths
                }

                journal_clear() {
                  if ! path_present "$DEPLOY_JOURNAL"; then return 0; fi
                  journal_identity=$(artifact_json "$DEPLOY_JOURNAL" 0 0 600 32768) || return 1
                  rm -- "$DEPLOY_JOURNAL" || return 1
                  if path_present "$DEPLOY_JOURNAL"; then return 1; fi
                  sync -f -- "$DEPLOY_STATE_DIR"
                }

                container_id_named() {
                  docker inspect -f '{{.Id}}' "$1" 2>/dev/null || true
                }

                discover_candidate_id() {
                  discovered_ids=$(docker ps -aq --no-trunc --filter "label=com.redactwall.deploy=$TX_ID") || return 1
                  discovered_count=$(printf '%s\n' "$discovered_ids" | sed '/^$/d' | wc -l)
                  if [ "$discovered_count" -gt 1 ]; then return 1; fi
                  discovered_id=$(printf '%s\n' "$discovered_ids" | sed -n '1p')
                  if [ -n "$discovered_id" ]; then
                    discovered_label=$(docker inspect -f '{{index .Config.Labels "com.redactwall.deploy"}}' "$discovered_id" 2>/dev/null || true)
                    if [ "$discovered_label" != "$TX_ID" ]; then return 1; fi
                  fi
                  printf '%s' "$discovered_id"
                }

                remove_candidate_confirmed() {
                  discovered_id=$(discover_candidate_id) || return 1
                  if [ -n "$CANDIDATE_CONTAINER_ID" ] && [ -n "$discovered_id" ] \
                    && [ "$CANDIDATE_CONTAINER_ID" != "$discovered_id" ]; then return 1; fi
                  candidate_id=$CANDIDATE_CONTAINER_ID
                  if [ -z "$candidate_id" ]; then candidate_id=$discovered_id; fi
                  if [ -z "$candidate_id" ]; then return 0; fi
                  if ! docker inspect "$candidate_id" >/dev/null 2>&1; then
                    [ -z "$discovered_id" ]
                    return
                  fi
                  candidate_label=$(docker inspect -f '{{index .Config.Labels "com.redactwall.deploy"}}' "$candidate_id" 2>/dev/null || true)
                  if [ "$candidate_label" != "$TX_ID" ]; then return 1; fi
                  docker rm -f "$candidate_id" >/dev/null || return 1
                  if docker inspect "$candidate_id" >/dev/null 2>&1; then return 1; fi
                  remaining_candidate_id=$(discover_candidate_id) || return 1
                  [ -z "$remaining_candidate_id" ]
                }

                quarantine_candidate_license() {
                  if path_present "$LICENSE_RETIRED"; then
                    artifact_matches "$LICENSE_RETIRED" "$CANDIDATE_LICENSE_JSON" 1000 1000 400 65536
                    return
                  fi
                  move_exact_to_private "$LICENSE_FINAL" "$LICENSE_RETIRED" "$CANDIDATE_LICENSE_JSON"
                }

                restore_license_transaction() {
                  if [ "$LICENSE_CHANGED" != true ]; then
                    if [ "$PRIOR_LICENSE_JSON" = null ]; then return 1; fi
                    artifact_matches "$LICENSE_FINAL" "$PRIOR_LICENSE_JSON" 1000 1000 400 65536 || return 1
                  elif [ "$PRIOR_LICENSE_JSON" = null ]; then
                    if path_present "$LICENSE_FINAL"; then
                      artifact_matches "$LICENSE_FINAL" "$CANDIDATE_LICENSE_JSON" 1000 1000 400 65536 || return 1
                      quarantine_candidate_license || return 1
                    fi
                  elif path_present "$LICENSE_FINAL" \
                    && artifact_matches "$LICENSE_FINAL" "$PRIOR_LICENSE_JSON" 1000 1000 400 65536; then
                    true
                  else
                    artifact_matches "$LICENSE_ROLLBACK" "$PRIOR_LICENSE_JSON" 1000 1000 400 65536 || return 1
                    if path_present "$LICENSE_FINAL"; then
                      artifact_matches "$LICENSE_FINAL" "$CANDIDATE_LICENSE_JSON" 1000 1000 400 65536 || return 1
                      quarantine_candidate_license || return 1
                    fi
                    if path_present "$LICENSE_FINAL"; then return 1; fi
                    publish_exact_private "$LICENSE_ROLLBACK" "$LICENSE_FINAL" "$PRIOR_LICENSE_JSON" || return 1
                  fi
                  if path_present "$LICENSE_ROLLBACK"; then return 1; fi
                  return 0
                }

                create_runtime_recovery_point() {
                  [ -n "$PREVIOUS_CONTAINER_ID" ] || return 0
                  [ "$PREVIOUS_CONTAINER_RUNNING" = true ] || return 1
                  PREVIOUS_IMAGE_URI=$(docker inspect -f '{{.Config.Image}}' "$PREVIOUS_CONTAINER_ID") || return 1
                  [[ "$PREVIOUS_IMAGE_URI" =~ ^[0-9]{12}\.dkr\.ecr\.[a-z0-9-]+\.amazonaws\.com(\.cn)?/[a-z0-9]+([._/-][a-z0-9]+)*@sha256:[a-f0-9]{64}$ ]] || return 1
                  container_recovery="/data/.deployment-recovery-$TX_ID"
                  recovery_result=$(docker exec "$PREVIOUS_CONTAINER_ID" node scripts/backup-store.js create --out "$container_recovery") || return 1
                  container_backup=$(printf '%s' "$recovery_result" | jq -er '.file | select(type == "string" and startswith("/data/"))') || return 1
                  container_manifest=$(printf '%s' "$recovery_result" | jq -er '.manifestFile | select(type == "string" and startswith("/data/"))') || return 1
                  docker exec "$PREVIOUS_CONTAINER_ID" node scripts/backup-store.js verify --file "$container_backup" --manifest "$container_manifest" >/dev/null || return 1
                  source_recovery="$APP_DATA_DIR/$(basename "$container_recovery")"
                  [ -d "$source_recovery" ] && [ ! -L "$source_recovery" ] || return 1
                  if path_present "$RECOVERY_PARENT"; then
                    [ ! -L "$RECOVERY_PARENT" ] && [ -d "$RECOVERY_PARENT" ] \
                      && [ "$(stat -c '%u:%g:%a' "$RECOVERY_PARENT")" = '0:0:700' ] || return 1
                  else
                    mkdir -- "$RECOVERY_PARENT" || return 1
                    chown root:root "$RECOVERY_PARENT" && chmod 700 "$RECOVERY_PARENT" \
                      && sync -f "$DATA_VOLUME_ROOT" || return 1
                  fi
                  if path_present "$RECOVERY_DIR"; then return 1; fi
                  mkdir -- "$RECOVERY_DIR" || return 1
                  chown root:root "$RECOVERY_DIR" && chmod 700 "$RECOVERY_DIR" || return 1
                  artifact_count=0
                  while IFS= read -r artifact; do
                    [ -f "$artifact" ] && [ ! -L "$artifact" ] && [ "$(stat -c '%h:%u:%g:%a' "$artifact")" = '1:1000:1000:600' ] || return 1
                    artifact_count=$((artifact_count + 1))
                    [ "$artifact_count" -le 8 ] || return 1
                    target="$RECOVERY_DIR/$(basename "$artifact")"
                    cp --reflink=never -- "$artifact" "$target" || return 1
                    chown root:root "$target" && chmod 600 "$target" && sync -f "$target" || return 1
                  done < <(find "$source_recovery" -mindepth 1 -maxdepth 1 -type f -print)
                  [ "$artifact_count" -ge 4 ] || return 1
                  RECOVERY_BACKUP_NAME=$(basename "$container_backup")
                  RECOVERY_MANIFEST_NAME=$(basename "$container_manifest")
                  [[ "$RECOVERY_BACKUP_NAME" =~ ^[A-Za-z0-9._-]{1,180}$ ]] && [[ "$RECOVERY_MANIFEST_NAME" =~ ^[A-Za-z0-9._-]{1,180}$ ]] || return 1
                  sync -f "$RECOVERY_DIR" && sync -f "$RECOVERY_PARENT"
                  docker run --rm --network none --read-only --tmpfs /tmp:rw,noexec,nosuid,size=32m \
                    --cap-drop ALL --security-opt no-new-privileges --env-file /etc/redactwall/env \
                    -v "$RECOVERY_DIR:/recovery:ro" --entrypoint node "$PREVIOUS_IMAGE_URI" \
                    scripts/backup-store.js verify --file "/recovery/$RECOVERY_BACKUP_NAME" \
                    --manifest "/recovery/$RECOVERY_MANIFEST_NAME" >/dev/null
                }

                restore_runtime_recovery_point() {
                  [ -n "$PREVIOUS_CONTAINER_ID" ] || return 0
                  [ -d "$RECOVERY_DIR" ] && [ ! -L "$RECOVERY_DIR" ] || return 1
                  docker run --rm --network none --read-only --tmpfs /tmp:rw,noexec,nosuid,size=64m \
                    --cap-drop ALL --security-opt no-new-privileges --env-file /etc/redactwall/env \
                    -v "$APP_DATA_DIR:/data" -v "$RECOVERY_DIR:/recovery:ro" --entrypoint node "$PREVIOUS_IMAGE_URI" \
                    scripts/backup-store.js restore --file "/recovery/$RECOVERY_BACKUP_NAME" \
                    --manifest "/recovery/$RECOVERY_MANIFEST_NAME" --to /data/redactwall.db --force >/dev/null || return 1
                  docker run --rm --network none --read-only --tmpfs /tmp:rw,noexec,nosuid,size=32m \
                    --cap-drop ALL --security-opt no-new-privileges --env-file /etc/redactwall/env \
                    -v "$APP_DATA_DIR:/data" --entrypoint node "$PREVIOUS_IMAGE_URI" \
                    -e 'const db=require("./server/db");const result=db.verifyAuditChain();db._db.close();process.exit(result.ok?0:1)' >/dev/null
                }

                cleanup_rollback_artifacts() {
                  if path_present "$LICENSE_STAGE"; then
                    remove_exact_private_artifact "$LICENSE_STAGE" "$CANDIDATE_LICENSE_JSON" || return 1
                  fi
                  if path_present "$LICENSE_RETIRED"; then
                    remove_exact_private_artifact "$LICENSE_RETIRED" "$CANDIDATE_LICENSE_JSON" || return 1
                  fi
                  if path_present "$LICENSE_ROLLBACK"; then return 1; fi
                }

                restore_previous_container() {
                  current_id=$(container_id_named redactwall)
                  previous_named_id=$(container_id_named "$PREVIOUS_CONTAINER_NAME")
                  if [ -z "$PREVIOUS_CONTAINER_ID" ]; then
                    [ -z "$current_id" ] && [ -z "$previous_named_id" ]
                    return
                  fi
                  if [ "$previous_named_id" = "$PREVIOUS_CONTAINER_ID" ]; then
                    if [ -n "$current_id" ]; then return 1; fi
                    docker rename "$PREVIOUS_CONTAINER_ID" redactwall || return 1
                    [ "$(container_id_named redactwall)" = "$PREVIOUS_CONTAINER_ID" ] || return 1
                  elif [ "$current_id" != "$PREVIOUS_CONTAINER_ID" ]; then
                    return 1
                  fi
                  previous_running=$(docker inspect -f '{{.State.Running}}' "$PREVIOUS_CONTAINER_ID" 2>/dev/null || true)
                  if [ "$PREVIOUS_CONTAINER_RUNNING" = true ]; then
                    if [ "$previous_running" != true ]; then docker start "$PREVIOUS_CONTAINER_ID" >/dev/null || return 1; fi
                    [ "$(docker inspect -f '{{.State.Running}}' "$PREVIOUS_CONTAINER_ID" 2>/dev/null || true)" = true ] || return 1
                  elif [ "$previous_running" = true ]; then
                    return 1
                  fi
                }

                publish_applied_state() {
                  artifact_matches "$LICENSE_FINAL" "$CANDIDATE_LICENSE_JSON" 1000 1000 400 65536 || return 1
                  [ "$(container_id_named redactwall)" = "$CANDIDATE_CONTAINER_ID" ] || return 1
                  [ "$(docker inspect -f '{{.State.Running}}' "$CANDIDATE_CONTAINER_ID" 2>/dev/null || true)" = true ] || return 1
                  applied_tmp=$(mktemp "$DEPLOY_STATE_DIR/.applied-deployment.XXXXXX")
                  jq -cn \
                    --arg imageUri "$TX_IMAGE_URI" \
                    --arg secretArn "$TX_SECRET_ARN" --arg desiredConfigSha256 "$TX_CONFIG_SHA256" \
                    --arg templateSha256 "$TX_TEMPLATE_SHA256" --arg protocolSha256 "$TX_PROTOCOL_SHA256" \
                    --arg secretVersionId "$TX_LICENSE_SECRET_VERSION_ID" \
                    --arg containerId "$CANDIDATE_CONTAINER_ID" \
                    --arg licenseSha256 "$(printf '%s' "$CANDIDATE_LICENSE_JSON" | jq -r '.sha256')" \
                    --arg dataVolumeId '${DataVolumeId}' \
                    --arg dataFilesystemUuid "$(findmnt -n -o UUID --target "$DATA_VOLUME_ROOT")" \
                    --arg recoveryPath "$([ -n "$PREVIOUS_CONTAINER_ID" ] && printf '%s' "$RECOVERY_DIR" || true)" \
                    --arg committedAt "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)" \
                    '{version:1,imageUri:$imageUri,secretArn:$secretArn,secretVersionId:$secretVersionId,
                      desiredConfigSha256:$desiredConfigSha256,templateSha256:$templateSha256,protocolSha256:$protocolSha256,
                      containerId:$containerId,licenseSha256:$licenseSha256,
                      dataVolumeId:$dataVolumeId,dataFilesystemUuid:$dataFilesystemUuid,
                      committedAt:$committedAt,recoveryPath:(if $recoveryPath == "" then null else $recoveryPath end),warnings:[]}' > "$applied_tmp"
                  chmod 600 "$applied_tmp"
                  sync -f -- "$applied_tmp"
                  mv -fT -- "$applied_tmp" "$APPLIED_STATE"
                  sync -f -- "$DEPLOY_STATE_DIR"
                }

                applied_state_matches_transaction() {
                  artifact_json "$APPLIED_STATE" 0 0 600 32768 >/dev/null || return 1
                  expected_recovery_path=
                  if [ -n "$PREVIOUS_CONTAINER_ID" ]; then expected_recovery_path=$RECOVERY_DIR; fi
                  jq -e \
                    --arg imageUri "$TX_IMAGE_URI" --arg secretArn "$TX_SECRET_ARN" \
                    --arg secretVersionId "$TX_LICENSE_SECRET_VERSION_ID" --arg desiredConfigSha256 "$TX_CONFIG_SHA256" \
                    --arg templateSha256 "$TX_TEMPLATE_SHA256" --arg protocolSha256 "$TX_PROTOCOL_SHA256" \
                    --arg containerId "$CANDIDATE_CONTAINER_ID" \
                    --arg licenseSha256 "$(printf '%s' "$CANDIDATE_LICENSE_JSON" | jq -r '.sha256')" \
                    --arg dataVolumeId '${DataVolumeId}' --arg recoveryPath "$expected_recovery_path" '
                      type == "object"
                      and (keys | sort) == ["committedAt","containerId","dataFilesystemUuid","dataVolumeId","desiredConfigSha256","imageUri","licenseSha256","protocolSha256","recoveryPath","secretArn","secretVersionId","templateSha256","version","warnings"]
                      and .version == 1 and .imageUri == $imageUri and .secretArn == $secretArn
                      and .secretVersionId == $secretVersionId and .desiredConfigSha256 == $desiredConfigSha256
                      and .templateSha256 == $templateSha256 and .protocolSha256 == $protocolSha256
                      and .containerId == $containerId and .licenseSha256 == $licenseSha256
                      and .dataVolumeId == $dataVolumeId
                      and .recoveryPath == (if $recoveryPath == "" then null else $recoveryPath end)
                      and (.warnings | type == "array" and all(.[]; type == "string" and test("^[a-z0-9_]{1,80}$")))
                    ' "$APPLIED_STATE" >/dev/null
                }

                mutate_applied_warning() {
                  warning_operation=$1
                  warning_code=$2
                  [ "$warning_operation" = add ] || [ "$warning_operation" = remove ] || return 1
                  [[ "$warning_code" =~ ^[a-z0-9_]{1,80}$ ]] || return 1
                  state_identity=$(artifact_json "$APPLIED_STATE" 0 0 600 32768) || return 1
                  warning_tmp=$(mktemp "$DEPLOY_STATE_DIR/.applied-warning.XXXXXX")
                  if [ "$warning_operation" = add ]; then
                    jq --arg warning "$warning_code" '.warnings = ((.warnings + [$warning]) | unique)' "$APPLIED_STATE" > "$warning_tmp"
                  else
                    jq --arg warning "$warning_code" '.warnings = [.warnings[] | select(. != $warning)]' "$APPLIED_STATE" > "$warning_tmp"
                  fi
                  chmod 600 "$warning_tmp"
                  sync -f "$warning_tmp"
                  artifact_matches "$APPLIED_STATE" "$state_identity" 0 0 600 32768 || return 1
                  mv -fT "$warning_tmp" "$APPLIED_STATE"
                  sync -f "$DEPLOY_STATE_DIR"
                }

                record_applied_warning() {
                  mutate_applied_warning add "$1"
                }

                clear_applied_warning() {
                  mutate_applied_warning remove "$1"
                }

                applied_warning_present() {
                  warning_code=$1
                  [[ "$warning_code" =~ ^[a-z0-9_]{1,80}$ ]] || return 1
                  artifact_json "$APPLIED_STATE" 0 0 600 32768 >/dev/null || return 1
                  jq -e --arg warning "$warning_code" '.warnings | index($warning) != null' "$APPLIED_STATE" >/dev/null
                }

                cleanup_committed_transaction() {
                  cleanup_ok=1
                  if [ -z "$CANDIDATE_CONTAINER_ID" ]; then return 1; fi
                  committed_candidate_label=$(docker inspect -f '{{index .Config.Labels "com.redactwall.deploy"}}' "$CANDIDATE_CONTAINER_ID" 2>/dev/null || true)
                  committed_candidate_running=$(docker inspect -f '{{.State.Running}}' "$CANDIDATE_CONTAINER_ID" 2>/dev/null || true)
                  if ! docker inspect "$CANDIDATE_CONTAINER_ID" >/dev/null 2>&1 \
                    || [ "$(container_id_named redactwall)" != "$CANDIDATE_CONTAINER_ID" ] \
                    || [ "$committed_candidate_label" != "$TX_ID" ] \
                    || [ "$committed_candidate_running" != true ]; then
                    return 1
                  fi
                  if ! applied_state_matches_transaction; then publish_applied_state || return 1; fi
                  if [ -n "$PREVIOUS_CONTAINER_ID" ] && docker inspect "$PREVIOUS_CONTAINER_ID" >/dev/null 2>&1; then
                    if ! docker rm -f "$PREVIOUS_CONTAINER_ID" >/dev/null \
                      || docker inspect "$PREVIOUS_CONTAINER_ID" >/dev/null 2>&1; then cleanup_ok=0; fi
                  fi
                  if path_present "$LICENSE_ROLLBACK"; then
                    if [ "$PRIOR_LICENSE_JSON" = null ] \
                      || ! remove_exact_private_artifact "$LICENSE_ROLLBACK" "$PRIOR_LICENSE_JSON"; then cleanup_ok=0; fi
                  fi
                  if path_present "$LICENSE_STAGE"; then
                    if ! remove_exact_private_artifact "$LICENSE_STAGE" "$CANDIDATE_LICENSE_JSON"; then cleanup_ok=0; fi
                  fi
                  if path_present "$LICENSE_RETIRED"; then
                    if ! remove_exact_private_artifact "$LICENSE_RETIRED" "$CANDIDATE_LICENSE_JSON"; then cleanup_ok=0; fi
                  fi
                  [ "$cleanup_ok" -eq 1 ]
                }

                mark_committed_cleanup_pending() {
                  COMMITTED_CLEANUP_PENDING=1
                  if ! applied_state_matches_transaction || ! record_applied_warning committed_cleanup_pending; then
                    echo "REDACTWALL_COMMITTED_DEGRADED=committed_cleanup_warning_persistence_failed" >&2
                    return 1
                  fi
                  echo "REDACTWALL_APPLIED_WARNING=committed_cleanup_pending"
                }

                reconcile_committed_cleanup() {
                  if ! cleanup_committed_transaction; then
                    mark_committed_cleanup_pending
                    return
                  fi
                  if ! journal_clear; then
                    mark_committed_cleanup_pending
                    return
                  fi
                  if applied_warning_present committed_cleanup_pending; then
                    if ! clear_applied_warning committed_cleanup_pending; then
                      COMMITTED_CLEANUP_PENDING=1
                      echo "REDACTWALL_APPLIED_WARNING=committed_cleanup_pending"
                      return 0
                    fi
                  fi
                  COMMITTED_CLEANUP_PENDING=0
                }

                rollback_transaction() {
                  remove_candidate_confirmed || return 1
                  restore_license_transaction || return 1
                  restore_runtime_recovery_point || return 1
                  restore_previous_container || return 1
                  ROLLBACK_RECOVERED=1
                  cleanup_rollback_artifacts || return 1
                  journal_clear
                }

                reconcile_existing_transaction() {
                  if ! path_present "$DEPLOY_JOURNAL"; then
                    if path_present "$APPLIED_STATE" && applied_warning_present committed_cleanup_pending; then
                      if ! clear_applied_warning committed_cleanup_pending; then
                        COMMITTED_CLEANUP_PENDING=1
                        echo "REDACTWALL_APPLIED_WARNING=committed_cleanup_pending"
                      fi
                    fi
                    return 0
                  fi
                  journal_load || {
                    echo "The private deployment journal is invalid; no recovery artifact was changed" >&2
                    return 1
                  }
                  if [ "$TX_PHASE" = committed ]; then
                    reconcile_committed_cleanup
                    return
                  fi
                  rollback_transaction || {
                    if [ "$ROLLBACK_RECOVERED" -eq 1 ]; then
                      echo "The prior deployment was restored; exact private cleanup artifacts remain journaled" >&2
                    else
                      echo "An interrupted deployment could not be reconciled safely; changed replacements and exact recovery artifacts were retained" >&2
                    fi
                    return 1
                  }
                }

                # END REDACTWALL_LICENSE_DEPLOY_PROTOCOL

                reconcile_existing_transaction

                if desired_contract_applied; then
                  exit 0
                fi
                if [ "$COMMITTED_CLEANUP_PENDING" -eq 1 ]; then
                  echo "A new deployment cannot begin until committed cleanup reconciliation succeeds" >&2
                  exit 1
                fi

                reset_transaction_contract_to_desired
                SECRET_JSON=$(aws secretsmanager get-secret-value --secret-id "$SECRET_ARN" --version-id "$LICENSE_SECRET_VERSION_ID" --region '${AWS::Region}' --query SecretString --output text)
                printf '%s' "$SECRET_JSON" | jq -e '
                  type == "object"
                  and ((keys - [
                    "ADMIN_PASSWORD","ADMIN_TOTP_SECRET","REDACTWALL_SECRET","REDACTWALL_DATA_KEY",
                    "REDACTWALL_LICENSE","REDACTWALL_LICENSE_PUBLIC_KEY_B64","INGEST_API_KEY",
                    "OPERATOR_USER","OPERATOR_PASSWORD","APPROVER_USER","APPROVER_PASSWORD",
                    "AUDITOR_USER","AUDITOR_PASSWORD","SCIM_BEARER_TOKEN",
                    "OIDC_ISSUER","OIDC_CLIENT_ID","OIDC_CLIENT_SECRET","OIDC_REDIRECT_URI",
                    "OIDC_AUTHORIZATION_ENDPOINT","OIDC_TOKEN_ENDPOINT","OIDC_JWKS_URI","OIDC_SCOPE",
                    "SIEM_WEBHOOK_URL","SIEM_WEBHOOK_TOKEN","REDACTWALL_LICENSE_SERVER_URL",
                    "REDACTWALL_VENDOR_CONTROL_HEARTBEAT_TOKEN","REDACTWALL_VENDOR_CONTROL_ACKNOWLEDGEMENT_TOKEN",
                    "REDACTWALL_VENDOR_CONTROL_DIAGNOSTIC_TOKEN","REDACTWALL_VENDOR_CONTROL_SHADOW_CANDIDATE_TOKEN",
                    "REDACTWALL_VENDOR_CONTROL_DIAGNOSTICS_ENABLED","REDACTWALL_VENDOR_CONTROL_SHADOW_INTELLIGENCE_ENABLED",
                    "REDACTWALL_VENDOR_CONTROL_HEARTBEAT_INTERVAL_MS","REDACTWALL_VENDOR_CONTROL_TIMEOUT_MS",
                    "REDACTWALL_LICENSE_VERDICT_PUBLIC_KEY_B64","REDACTWALL_LICENSE_VERDICT_NEXT_PUBLIC_KEY_B64",
                    "REDACTWALL_ENTITLEMENT_PUBLIC_KEY_B64","REDACTWALL_ENTITLEMENT_KEY_ID",
                    "REDACTWALL_ENTITLEMENT_NEXT_PUBLIC_KEY_B64","REDACTWALL_ENTITLEMENT_NEXT_KEY_ID"
                  ]) | length) == 0
                  and (. as $secret | [
                    "ADMIN_PASSWORD","ADMIN_TOTP_SECRET","REDACTWALL_SECRET","REDACTWALL_DATA_KEY",
                    "REDACTWALL_LICENSE","REDACTWALL_LICENSE_PUBLIC_KEY_B64","INGEST_API_KEY",
                    "REDACTWALL_LICENSE_SERVER_URL","REDACTWALL_VENDOR_CONTROL_HEARTBEAT_TOKEN",
                    "REDACTWALL_VENDOR_CONTROL_ACKNOWLEDGEMENT_TOKEN",
                    "REDACTWALL_VENDOR_CONTROL_DIAGNOSTICS_ENABLED","REDACTWALL_VENDOR_CONTROL_SHADOW_INTELLIGENCE_ENABLED",
                    "REDACTWALL_LICENSE_VERDICT_PUBLIC_KEY_B64","REDACTWALL_ENTITLEMENT_PUBLIC_KEY_B64",
                    "REDACTWALL_ENTITLEMENT_KEY_ID"
                  ] | all(. as $key |
                    ($secret | has($key)) and ($secret[$key] | type == "string") and ($secret[$key] | length > 0)
                  ))
                  and all(.[]; type == "string")
                  and (.REDACTWALL_VENDOR_CONTROL_DIAGNOSTICS_ENABLED == "true" or .REDACTWALL_VENDOR_CONTROL_DIAGNOSTICS_ENABLED == "false")
                  and (.REDACTWALL_VENDOR_CONTROL_SHADOW_INTELLIGENCE_ENABLED == "true" or .REDACTWALL_VENDOR_CONTROL_SHADOW_INTELLIGENCE_ENABLED == "false")
                  and ((has("REDACTWALL_ENTITLEMENT_NEXT_PUBLIC_KEY_B64")) == (has("REDACTWALL_ENTITLEMENT_NEXT_KEY_ID")))
                ' >/dev/null || {
                  echo "The selected secret version has unknown, missing, or non-string fields" >&2
                  exit 1
                }
                secret() {
                  printf '%s' "$SECRET_JSON" | jq -er --arg key "$1" '
                    (.[$key] // "") as $value |
                    if ($value | type) != "string"
                       or ($value | test("[\u0000-\u001f\u007f]"))
                       or ($value != ($value | sub("^[[:space:]]+"; "") | sub("[[:space:]]+$"; "")))
                    then error("invalid secret value") else $value end
                  '
                }

                ADMIN_PASSWORD=$(secret ADMIN_PASSWORD)
                ADMIN_TOTP_SECRET=$(secret ADMIN_TOTP_SECRET)
                REDACTWALL_SECRET=$(secret REDACTWALL_SECRET)
                REDACTWALL_DATA_KEY=$(secret REDACTWALL_DATA_KEY)
                REDACTWALL_LICENSE_PUBLIC_KEY_B64=$(secret REDACTWALL_LICENSE_PUBLIC_KEY_B64)
                INGEST_API_KEY=$(secret INGEST_API_KEY)
                OPERATOR_USER=$(secret OPERATOR_USER)
                OPERATOR_PASSWORD=$(secret OPERATOR_PASSWORD)
                APPROVER_USER=$(secret APPROVER_USER)
                APPROVER_PASSWORD=$(secret APPROVER_PASSWORD)
                AUDITOR_USER=$(secret AUDITOR_USER)
                AUDITOR_PASSWORD=$(secret AUDITOR_PASSWORD)
                SCIM_BEARER_TOKEN=$(secret SCIM_BEARER_TOKEN)
                OIDC_ISSUER=$(secret OIDC_ISSUER)
                OIDC_CLIENT_ID=$(secret OIDC_CLIENT_ID)
                OIDC_CLIENT_SECRET=$(secret OIDC_CLIENT_SECRET)
                OIDC_REDIRECT_URI=$(secret OIDC_REDIRECT_URI)
                OIDC_AUTHORIZATION_ENDPOINT=$(secret OIDC_AUTHORIZATION_ENDPOINT)
                OIDC_TOKEN_ENDPOINT=$(secret OIDC_TOKEN_ENDPOINT)
                OIDC_JWKS_URI=$(secret OIDC_JWKS_URI)
                OIDC_SCOPE=$(secret OIDC_SCOPE)
                SIEM_WEBHOOK_URL=$(secret SIEM_WEBHOOK_URL)
                SIEM_WEBHOOK_TOKEN=$(secret SIEM_WEBHOOK_TOKEN)
                REDACTWALL_LICENSE_SERVER_URL=$(secret REDACTWALL_LICENSE_SERVER_URL)
                REDACTWALL_VENDOR_CONTROL_HEARTBEAT_TOKEN=$(secret REDACTWALL_VENDOR_CONTROL_HEARTBEAT_TOKEN)
                REDACTWALL_VENDOR_CONTROL_ACKNOWLEDGEMENT_TOKEN=$(secret REDACTWALL_VENDOR_CONTROL_ACKNOWLEDGEMENT_TOKEN)
                REDACTWALL_VENDOR_CONTROL_DIAGNOSTIC_TOKEN=$(secret REDACTWALL_VENDOR_CONTROL_DIAGNOSTIC_TOKEN)
                REDACTWALL_VENDOR_CONTROL_SHADOW_CANDIDATE_TOKEN=$(secret REDACTWALL_VENDOR_CONTROL_SHADOW_CANDIDATE_TOKEN)
                REDACTWALL_VENDOR_CONTROL_DIAGNOSTICS_ENABLED=$(secret REDACTWALL_VENDOR_CONTROL_DIAGNOSTICS_ENABLED)
                REDACTWALL_VENDOR_CONTROL_SHADOW_INTELLIGENCE_ENABLED=$(secret REDACTWALL_VENDOR_CONTROL_SHADOW_INTELLIGENCE_ENABLED)
                REDACTWALL_VENDOR_CONTROL_HEARTBEAT_INTERVAL_MS=$(secret REDACTWALL_VENDOR_CONTROL_HEARTBEAT_INTERVAL_MS)
                REDACTWALL_VENDOR_CONTROL_TIMEOUT_MS=$(secret REDACTWALL_VENDOR_CONTROL_TIMEOUT_MS)
                REDACTWALL_LICENSE_VERDICT_PUBLIC_KEY_B64=$(secret REDACTWALL_LICENSE_VERDICT_PUBLIC_KEY_B64)
                REDACTWALL_LICENSE_VERDICT_NEXT_PUBLIC_KEY_B64=$(secret REDACTWALL_LICENSE_VERDICT_NEXT_PUBLIC_KEY_B64)
                REDACTWALL_ENTITLEMENT_PUBLIC_KEY_B64=$(secret REDACTWALL_ENTITLEMENT_PUBLIC_KEY_B64)
                REDACTWALL_ENTITLEMENT_KEY_ID=$(secret REDACTWALL_ENTITLEMENT_KEY_ID)
                REDACTWALL_ENTITLEMENT_NEXT_PUBLIC_KEY_B64=$(secret REDACTWALL_ENTITLEMENT_NEXT_PUBLIC_KEY_B64)
                REDACTWALL_ENTITLEMENT_NEXT_KEY_ID=$(secret REDACTWALL_ENTITLEMENT_NEXT_KEY_ID)
                REDACTWALL_LICENSE=$(secret REDACTWALL_LICENSE)

                LICENSE_BYTES=$(printf '%s' "$REDACTWALL_LICENSE" | wc -c)
                if [ "$LICENSE_BYTES" -gt 65535 ] \
                  || ! [[ "$REDACTWALL_LICENSE" =~ ^[A-Za-z0-9+/]+={0,2}\.[A-Za-z0-9+/]+={0,2}$ ]]; then
                  echo "The customer license secret is malformed" >&2
                  exit 1
                fi
                LICENSE_PAYLOAD_B64=$(printf '%s' "$REDACTWALL_LICENSE" | cut -d. -f1)
                if ! printf '%s' "$LICENSE_PAYLOAD_B64" \
                  | base64 --decode \
                  | jq -e --arg tenant '${TenantId}' --arg deployment '${DeploymentId}' '
                      type == "object"
                      and (.customerId | type) == "string"
                      and .customerId == $tenant
                      and (.deploymentId | type) == "string"
                      and .deploymentId == $deployment
                      and .status == "active"
                      and (.plan == "standard" or .plan == "enterprise")
                      and (.seats | type) == "number"
                      and (.seats | floor) == .seats
                      and .seats > 0
                      and (.expires | type) == "string"
                      and (.expires | length) > 0
                    ' >/dev/null 2>&1; then
                  echo "The outage fallback payload is not active for this exact customer deployment" >&2
                  exit 1
                fi

                umask 077
                ENV_TMP=$(mktemp /etc/redactwall/env.XXXXXX)
                {
                  printf '%s\n' \
                    'PORT=4000' \
                    'NODE_ENV=production' \
                    'HTTPS=true' \
                    'COOKIE_SECURE=true' \
                    'TRUST_PROXY=1' \
                    'REDACTWALL_DATA_DIR=/data' \
                    'REDACTWALL_DB_PATH=/data/redactwall.db' \
                    'REDACTWALL_POLICY_PATH=/data/policy.json' \
                    'REDACTWALL_CUSTOM_DETECTORS_PATH=/data/custom-detectors.json' \
                    'REDACTWALL_LICENSE_PATH=/license/redactwall.lic' \
                    'REDACTWALL_LICENSE_MANAGED_EXTERNALLY=true' \
                    'REDACTWALL_VENDOR_STATE_PATH=/data/redactwall.vendor' \
                    'REDACTWALL_PUBLIC_URL=https://${PublicHostname}' \
                    'REDACTWALL_LICENSE_MODE=connected' \
                    'REDACTWALL_SAAS_MODE=true' \
                    'REDACTWALL_TENANT_ID=${TenantId}' \
                    'REDACTWALL_CONNECTED_DEPLOYMENT_ID=${DeploymentId}' \
                    'REDACTWALL_REQUIRE_TENANT_CONTEXT=true' \
                    'REDACTWALL_REQUIRE_USER_IDENTITY=true' \
                    'ADMIN_USER=admin' \
                    'REDACTWALL_REQUEST_TIMEOUT_MS=10000' \
                    'SIEM_ALERT_MIN_RISK=25' \
                    'SIEM_ALERT_MIN_SEVERITY=3'
                  printf 'ADMIN_PASSWORD=%s\n' "$ADMIN_PASSWORD"
                  printf 'ADMIN_TOTP_SECRET=%s\n' "$ADMIN_TOTP_SECRET"
                  printf 'OPERATOR_USER=%s\n' "$OPERATOR_USER"
                  printf 'OPERATOR_PASSWORD=%s\n' "$OPERATOR_PASSWORD"
                  printf 'APPROVER_USER=%s\n' "$APPROVER_USER"
                  printf 'APPROVER_PASSWORD=%s\n' "$APPROVER_PASSWORD"
                  printf 'AUDITOR_USER=%s\n' "$AUDITOR_USER"
                  printf 'AUDITOR_PASSWORD=%s\n' "$AUDITOR_PASSWORD"
                  printf 'REDACTWALL_SECRET=%s\n' "$REDACTWALL_SECRET"
                  printf 'REDACTWALL_DATA_KEY=%s\n' "$REDACTWALL_DATA_KEY"
                  printf 'REDACTWALL_LICENSE_PUBLIC_KEY_B64=%s\n' "$REDACTWALL_LICENSE_PUBLIC_KEY_B64"
                  printf 'INGEST_API_KEY=%s\n' "$INGEST_API_KEY"
                  printf 'SCIM_BEARER_TOKEN=%s\n' "$SCIM_BEARER_TOKEN"
                  printf 'OIDC_ISSUER=%s\n' "$OIDC_ISSUER"
                  printf 'OIDC_CLIENT_ID=%s\n' "$OIDC_CLIENT_ID"
                  printf 'OIDC_CLIENT_SECRET=%s\n' "$OIDC_CLIENT_SECRET"
                  printf 'OIDC_REDIRECT_URI=%s\n' "$OIDC_REDIRECT_URI"
                  printf 'OIDC_AUTHORIZATION_ENDPOINT=%s\n' "$OIDC_AUTHORIZATION_ENDPOINT"
                  printf 'OIDC_TOKEN_ENDPOINT=%s\n' "$OIDC_TOKEN_ENDPOINT"
                  printf 'OIDC_JWKS_URI=%s\n' "$OIDC_JWKS_URI"
                  printf 'OIDC_SCOPE=%s\n' "$OIDC_SCOPE"
                  printf 'SIEM_WEBHOOK_URL=%s\n' "$SIEM_WEBHOOK_URL"
                  printf 'SIEM_WEBHOOK_TOKEN=%s\n' "$SIEM_WEBHOOK_TOKEN"
                  printf 'REDACTWALL_LICENSE_SERVER_URL=%s\n' "$REDACTWALL_LICENSE_SERVER_URL"
                  printf 'REDACTWALL_VENDOR_CONTROL_HEARTBEAT_TOKEN=%s\n' "$REDACTWALL_VENDOR_CONTROL_HEARTBEAT_TOKEN"
                  printf 'REDACTWALL_VENDOR_CONTROL_ACKNOWLEDGEMENT_TOKEN=%s\n' "$REDACTWALL_VENDOR_CONTROL_ACKNOWLEDGEMENT_TOKEN"
                  printf 'REDACTWALL_VENDOR_CONTROL_DIAGNOSTIC_TOKEN=%s\n' "$REDACTWALL_VENDOR_CONTROL_DIAGNOSTIC_TOKEN"
                  printf 'REDACTWALL_VENDOR_CONTROL_SHADOW_CANDIDATE_TOKEN=%s\n' "$REDACTWALL_VENDOR_CONTROL_SHADOW_CANDIDATE_TOKEN"
                  printf 'REDACTWALL_VENDOR_CONTROL_DIAGNOSTICS_ENABLED=%s\n' "$REDACTWALL_VENDOR_CONTROL_DIAGNOSTICS_ENABLED"
                  printf 'REDACTWALL_VENDOR_CONTROL_SHADOW_INTELLIGENCE_ENABLED=%s\n' "$REDACTWALL_VENDOR_CONTROL_SHADOW_INTELLIGENCE_ENABLED"
                  printf 'REDACTWALL_VENDOR_CONTROL_HEARTBEAT_INTERVAL_MS=%s\n' "$REDACTWALL_VENDOR_CONTROL_HEARTBEAT_INTERVAL_MS"
                  printf 'REDACTWALL_VENDOR_CONTROL_TIMEOUT_MS=%s\n' "$REDACTWALL_VENDOR_CONTROL_TIMEOUT_MS"
                  printf 'REDACTWALL_LICENSE_VERDICT_PUBLIC_KEY_B64=%s\n' "$REDACTWALL_LICENSE_VERDICT_PUBLIC_KEY_B64"
                  printf 'REDACTWALL_LICENSE_VERDICT_NEXT_PUBLIC_KEY_B64=%s\n' "$REDACTWALL_LICENSE_VERDICT_NEXT_PUBLIC_KEY_B64"
                  printf 'REDACTWALL_ENTITLEMENT_PUBLIC_KEY_B64=%s\n' "$REDACTWALL_ENTITLEMENT_PUBLIC_KEY_B64"
                  printf 'REDACTWALL_ENTITLEMENT_KEY_ID=%s\n' "$REDACTWALL_ENTITLEMENT_KEY_ID"
                  printf 'REDACTWALL_ENTITLEMENT_NEXT_PUBLIC_KEY_B64=%s\n' "$REDACTWALL_ENTITLEMENT_NEXT_PUBLIC_KEY_B64"
                  printf 'REDACTWALL_ENTITLEMENT_NEXT_KEY_ID=%s\n' "$REDACTWALL_ENTITLEMENT_NEXT_KEY_ID"
                } > "$ENV_TMP"
                chmod 600 "$ENV_TMP"
                sync -f "$ENV_TMP"
                mv -f "$ENV_TMP" /etc/redactwall/env
                sync -f /etc/redactwall

                REGISTRY=$(printf '%s' "$IMAGE_URI" | cut -d/ -f1)
                aws ecr get-login-password --region '${AWS::Region}' | docker login --username AWS --password-stdin "$REGISTRY"
                docker pull "$IMAGE_URI"
                if ! printf '%s\n' "$REDACTWALL_LICENSE" \
                  | docker run --rm -i \
                      --network none \
                      --read-only \
                      --tmpfs /tmp:rw,noexec,nosuid,size=16m \
                      --cap-drop ALL \
                      --security-opt no-new-privileges \
                      --env-file /etc/redactwall/env \
                      --entrypoint node \
                      "$IMAGE_URI" \
                      -e 'const fs=require("fs"),license=require("./server/license"),preflight=require("./server/preflight");
                        const result=license.verifyLicenseText(fs.readFileSync(0,"utf8"),{expectedCustomerId:process.env.REDACTWALL_TENANT_ID,env:process.env});
                        const state=result.ok?license.evaluate(result.payload):"unlicensed";
                        const managed=license.managedLicenseHealth({env:process.env,status:{state,payload:result.payload||null,reason:result.reason||null}});
                        const status=preflight.configStatus({env:process.env,requireLicenseBinding:true,adminPasswordIsDefault:false,
                          ingestKeyIsDefault:false,secretSource:"env",dataCryptoEnabled:true,cookieSecure:true,managedLicenseHealth:managed});
                        const required=["license_mode","license_root_trust_anchor","managed_license_source","connected_offline_fallback",
                          "connected_license_url","connected_license_auth","connected_license_optional_channels","connected_license_legacy_auth",
                          "connected_license_timing","connected_license_tenant_id","connected_license_deployment_id",
                          "connected_license_verdict_key","connected_entitlement_keys","license_customer_binding","saas_tenant_id",
                          "saas_seat_limit","saas_tenant_context","saas_user_identity"];
                        const checks=new Map(status.checks.map(item=>[item.id,item.ok]));
                        process.exit(result.ok&&state==="active"&&managed.connectedFallbackCompatible===true
                          &&required.every(id=>checks.get(id)===true)?0:1);'; then
                  echo "The selected secret failed connected production preflight for this exact customer deployment" >&2
                  exit 1
                fi

                TX_ID=$(tr -d '-' < /proc/sys/kernel/random/uuid)
                if ! [[ "$TX_ID" =~ ^[a-f0-9]{32}$ ]]; then
                  echo "A collision-resistant deployment transaction id could not be created" >&2
                  exit 1
                fi
                transaction_paths
                for transaction_path in "$LICENSE_STAGE" "$LICENSE_ROLLBACK" "$LICENSE_RETIRED"; do
                  if path_present "$transaction_path"; then
                    echo "A private deployment transaction path already exists" >&2
                    exit 1
                  fi
                done
                existing_candidate_id=$(discover_candidate_id) || {
                  echo "Deployment transaction labels are ambiguous" >&2
                  exit 1
                }
                if [ -n "$(container_id_named "$PREVIOUS_CONTAINER_NAME")" ] \
                  || [ -n "$(container_id_named "$CANDIDATE_CONTAINER_NAME")" ] \
                  || [ -n "$existing_candidate_id" ]; then
                  echo "A deployment transaction container name or label already exists" >&2
                  exit 1
                fi

                if path_present "$LICENSE_FINAL"; then
                  PRIOR_LICENSE_JSON=$(artifact_json "$LICENSE_FINAL" 1000 1000 400 65536) || {
                    echo "The existing customer license is not a stable owner-only single-link file" >&2
                    exit 1
                  }
                  if [ "$(printf '%s' "$PRIOR_LICENSE_JSON" | jq -r '.dev')" != "$DEPLOY_DEVICE" ]; then
                    echo "The existing customer license is not on the journal filesystem" >&2
                    exit 1
                  fi
                fi

                umask 077
                set -o noclobber
                exec {license_stage_fd}> "$LICENSE_STAGE"
                set +o noclobber
                printf '%s\n' "$REDACTWALL_LICENSE" >&$license_stage_fd
                chown 1000:1000 "/proc/$BASHPID/fd/$license_stage_fd"
                chmod 400 "/proc/$BASHPID/fd/$license_stage_fd"
                sync -f -- "/proc/$BASHPID/fd/$license_stage_fd"
                CANDIDATE_LICENSE_JSON=$(artifact_json "$LICENSE_STAGE" 1000 1000 400 65536) || {
                  close_fd "$license_stage_fd"
                  echo "The staged customer license could not be identity-bound" >&2
                  exit 1
                }
                close_fd "$license_stage_fd"
                cleanup_unjournaled_stage() {
                  unjournaled_exit=$?
                  trap - EXIT
                  if path_present "$LICENSE_STAGE" \
                    && ! remove_exact_private_artifact "$LICENSE_STAGE" "$CANDIDATE_LICENSE_JSON"; then
                    echo "An exact private pre-journal staging artifact was retained" >&2
                  fi
                  exit "$unjournaled_exit"
                }
                trap cleanup_unjournaled_stage EXIT
                if [ "$(printf '%s' "$CANDIDATE_LICENSE_JSON" | jq -r '.dev')" != "$DEPLOY_DEVICE" ]; then
                  echo "The staged customer license is not on the data filesystem" >&2
                  exit 1
                fi

                if [ "$PRIOR_LICENSE_JSON" != null ] \
                  && same_license_bytes "$PRIOR_LICENSE_JSON" "$CANDIDATE_LICENSE_JSON"; then
                  remove_exact_private_artifact "$LICENSE_STAGE" "$CANDIDATE_LICENSE_JSON"
                  LICENSE_CHANGED=false
                  CANDIDATE_LICENSE_JSON=$PRIOR_LICENSE_JSON
                else
                  LICENSE_CHANGED=true
                fi

                PREVIOUS_CONTAINER_ID=$(container_id_named redactwall)
                if [ -n "$PREVIOUS_CONTAINER_ID" ]; then
                  if ! [[ "$PREVIOUS_CONTAINER_ID" =~ ^[a-f0-9]{64}$ ]]; then
                    echo "The current RedactWall container identity is invalid" >&2
                    exit 1
                  fi
                  PREVIOUS_CONTAINER_RUNNING=$(docker inspect -f '{{.State.Running}}' "$PREVIOUS_CONTAINER_ID")
                  if [ "$PREVIOUS_CONTAINER_RUNNING" != true ] && [ "$PREVIOUS_CONTAINER_RUNNING" != false ]; then
                    echo "The current RedactWall container state is invalid" >&2
                    exit 1
                  fi
                fi

                create_runtime_recovery_point || {
                  echo "A verified pre-update runtime recovery point could not be created" >&2
                  exit 1
                }

                journal_write prepared

                rollback_deploy() {
                  exit_code=$?
                  trap - EXIT
                  if [ "$DEPLOY_COMMITTED" -eq 1 ]; then
                    reconcile_committed_cleanup || exit 70
                    exit 0
                  fi
                  if [ "$COMMIT_ATTEMPTED" -eq 1 ]; then
                    if ! journal_load; then
                      echo "RedactWall commit outcome is uncertain; no candidate, license, or recovery artifact was changed" >&2
                      exit 1
                    fi
                    if [ "$TX_PHASE" = committed ]; then
                      reconcile_committed_cleanup || exit 70
                      exit 0
                    fi
                  fi
                  if ! rollback_transaction; then
                    if [ "$ROLLBACK_RECOVERED" -eq 1 ]; then
                      echo "RedactWall rollback restored the prior deployment; exact private cleanup artifacts remain journaled" >&2
                    else
                      echo "RedactWall rollback stopped before changing an unproven replacement; exact recovery artifacts were retained" >&2
                    fi
                    exit 1
                  fi
                  exit "$exit_code"
                }
                trap rollback_deploy EXIT

                if [ -n "$PREVIOUS_CONTAINER_ID" ]; then
                  if [ "$PREVIOUS_CONTAINER_RUNNING" = true ]; then
                    docker stop -t 30 "$PREVIOUS_CONTAINER_ID" >/dev/null
                  fi
                  [ "$(container_id_named redactwall)" = "$PREVIOUS_CONTAINER_ID" ]
                  docker rename "$PREVIOUS_CONTAINER_ID" "$PREVIOUS_CONTAINER_NAME"
                  [ "$(container_id_named "$PREVIOUS_CONTAINER_NAME")" = "$PREVIOUS_CONTAINER_ID" ]
                fi
                journal_write previous_moved

                if [ "$LICENSE_CHANGED" = true ]; then
                  if [ "$PRIOR_LICENSE_JSON" != null ]; then
                    move_exact_to_private "$LICENSE_FINAL" "$LICENSE_ROLLBACK" "$PRIOR_LICENSE_JSON"
                  elif path_present "$LICENSE_FINAL"; then
                    echo "A replacement appeared at the customer license path before publication" >&2
                    exit 1
                  fi
                  journal_write prior_secured
                  publish_exact_private "$LICENSE_STAGE" "$LICENSE_FINAL" "$CANDIDATE_LICENSE_JSON"
                  journal_write candidate_published
                else
                  journal_write license_unchanged
                fi
                unset REDACTWALL_LICENSE LICENSE_PAYLOAD_B64 SECRET_JSON \
                  ADMIN_PASSWORD ADMIN_TOTP_SECRET OPERATOR_PASSWORD APPROVER_PASSWORD AUDITOR_PASSWORD \
                  REDACTWALL_SECRET REDACTWALL_DATA_KEY INGEST_API_KEY SCIM_BEARER_TOKEN OIDC_CLIENT_SECRET \
                  SIEM_WEBHOOK_TOKEN REDACTWALL_VENDOR_CONTROL_HEARTBEAT_TOKEN \
                  REDACTWALL_VENDOR_CONTROL_ACKNOWLEDGEMENT_TOKEN REDACTWALL_VENDOR_CONTROL_DIAGNOSTIC_TOKEN \
                  REDACTWALL_VENDOR_CONTROL_SHADOW_CANDIDATE_TOKEN

                set +e
                candidate_create_output=$(docker create \
                  --name "$CANDIDATE_CONTAINER_NAME" \
                  --label "com.redactwall.deploy=$TX_ID" \
                  --hostname redactwall \
                  --restart unless-stopped \
                  --init \
                  --read-only \
                  --tmpfs /tmp:rw,noexec,nosuid,size=64m \
                  --cap-drop ALL \
                  --security-opt no-new-privileges \
                  --stop-timeout 30 \
                  --env-file /etc/redactwall/env \
                  -p 4000:4000 \
                  -v /var/lib/redactwall/runtime:/data \
                  --mount type=bind,src="$LICENSE_FINAL",dst=/license/redactwall.lic,readonly \
                  --log-driver=awslogs \
                  --log-opt awslogs-region='${AWS::Region}' \
                  --log-opt awslogs-group='${AppLogGroup}' \
                  --log-opt awslogs-stream='${TenantId}' \
                  "$IMAGE_URI" 2>&1)
                candidate_create_status=$?
                set -e
                CANDIDATE_CONTAINER_ID=$(discover_candidate_id) || {
                  echo "The candidate container identity is ambiguous" >&2
                  exit 1
                }
                if [ -n "$CANDIDATE_CONTAINER_ID" ]; then journal_write candidate_created; fi
                if [ "$candidate_create_status" -ne 0 ] || [ -z "$CANDIDATE_CONTAINER_ID" ] \
                  || [ "$candidate_create_output" != "$CANDIDATE_CONTAINER_ID" ]; then
                  echo "The candidate container could not be created with a bound identity" >&2
                  exit 1
                fi
                unset candidate_create_output
                docker start "$CANDIDATE_CONTAINER_ID" >/dev/null
                [ "$(docker inspect -f '{{.State.Running}}' "$CANDIDATE_CONTAINER_ID" 2>/dev/null || true)" = true ]
                journal_write candidate_started

                READY=0
                for attempt in $(seq 1 60); do
                  CONTAINER_STATE=$(docker inspect -f '{{.State.Status}}' "$CANDIDATE_CONTAINER_ID" 2>/dev/null || echo missing)
                  case "$CONTAINER_STATE" in
                    exited|dead|restarting|missing)
                      echo "RedactWall container entered terminal deployment state: $CONTAINER_STATE" >&2
                      exit 1
                      ;;
                  esac
                  HEALTH_STATUS=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}missing{{end}}' "$CANDIDATE_CONTAINER_ID" 2>/dev/null || echo missing)
                  if [ "$HEALTH_STATUS" = "unhealthy" ]; then
                    echo "RedactWall container health check failed" >&2
                    exit 1
                  fi
                  if [ "$CONTAINER_STATE" = "running" ] && [ "$HEALTH_STATUS" = "healthy" ] \
                    && curl --fail --silent --show-error --max-time 3 http://127.0.0.1:4000/readyz >/dev/null; then
                    READY=1
                    break
                  fi
                  sleep 5
                done
                if [ "$READY" -ne 1 ]; then
                  echo "RedactWall did not become ready before the deployment deadline" >&2
                  exit 1
                fi
                journal_write candidate_ready

                artifact_matches "$LICENSE_FINAL" "$CANDIDATE_LICENSE_JSON" 1000 1000 400 65536 || {
                  echo "The installed customer license changed before deployment commit" >&2
                  exit 1
                }
                if [ -n "$(container_id_named redactwall)" ]; then
                  echo "The canonical RedactWall container name was replaced before commit" >&2
                  exit 1
                fi
                docker rename "$CANDIDATE_CONTAINER_ID" redactwall
                [ "$(container_id_named redactwall)" = "$CANDIDATE_CONTAINER_ID" ]
                journal_write candidate_named
                COMMIT_ATTEMPTED=1
                journal_write committed
                DEPLOY_COMMITTED=1
                trap - EXIT

                reconcile_committed_cleanup || exit 70

                if ! (
                  set -e
                  mkdir -p /var/log/redactwall
                  docker cp redactwall:/app/scripts/run-evidence-pack.sh /usr/local/bin/redactwall-run-evidence-pack
                  chmod 755 /usr/local/bin/redactwall-run-evidence-pack

                if [ ! -f /var/lib/redactwall/runtime/evidence-schedule.json ]; then
                  docker cp redactwall:/app/config/evidence-schedule.example.json /var/lib/redactwall/runtime/evidence-schedule.json
                  jq '.outDir = "/data/evidence-packs" | .generatedBy = "aws-systemd-evidence-export"' \
                    /var/lib/redactwall/runtime/evidence-schedule.json > /tmp/redactwall-evidence-schedule.json
                  mv /tmp/redactwall-evidence-schedule.json /var/lib/redactwall/runtime/evidence-schedule.json
                  chown 1000:1000 /var/lib/redactwall/runtime/evidence-schedule.json
                  chmod 600 /var/lib/redactwall/runtime/evidence-schedule.json
                fi

                cat > /etc/redactwall/evidence-pack.env <<'EOF'
                REDACTWALL_EVIDENCE_MODE='docker'
                REDACTWALL_EVIDENCE_PROJECT_DIR='/app'
                REDACTWALL_EVIDENCE_CONFIG='/data/evidence-schedule.json'
                REDACTWALL_EVIDENCE_LOG='/var/log/redactwall/evidence-pack.log'
                REDACTWALL_EVIDENCE_CONTAINER='redactwall'
                EOF
                chmod 600 /etc/redactwall/evidence-pack.env

                cat > /etc/systemd/system/redactwall-evidence-pack.service <<'EOF'
                [Unit]
                Description=Generate sanitized RedactWall examiner evidence pack
                After=network-online.target docker.service
                Wants=network-online.target

                [Service]
                Type=oneshot
                EnvironmentFile=/etc/redactwall/evidence-pack.env
                ExecStart=/usr/local/bin/redactwall-run-evidence-pack
                User=root
                Group=root
                Nice=5
                EOF

                cat > /etc/systemd/system/redactwall-evidence-pack.timer <<'EOF'
                [Unit]
                Description=Run sanitized RedactWall examiner evidence pack on schedule

                [Timer]
                OnCalendar=quarterly
                Persistent=true
                RandomizedDelaySec=1h
                Unit=redactwall-evidence-pack.service

                [Install]
                WantedBy=timers.target
                EOF

                  systemctl daemon-reload
                  systemctl enable --now redactwall-evidence-pack.timer
                ); then
                  if ! record_applied_warning evidence_scheduler_setup_failed; then
                    echo "REDACTWALL_COMMITTED_DEGRADED=evidence_scheduler_warning_persistence_failed" >&2
                    exit 70
                  fi
                  echo "REDACTWALL_APPLIED_WARNING=evidence_scheduler_setup_failed" >&2
                fi
              mode: '000700'
              owner: root
              group: root
            /usr/local/sbin/redactwall-validate-release-input:
              content: !Sub |
                #!/bin/bash
                set -euo pipefail
                if [ "$#" -ne 10 ]; then
                  echo "release validation requires image, secret, version, tenant, and deployment identity" >&2
                  exit 2
                fi
                while [ "$#" -gt 0 ]; do
                  case "$1" in
                    --image-uri) image_uri=$2 ;;
                    --secret-arn) secret_arn=$2 ;;
                    --secret-version-id) secret_version=$2 ;;
                    --tenant-id) tenant_id=$2 ;;
                    --deployment-id) deployment_id=$2 ;;
                    *) echo "unknown release validation option" >&2; exit 2 ;;
                  esac
                  shift 2
                done
                [[ "$image_uri" =~ ^[0-9]{12}\.dkr\.ecr\.[a-z0-9-]+\.amazonaws\.com(\.cn)?/[a-z0-9]+([._/-][a-z0-9]+)*@sha256:[a-f0-9]{64}$ ]]
                [[ "$secret_arn" =~ ^arn:(aws|aws-us-gov|aws-cn):secretsmanager:[a-z0-9-]+:[0-9]{12}:secret:[A-Za-z0-9/_+=.@-]{1,512}$ ]]
                [[ "$secret_version" =~ ^[A-Za-z0-9-]{32,64}$ ]]
                [[ "$tenant_id" =~ ^[a-z0-9][a-z0-9_-]{1,62}$ ]]
                [[ "$deployment_id" =~ ^dep_[a-f0-9]{32}$ ]]
                secret_json=$(aws secretsmanager get-secret-value --secret-id "$secret_arn" --version-id "$secret_version" \
                  --region '${AWS::Region}' --query SecretString --output text)
                printf '%s' "$secret_json" | jq -e '
                  type == "object"
                  and ((keys - [
                    "ADMIN_PASSWORD","ADMIN_TOTP_SECRET","REDACTWALL_SECRET","REDACTWALL_DATA_KEY",
                    "REDACTWALL_LICENSE","REDACTWALL_LICENSE_PUBLIC_KEY_B64","INGEST_API_KEY",
                    "OPERATOR_USER","OPERATOR_PASSWORD","APPROVER_USER","APPROVER_PASSWORD",
                    "AUDITOR_USER","AUDITOR_PASSWORD","SCIM_BEARER_TOKEN",
                    "OIDC_ISSUER","OIDC_CLIENT_ID","OIDC_CLIENT_SECRET","OIDC_REDIRECT_URI",
                    "OIDC_AUTHORIZATION_ENDPOINT","OIDC_TOKEN_ENDPOINT","OIDC_JWKS_URI","OIDC_SCOPE",
                    "SIEM_WEBHOOK_URL","SIEM_WEBHOOK_TOKEN","REDACTWALL_LICENSE_SERVER_URL",
                    "REDACTWALL_VENDOR_CONTROL_HEARTBEAT_TOKEN","REDACTWALL_VENDOR_CONTROL_ACKNOWLEDGEMENT_TOKEN",
                    "REDACTWALL_VENDOR_CONTROL_DIAGNOSTIC_TOKEN","REDACTWALL_VENDOR_CONTROL_SHADOW_CANDIDATE_TOKEN",
                    "REDACTWALL_VENDOR_CONTROL_DIAGNOSTICS_ENABLED","REDACTWALL_VENDOR_CONTROL_SHADOW_INTELLIGENCE_ENABLED",
                    "REDACTWALL_VENDOR_CONTROL_HEARTBEAT_INTERVAL_MS","REDACTWALL_VENDOR_CONTROL_TIMEOUT_MS",
                    "REDACTWALL_LICENSE_VERDICT_PUBLIC_KEY_B64","REDACTWALL_LICENSE_VERDICT_NEXT_PUBLIC_KEY_B64",
                    "REDACTWALL_ENTITLEMENT_PUBLIC_KEY_B64","REDACTWALL_ENTITLEMENT_KEY_ID",
                    "REDACTWALL_ENTITLEMENT_NEXT_PUBLIC_KEY_B64","REDACTWALL_ENTITLEMENT_NEXT_KEY_ID"
                  ]) | length) == 0
                  and (. as $secret | [
                    "ADMIN_PASSWORD","ADMIN_TOTP_SECRET","REDACTWALL_SECRET","REDACTWALL_DATA_KEY",
                    "REDACTWALL_LICENSE","REDACTWALL_LICENSE_PUBLIC_KEY_B64","INGEST_API_KEY",
                    "REDACTWALL_LICENSE_SERVER_URL","REDACTWALL_VENDOR_CONTROL_HEARTBEAT_TOKEN",
                    "REDACTWALL_VENDOR_CONTROL_ACKNOWLEDGEMENT_TOKEN",
                    "REDACTWALL_VENDOR_CONTROL_DIAGNOSTICS_ENABLED","REDACTWALL_VENDOR_CONTROL_SHADOW_INTELLIGENCE_ENABLED",
                    "REDACTWALL_LICENSE_VERDICT_PUBLIC_KEY_B64","REDACTWALL_ENTITLEMENT_PUBLIC_KEY_B64",
                    "REDACTWALL_ENTITLEMENT_KEY_ID"
                  ] | all(. as $key |
                    ($secret | has($key)) and ($secret[$key] | type == "string") and ($secret[$key] | length > 0)
                  ))
                  and all(.[]; type == "string")
                  and (.REDACTWALL_VENDOR_CONTROL_DIAGNOSTICS_ENABLED == "true" or .REDACTWALL_VENDOR_CONTROL_DIAGNOSTICS_ENABLED == "false")
                  and (.REDACTWALL_VENDOR_CONTROL_SHADOW_INTELLIGENCE_ENABLED == "true" or .REDACTWALL_VENDOR_CONTROL_SHADOW_INTELLIGENCE_ENABLED == "false")
                  and ((has("REDACTWALL_ENTITLEMENT_NEXT_PUBLIC_KEY_B64")) == (has("REDACTWALL_ENTITLEMENT_NEXT_KEY_ID")))
                ' >/dev/null
                registry=$(printf '%s' "$image_uri" | cut -d/ -f1)
                aws ecr get-login-password --region '${AWS::Region}' | docker login --username AWS --password-stdin "$registry" >/dev/null
                docker pull "$image_uri" >/dev/null
                printf '%s' "$secret_json" | docker run --rm -i --network none --read-only \
                  --tmpfs /tmp:rw,noexec,nosuid,size=16m --cap-drop ALL --security-opt no-new-privileges \
                  -e REDACTWALL_TENANT_ID="$tenant_id" -e REDACTWALL_CONNECTED_DEPLOYMENT_ID="$deployment_id" \
                  -e 'REDACTWALL_PUBLIC_URL=https://${PublicHostname}' \
                  --entrypoint node "$image_uri" -e '
                    const fs=require("fs"), license=require("./server/license"), preflight=require("./server/preflight"),
                      urlPolicy=require("./server/url-policy");
                    const secret=JSON.parse(fs.readFileSync(0,"utf8"));
                    const valuesSafe=Object.values(secret).every(value=>value===value.trim()
                      && !/[\u0000-\u001f\u007f]/.test(value));
                    const siemUrl=secret.SIEM_WEBHOOK_URL||"", siemToken=secret.SIEM_WEBHOOK_TOKEN||"";
                    const siemOk=(!siemUrl&&!siemToken)||(!!siemUrl&&!!urlPolicy.outboundHttpsUrl(siemUrl));
                    const env={...secret,NODE_ENV:"production",ADMIN_USER:"admin",
                      REDACTWALL_TENANT_ID:process.env.REDACTWALL_TENANT_ID,
                      REDACTWALL_CONNECTED_DEPLOYMENT_ID:process.env.REDACTWALL_CONNECTED_DEPLOYMENT_ID,
                      REDACTWALL_LICENSE_MODE:"connected",
                      REDACTWALL_PUBLIC_URL:process.env.REDACTWALL_PUBLIC_URL,
                      REDACTWALL_LICENSE_MANAGED_EXTERNALLY:"true",REDACTWALL_SAAS_MODE:"true",
                      REDACTWALL_REQUIRE_TENANT_CONTEXT:"true",REDACTWALL_REQUIRE_USER_IDENTITY:"true",
                      REDACTWALL_DB_DRIVER:"sqlite",REDACTWALL_DB_PATH:"/data/redactwall.db"};
                    const verified=license.verifyLicenseText(secret.REDACTWALL_LICENSE,
                      {expectedCustomerId:env.REDACTWALL_TENANT_ID,env});
                    const state=verified.ok?license.evaluate(verified.payload):"unlicensed";
                    const managed=license.managedLicenseHealth({env,status:{state,payload:verified.payload||null,
                      reason:verified.reason||null}});
                    const status=preflight.configStatus({env,adminPasswordIsDefault:false,ingestKeyIsDefault:false,
                      secretSource:"env",dataCryptoEnabled:true,cookieSecure:true,requireLicenseBinding:true,
                      managedLicenseHealth:managed});
                    const required=["admin_password_strength","admin_mfa","admin_mfa_secret",
                      "operator_credentials","operator_user_distinct","operator_password_strength",
                      "approver_credentials","approver_user_distinct","approver_password_strength",
                      "auditor_credentials","auditor_user_distinct","auditor_password_strength",
                      "ingest_key_strength","scim_bearer_token_strength","oidc_config",
                      "oidc_client_secret_strength","oidc_scim_users","oidc_endpoints","oidc_https",
                      "session_secret_strength","data_key_strength","public_url","license_mode",
                      "license_root_trust_anchor","managed_license_source","connected_offline_fallback",
                      "connected_license_url","connected_license_auth","connected_license_optional_channels",
                      "connected_license_legacy_auth","connected_license_timing","connected_license_tenant_id",
                      "connected_license_deployment_id","connected_license_verdict_key","connected_entitlement_keys",
                      "license_customer_binding",
                      "saas_tenant_id","saas_seat_limit","saas_tenant_context","saas_user_identity"];
                    const checks=new Map(status.checks.map(item=>[item.id,item.ok]));
                    process.exit(valuesSafe && siemOk && verified.ok && state==="active"
                      && managed.connectedFallbackCompatible===true
                      && required.every(id=>checks.get(id)===true) ? 0 : 1);'
                unset secret_json
              mode: '000700'
              owner: root
              group: root
            /etc/redactwall/deployment-contract.json:
              content: !Sub |
                {"version":1,"desiredConfigSha256":"${DesiredConfigSha256}","templateSha256":"${DeploymentTemplateSha256}","protocolSha256":"${DeploymentProtocolSha256}","templateUrl":"${DeploymentTemplateUrl}"}
              mode: '000600'
              owner: root
              group: root
            /usr/local/sbin/redactwall-assert-applied:
              content: !Sub |
                #!/bin/bash
                set -euo pipefail
                if [ "$#" -ne 12 ] || [ "$1" != --image-uri ] || [ "$3" != --secret-version-id ] \
                  || [ "$5" != --config-sha256 ] || [ "$7" != --template-sha256 ] || [ "$9" != --protocol-sha256 ] \
                  || [ "$11" != --recovery-set-id ]; then
                  echo "usage: redactwall-assert-applied --image-uri <digest-uri> --secret-version-id <version-id> --config-sha256 <digest> --template-sha256 <digest> --protocol-sha256 <digest> --recovery-set-id <none|32hex>" >&2
                  exit 2
                fi
                expected_image=$2
                expected_secret_version=$4
                expected_config_sha256=$6
                expected_template_sha256=$8
                expected_protocol_sha256=${!10}
                expected_recovery_set=${!12}
                expected_secret_arn='${SecretArn}'
                configured_recovery_set='${RecoverySetId}'
                [ -n "$configured_recovery_set" ] || configured_recovery_set=none
                [[ "$expected_image" =~ ^[0-9]{12}\.dkr\.ecr\.[a-z0-9-]+\.amazonaws\.com(\.cn)?/[a-z0-9]+([._/-][a-z0-9]+)*@sha256:[a-f0-9]{64}$ ]]
                [[ "$expected_secret_version" =~ ^[A-Za-z0-9-]{32,64}$ ]]
                [[ "$expected_config_sha256" =~ ^[a-f0-9]{64}$ ]]
                [[ "$expected_template_sha256" =~ ^[a-f0-9]{64}$ ]]
                [[ "$expected_protocol_sha256" =~ ^[a-f0-9]{64}$ ]]
                [[ "$expected_recovery_set" == none || "$expected_recovery_set" =~ ^[a-f0-9]{32}$ ]]
                [ "$expected_recovery_set" = "$configured_recovery_set" ]
                contract=/etc/redactwall/deployment-contract.json
                [ ! -L "$contract" ] && [ -f "$contract" ]
                [ "$(stat -c '%u:%g:%a:%h' "$contract")" = '0:0:600:1' ]
                jq -e --arg config "$expected_config_sha256" --arg template "$expected_template_sha256" \
                  --arg protocol "$expected_protocol_sha256" --arg url '${DeploymentTemplateUrl}' '
                    type == "object" and (keys | sort) == ["desiredConfigSha256","protocolSha256","templateSha256","templateUrl","version"]
                    and .version == 1 and .desiredConfigSha256 == $config and .templateSha256 == $template
                    and .protocolSha256 == $protocol and .templateUrl == $url
                  ' "$contract" >/dev/null
                [ "$(sha256sum /usr/local/sbin/redactwall-deploy | awk '{print $1}')" = "$expected_protocol_sha256" ]
                state=/etc/redactwall/applied-deployment.json
                [ ! -L "$state" ] && [ -f "$state" ]
                [ "$(stat -c '%u:%g:%a:%h' "$state")" = '0:0:600:1' ]
                state_size=$(stat -c '%s' "$state")
                [ "$state_size" -gt 0 ] && [ "$state_size" -le 32768 ]
                jq -e --arg imageUri "$expected_image" --arg secretVersionId "$expected_secret_version" \
                  --arg secretArn "$expected_secret_arn" --arg desiredConfigSha256 "$expected_config_sha256" \
                  --arg templateSha256 "$expected_template_sha256" --arg protocolSha256 "$expected_protocol_sha256" \
                  --arg dataVolumeId '${DataVolumeId}' '
                    type == "object"
                    and (keys | sort) == ["committedAt","containerId","dataFilesystemUuid","dataVolumeId","desiredConfigSha256","imageUri","licenseSha256","protocolSha256","recoveryPath","secretArn","secretVersionId","templateSha256","version","warnings"]
                    and .version == 1 and .imageUri == $imageUri and .secretVersionId == $secretVersionId
                    and .secretArn == $secretArn and .desiredConfigSha256 == $desiredConfigSha256
                    and .templateSha256 == $templateSha256 and .protocolSha256 == $protocolSha256
                    and .dataVolumeId == $dataVolumeId
                    and (.containerId | type == "string" and test("^[a-f0-9]{64}$"))
                    and (.licenseSha256 | type == "string" and test("^[a-f0-9]{64}$"))
                    and (.dataFilesystemUuid | type == "string" and test("^[A-Fa-f0-9-]{16,64}$"))
                    and (.committedAt | type == "string" and test("^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}\\.[0-9]{3}Z$"))
                    and (.recoveryPath == null or (.recoveryPath | type == "string" and test("^/var/lib/redactwall/recovery/[a-f0-9]{32}$")))
                    and (.warnings | type == "array" and all(.[]; type == "string" and test("^[a-z0-9_]{1,80}$")))
                  ' "$state" >/dev/null
                recovery_path=$(jq -r '.recoveryPath // empty' "$state")
                if [ -n "$recovery_path" ]; then
                  [ -d "$recovery_path" ] && [ ! -L "$recovery_path" ]
                  [ "$(stat -c '%u:%g:%a:%h' "$recovery_path")" = '0:0:700:2' ]
                  recovery_files=$(find "$recovery_path" -mindepth 1 -maxdepth 1 -type f -printf '%u:%g:%m:%n\n' | sort)
                  [ -n "$recovery_files" ]
                  [ "$(find "$recovery_path" -mindepth 1 -maxdepth 1 | wc -l)" -eq "$(printf '%s\n' "$recovery_files" | wc -l)" ]
                  if printf '%s\n' "$recovery_files" | grep -Evq '^root:root:600:1$'; then exit 1; fi
                fi
                container_id=$(jq -r '.containerId' "$state")
                [ "$(docker inspect -f '{{.Id}}' redactwall 2>/dev/null || true)" = "$container_id" ]
                [ "$(docker inspect -f '{{.State.Running}}' "$container_id" 2>/dev/null || true)" = true ]
                [ "$(docker inspect -f '{{.Config.Image}}' "$container_id" 2>/dev/null || true)" = "$expected_image" ]
                [ "$(docker inspect -f '{{range .Mounts}}{{if eq .Destination "/license/redactwall.lic"}}{{.Source}}|{{.RW}}{{end}}{{end}}' "$container_id" 2>/dev/null || true)" = '/etc/redactwall/license/redactwall.lic|false' ]
                [ "$(docker inspect -f '{{range .Mounts}}{{if eq .Destination "/data"}}{{.Source}}|{{.RW}}{{end}}{{end}}' "$container_id" 2>/dev/null || true)" = '/var/lib/redactwall/runtime|true' ]
                [ "$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}missing{{end}}' "$container_id" 2>/dev/null || true)" = healthy ]
                ready=0
                for attempt in $(seq 1 12); do
                  if curl --fail --silent --show-error --max-time 3 http://127.0.0.1:4000/readyz >/dev/null; then
                    ready=1
                    break
                  fi
                  sleep 5
                done
                [ "$ready" -eq 1 ]
                license_sha=$(sha256sum /etc/redactwall/license/redactwall.lic | awk '{print $1}')
                [ "$license_sha" = "$(jq -r '.licenseSha256' "$state")" ]
                [ "$(stat -c '%u:%g:%a:%h' /etc/redactwall/license/redactwall.lic)" = '1000:1000:400:1' ]
                /usr/local/sbin/redactwall-verify-data-volume
                applied_state_digest=$(sha256sum "$state" | awk '{print $1}')
                applied_at=$(jq -r '.committedAt' "$state")
                authority_json=$(jq -cnS \
                  --arg appliedAt "$applied_at" --arg appliedStateDigest "$applied_state_digest" \
                  --arg configSha256 "$expected_config_sha256" --arg containerId "$container_id" \
                  --arg deploymentId '${DeploymentId}' --arg imageUri "$expected_image" \
                  --arg protocolSha256 "$expected_protocol_sha256" --arg recoverySetId "$expected_recovery_set" \
                  --arg secretArn "$expected_secret_arn" --arg secretVersionId "$expected_secret_version" \
                  --arg stackId '${AWS::StackId}' --arg templateSha256 "$expected_template_sha256" \
                  --arg tenantId '${TenantId}' \
                  '{appliedAt:$appliedAt,appliedStateDigest:$appliedStateDigest,configSha256:$configSha256,containerId:$containerId,deploymentId:$deploymentId,domain:"redactwall.applied-authority.v1",imageUri:$imageUri,protocolSha256:$protocolSha256,recoverySetId:$recoverySetId,secretArn:$secretArn,secretVersionId:$secretVersionId,stackId:$stackId,templateSha256:$templateSha256,tenantId:$tenantId,version:1}')
                authority_fingerprint=$(printf '%s' "$authority_json" | sha256sum | awk '{print $1}')
                printf 'REDACTWALL_APPLIED_CONTAINER_ID=%s\n' "$container_id"
                printf 'REDACTWALL_APPLIED_STATE_DIGEST=%s\n' "$applied_state_digest"
                printf 'REDACTWALL_APPLIED_AUTHORITY_FINGERPRINT=%s\n' "$authority_fingerprint"
                printf 'REDACTWALL_APPLIED_AT=%s\n' "$applied_at"
                printf 'REDACTWALL_APPLIED_RECOVERY_SET_ID=%s\n' "$expected_recovery_set"
                jq -r '.warnings[] | "REDACTWALL_APPLIED_WARNING=" + .' "$state"
              mode: '000700'
              owner: root
              group: root
            /usr/local/sbin/redactwall-apply-and-attest:
              content: !Sub |
                #!/bin/bash
                set -euo pipefail
                exec /usr/local/sbin/redactwall-cfn-update "$@"
              mode: '000700'
              owner: root
              group: root
            /usr/local/sbin/redactwall-cfn-update:
              content: !Sub |
                #!/bin/bash
                set -euo pipefail
                if [ "$#" -ne 0 ] && [ "$#" -ne 12 ]; then
                  echo "redactwall-cfn-update accepts either no arguments or one exact apply-and-attest contract" >&2
                  exit 2
                fi
                DEPLOY_LOCK=/run/redactwall-deploy.lock
                MAINTENANCE_LATCH=/etc/redactwall/maintenance-latch.json
                exec 9>"$DEPLOY_LOCK"
                flock -w 30 9 || {
                  echo "Another deployment or maintenance operation owns the host lock" >&2
                  exit 1
                }
                if [ -L "$MAINTENANCE_LATCH" ] || [ -e "$MAINTENANCE_LATCH" ]; then
                  echo "A maintenance latch is active; cfn-init is blocked" >&2
                  exit 1
                fi
                REDACTWALL_DEPLOY_LOCK_HELD=1 /opt/aws/bin/cfn-init -v \
                  --stack '${AWS::StackName}' --resource AppInstance --region '${AWS::Region}'
                if [ "$#" -eq 12 ]; then
                  /usr/local/sbin/redactwall-assert-applied "$@"
                fi
              mode: '000700'
              owner: root
              group: root
            /etc/redactwall/maintenance-context.json:
              content: !Sub |
                {"version":1,"stackId":"${AWS::StackId}","stackName":"${AWS::StackName}","region":"${AWS::Region}","tenantId":"${TenantId}","deploymentId":"${DeploymentId}","dataVolumeId":"${DataVolumeId}","recoverySetId":"${RecoverySetId}"}
              mode: '000600'
              owner: root
              group: root
            /usr/local/sbin/redactwall-maintenance-control:
              content: |
                #!/bin/bash
                set -euo pipefail
                umask 077
                DEPLOY_LOCK=/run/redactwall-deploy.lock
                MAINTENANCE_LATCH=/etc/redactwall/maintenance-latch.json
                APPLIED_STATE=/etc/redactwall/applied-deployment.json
                MAINTENANCE_CONTEXT=/etc/redactwall/maintenance-context.json
                DEPLOY_STATE_DIR=/etc/redactwall
                RETAINED_PARENT=/var/lib/redactwall/runtime/maintenance-recovery

                private_json_file() {
                  local target=$1 maximum=$2 size
                  [ ! -L "$target" ] && [ -f "$target" ] \
                    && [ "$(stat -c '%u:%g:%a:%h' "$target")" = '0:0:600:1' ] || return 1
                  size=$(stat -c '%s' "$target")
                  [ "$size" -gt 0 ] && [ "$size" -le "$maximum" ]
                }

                read_context() {
                  private_json_file "$MAINTENANCE_CONTEXT" 8192
                  jq -e '
                    type == "object"
                    and (keys | sort) == ["dataVolumeId","deploymentId","recoverySetId","region","stackId","stackName","tenantId","version"]
                    and .version == 1
                    and (.stackId | type == "string" and test("^arn:(aws|aws-us-gov|aws-cn):cloudformation:"))
                    and (.stackName | type == "string" and test("^[A-Za-z][A-Za-z0-9-]{0,127}$"))
                    and (.region | type == "string" and test("^[a-z]{2}(-gov)?-[a-z]+-[0-9]$"))
                    and (.tenantId | type == "string" and test("^[A-Za-z0-9][A-Za-z0-9._-]{1,63}$"))
                    and (.deploymentId | type == "string" and test("^dep_[a-f0-9]{32}$"))
                    and (.dataVolumeId | type == "string" and test("^vol-[a-f0-9]{8,17}$"))
                    and (.recoverySetId | type == "string" and test("^$|^[a-f0-9]{32}$"))
                  ' "$MAINTENANCE_CONTEXT" >/dev/null
                  context_stack_id=$(jq -r '.stackId' "$MAINTENANCE_CONTEXT")
                  context_tenant_id=$(jq -r '.tenantId' "$MAINTENANCE_CONTEXT")
                  context_deployment_id=$(jq -r '.deploymentId' "$MAINTENANCE_CONTEXT")
                  context_data_volume_id=$(jq -r '.dataVolumeId' "$MAINTENANCE_CONTEXT")
                  context_recovery_set_id=$(jq -r '.recoverySetId' "$MAINTENANCE_CONTEXT")
                  [ -n "$context_recovery_set_id" ] || context_recovery_set_id=none
                }

                read_state() {
                  private_json_file "$APPLIED_STATE" 32768
                  jq -e '
                    type == "object"
                    and (keys | sort) == ["committedAt","containerId","dataFilesystemUuid","dataVolumeId","desiredConfigSha256","imageUri","licenseSha256","protocolSha256","recoveryPath","secretArn","secretVersionId","templateSha256","version","warnings"]
                    and .version == 1
                    and (.containerId | type == "string" and test("^[a-f0-9]{64}$"))
                    and (.imageUri | type == "string" and test("^[0-9]{12}\\.dkr\\.ecr\\.[a-z0-9-]+\\.amazonaws\\.com(\\.cn)?/[a-z0-9]+([._/-][a-z0-9]+)*@sha256:[a-f0-9]{64}$"))
                    and (.desiredConfigSha256 | type == "string" and test("^[a-f0-9]{64}$"))
                    and (.templateSha256 | type == "string" and test("^[a-f0-9]{64}$"))
                    and (.protocolSha256 | type == "string" and test("^[a-f0-9]{64}$"))
                  ' "$APPLIED_STATE" >/dev/null
                  state_identity=$(stat -c '%d:%i:%s:%Y:%h' "$APPLIED_STATE")
                  state_sha256=$(sha256sum "$APPLIED_STATE" | awk '{print $1}')
                  container_id=$(jq -r '.containerId' "$APPLIED_STATE")
                  container_image=$(jq -r '.imageUri' "$APPLIED_STATE")
                  [ "$(jq -r '.dataVolumeId' "$APPLIED_STATE")" = "$context_data_volume_id" ]
                }

                assert_live_state() {
                  /usr/local/sbin/redactwall-assert-applied \
                    --image-uri "$container_image" \
                    --secret-version-id "$(jq -r '.secretVersionId' "$APPLIED_STATE")" \
                    --config-sha256 "$(jq -r '.desiredConfigSha256' "$APPLIED_STATE")" \
                    --template-sha256 "$(jq -r '.templateSha256' "$APPLIED_STATE")" \
                    --protocol-sha256 "$(jq -r '.protocolSha256' "$APPLIED_STATE")" \
                    --recovery-set-id "$context_recovery_set_id" >/dev/null
                }

                read_latch() {
                  private_json_file "$MAINTENANCE_LATCH" 32768
                  jq -e '
                    type == "object"
                    and (keys | sort) == ["appliedStateIdentity","appliedStateSha256","containerId","createdAt","dataVolumeId","deploymentId","imageUri","maintenanceId","partialArtifactCount","partialSetSha256","phase","recoveryArtifactCount","recoveryBackup","recoveryManifest","recoveryRootIdentity","recoverySetId","recoverySetSha256","stackId","tenantId","updatedAt","version"]
                    and .version == 1
                    and (.phase == "preparing" or .phase == "drained" or .phase == "stopped" or .phase == "resumed" or .phase == "resumed-partial")
                    and (.maintenanceId | type == "string" and test("^[a-f0-9]{32}$"))
                    and (.appliedStateIdentity | type == "string" and test("^[0-9]+:[0-9]+:[0-9]+:[0-9]+:[0-9]+$"))
                    and (.appliedStateSha256 | type == "string" and test("^[a-f0-9]{64}$"))
                    and (.containerId | type == "string" and test("^[a-f0-9]{64}$"))
                    and (.imageUri | type == "string")
                    and (.recoverySetId | type == "string" and test("^[a-f0-9]{32}$"))
                    and (.recoveryRootIdentity | type == "string" and test("^[0-9]+:[0-9]+:[0-9]+:[0-9]+:[0-9]+$"))
                    and ((.recoveryBackup == null and .recoveryManifest == null and .recoverySetSha256 == null
                      and .recoveryArtifactCount == 0
                      and (.partialArtifactCount | type == "number" and floor == . and . >= 0 and . <= 8)
                      and ((.partialArtifactCount == 0 and .partialSetSha256 == null)
                        or (.partialArtifactCount > 0 and (.partialSetSha256 | type == "string" and test("^[a-f0-9]{64}$"))))
                      and (.phase == "preparing" or .phase == "drained" or .phase == "stopped" or .phase == "resumed-partial"))
                      or ((.recoveryBackup | type == "string" and test("^[A-Za-z0-9._-]{1,180}$"))
                        and (.recoveryManifest | type == "string" and test("^[A-Za-z0-9._-]{1,180}$"))
                        and (.recoverySetSha256 | type == "string" and test("^[a-f0-9]{64}$"))
                        and (.recoveryArtifactCount | type == "number" and floor == . and . >= 4 and . <= 8)
                        and .partialSetSha256 == null and .partialArtifactCount == 0
                        and (.phase == "stopped" or .phase == "resumed")))
                    and (.createdAt | type == "string" and test("^[0-9]{4}-[0-9]{2}-[0-9]{2}T"))
                    and (.updatedAt | type == "string" and test("^[0-9]{4}-[0-9]{2}-[0-9]{2}T"))
                  ' "$MAINTENANCE_LATCH" >/dev/null
                  latch_identity=$(stat -c '%d:%i:%s:%Y:%h' "$MAINTENANCE_LATCH")
                  latch_phase=$(jq -r '.phase' "$MAINTENANCE_LATCH")
                  latch_maintenance_id=$(jq -r '.maintenanceId' "$MAINTENANCE_LATCH")
                  latch_created_at=$(jq -r '.createdAt' "$MAINTENANCE_LATCH")
                  recovery_set_id=$(jq -r '.recoverySetId // empty' "$MAINTENANCE_LATCH")
                  recovery_root_identity=$(jq -r '.recoveryRootIdentity // empty' "$MAINTENANCE_LATCH")
                  recovery_backup=$(jq -r '.recoveryBackup // empty' "$MAINTENANCE_LATCH")
                  recovery_manifest=$(jq -r '.recoveryManifest // empty' "$MAINTENANCE_LATCH")
                  recovery_set_sha256=$(jq -r '.recoverySetSha256 // empty' "$MAINTENANCE_LATCH")
                  recovery_artifact_count=$(jq -r '.recoveryArtifactCount' "$MAINTENANCE_LATCH")
                  partial_set_sha256=$(jq -r '.partialSetSha256 // empty' "$MAINTENANCE_LATCH")
                  partial_artifact_count=$(jq -r '.partialArtifactCount' "$MAINTENANCE_LATCH")
                }

                verify_latch_binding() {
                  jq -e \
                    --arg stackId "$context_stack_id" --arg tenantId "$context_tenant_id" \
                    --arg deploymentId "$context_deployment_id" --arg dataVolumeId "$context_data_volume_id" \
                    --arg stateIdentity "$state_identity" --arg stateSha256 "$state_sha256" \
                    --arg containerId "$container_id" --arg imageUri "$container_image" '
                      .stackId == $stackId and .tenantId == $tenantId and .deploymentId == $deploymentId
                      and .dataVolumeId == $dataVolumeId and .appliedStateIdentity == $stateIdentity
                      and .appliedStateSha256 == $stateSha256 and .containerId == $containerId
                      and .imageUri == $imageUri
                    ' "$MAINTENANCE_LATCH" >/dev/null
                  [ "$(docker inspect -f '{{.Id}}' redactwall 2>/dev/null || true)" = "$container_id" ]
                  [ "$(docker inspect -f '{{.Config.Image}}' "$container_id" 2>/dev/null || true)" = "$container_image" ]
                  retained_root="$RETAINED_PARENT/$recovery_set_id"
                  [ ! -L "$retained_root" ] && [ -d "$retained_root" ]
                  [ "$(stat -c '%d:%i:%u:%g:%a' "$retained_root")" = "$recovery_root_identity" ]
                }

                recovery_digest() {
                  local root=$1 expected_count=$2 names digests name count
                  [ ! -L "$root" ] && [ -d "$root" ] && [ "$(stat -c '%u:%g:%a' "$root")" = '0:0:700' ]
                  names=$(mktemp /run/redactwall-maintenance-names.XXXXXX)
                  digests=$(mktemp /run/redactwall-maintenance-digests.XXXXXX)
                  find "$root" -mindepth 1 -maxdepth 1 -printf '%f\n' | LC_ALL=C sort > "$names"
                  count=$(wc -l < "$names" | tr -d ' ')
                  [ "$count" -eq "$expected_count" ]
                  while IFS= read -r name; do
                    [[ "$name" =~ ^[A-Za-z0-9._-]{1,180}$ ]]
                    [ ! -L "$root/$name" ] && [ -f "$root/$name" ] \
                      && [ "$(stat -c '%u:%g:%a:%h' "$root/$name")" = '0:0:600:1' ]
                    printf '%s  %s\n' "$(sha256sum "$root/$name" | awk '{print $1}')" "$name" >> "$digests"
                  done < "$names"
                  sha256sum "$digests" | awk '{print $1}'
                  rm -- "$names" "$digests"
                }

                verify_recovery_set() {
                  local retained_root="$RETAINED_PARENT/$recovery_set_id" actual_digest partial_count partial_name
                  [ -n "$recovery_set_id" ] && [ -n "$recovery_root_identity" ]
                  [ "$(stat -c '%d:%i:%u:%g:%a' "$retained_root")" = "$recovery_root_identity" ]
                  if [ -z "$recovery_backup" ]; then
                    [ -z "$recovery_manifest" ] && [ -z "$recovery_set_sha256" ] \
                      && [ "$recovery_artifact_count" -eq 0 ]
                    partial_count=$(find "$retained_root" -mindepth 1 -maxdepth 1 -printf '%f\n' | wc -l | tr -d ' ')
                    [ "$partial_count" -le 8 ]
                    while IFS= read -r partial_name; do
                      [ -n "$partial_name" ] || continue
                      [[ "$partial_name" =~ ^[A-Za-z0-9._-]{1,180}$ ]]
                      [ ! -L "$retained_root/$partial_name" ] && [ -f "$retained_root/$partial_name" ] \
                        && [ "$(stat -c '%u:%g:%a:%h' "$retained_root/$partial_name")" = '0:0:600:1' ]
                      sha256sum "$retained_root/$partial_name" >/dev/null
                    done < <(find "$retained_root" -mindepth 1 -maxdepth 1 -printf '%f\n' | LC_ALL=C sort)
                    if [ "$partial_count" -gt 0 ]; then
                      actual_digest=$(recovery_digest "$retained_root" "$partial_count")
                    else
                      actual_digest=
                    fi
                    if [ "$latch_phase" = resumed-partial ]; then
                      [ "$partial_count" -eq "$partial_artifact_count" ]
                      [ "$actual_digest" = "$partial_set_sha256" ]
                    fi
                    partial_artifact_count=$partial_count
                    partial_set_sha256=$actual_digest
                    return 0
                  fi
                  actual_digest=$(recovery_digest "$retained_root" "$recovery_artifact_count")
                  [ "$actual_digest" = "$recovery_set_sha256" ]
                  [ -f "$retained_root/$recovery_backup" ] && [ -f "$retained_root/$recovery_manifest" ]
                  docker run --rm --network none --read-only --tmpfs /tmp:rw,noexec,nosuid,size=64m \
                    --cap-drop ALL --security-opt no-new-privileges --env-file /etc/redactwall/env \
                    -v "$retained_root:/recovery:ro" --entrypoint node "$container_image" \
                    scripts/backup-store.js verify --file "/recovery/$recovery_backup" \
                    --manifest "/recovery/$recovery_manifest" >/dev/null
                }

                write_latch() {
                  local phase=$1 set_id=$2 backup=$3 manifest=$4 set_sha=$5 count=$6 now created tmp prior_identity partial_sha partial_count
                  now=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)
                  created=${latch_created_at:-$now}
                  prior_identity=${latch_identity:-}
                  if [ -n "$backup" ]; then
                    partial_sha=
                    partial_count=0
                  else
                    partial_sha=${partial_set_sha256:-}
                    partial_count=${partial_artifact_count:-0}
                  fi
                  tmp=$(mktemp "$DEPLOY_STATE_DIR/.maintenance-latch.XXXXXX")
                  jq -cn \
                    --arg phase "$phase" --arg maintenanceId "$maintenance_id" \
                    --arg stackId "$context_stack_id" --arg tenantId "$context_tenant_id" \
                    --arg deploymentId "$context_deployment_id" --arg dataVolumeId "$context_data_volume_id" \
                    --arg stateIdentity "$state_identity" --arg stateSha256 "$state_sha256" \
                    --arg containerId "$container_id" --arg imageUri "$container_image" \
                    --arg recoverySetId "$set_id" --arg recoveryRootIdentity "$recovery_root_identity" \
                    --arg recoveryBackup "$backup" \
                    --arg recoveryManifest "$manifest" --arg recoverySetSha256 "$set_sha" \
                    --arg partialSetSha256 "$partial_sha" --argjson partialArtifactCount "$partial_count" \
                    --argjson recoveryArtifactCount "$count" --arg createdAt "$created" --arg updatedAt "$now" '
                      {version: 1, phase: $phase, maintenanceId: $maintenanceId, stackId: $stackId,
                       tenantId: $tenantId, deploymentId: $deploymentId, dataVolumeId: $dataVolumeId,
                       appliedStateIdentity: $stateIdentity, appliedStateSha256: $stateSha256,
                       containerId: $containerId, imageUri: $imageUri,
                       recoverySetId: $recoverySetId, recoveryRootIdentity: $recoveryRootIdentity,
                       recoveryBackup: (if $recoveryBackup == "" then null else $recoveryBackup end),
                       recoveryManifest: (if $recoveryManifest == "" then null else $recoveryManifest end),
                       recoverySetSha256: (if $recoverySetSha256 == "" then null else $recoverySetSha256 end),
                        recoveryArtifactCount: $recoveryArtifactCount,
                        partialSetSha256: (if $partialSetSha256 == "" then null else $partialSetSha256 end),
                        partialArtifactCount: $partialArtifactCount, createdAt: $createdAt, updatedAt: $updatedAt}
                    ' > "$tmp"
                  chmod 600 "$tmp"
                  sync -f "$tmp"
                  if [ -n "$prior_identity" ]; then
                    [ "$(stat -c '%d:%i:%s:%Y:%h' "$MAINTENANCE_LATCH")" = "$prior_identity" ]
                  else
                    [ ! -e "$MAINTENANCE_LATCH" ] && [ ! -L "$MAINTENANCE_LATCH" ]
                  fi
                  mv -fT -- "$tmp" "$MAINTENANCE_LATCH"
                  sync -f "$DEPLOY_STATE_DIR"
                }

                print_status() {
                  printf 'REDACTWALL_MAINTENANCE_PHASE=%s\n' "$latch_phase"
                  printf 'REDACTWALL_MAINTENANCE_SET=%s\n' "$latch_maintenance_id"
                  if [ -n "$recovery_backup" ]; then
                    printf 'REDACTWALL_MAINTENANCE_BACKUP=%s\n' "$recovery_backup"
                    printf 'REDACTWALL_MAINTENANCE_MANIFEST=%s\n' "$recovery_manifest"
                  fi
                  printf 'REDACTWALL_MAINTENANCE_LATCH_SHA256=%s\n' "$(sha256sum "$MAINTENANCE_LATCH" | awk '{print $1}')"
                }

                exec 9>"$DEPLOY_LOCK"
                flock -w 30 9 || {
                  echo "Another deployment or maintenance operation owns the host lock" >&2
                  exit 1
                }
                [ ! -L "$DEPLOY_STATE_DIR" ] && [ -d "$DEPLOY_STATE_DIR" ] \
                  && [ "$(stat -c '%u:%g:%a' "$DEPLOY_STATE_DIR")" = '0:0:700' ]
                read_context
                operation=${1:-}
                case "$operation" in
                  drain)
                    [ "$#" -eq 1 ]
                    [ ! -e "$MAINTENANCE_LATCH" ] && [ ! -L "$MAINTENANCE_LATCH" ]
                    read_state
                    assert_live_state
                    maintenance_id=$(openssl rand -hex 16)
                    if [ -e "$RETAINED_PARENT" ] || [ -L "$RETAINED_PARENT" ]; then
                      [ ! -L "$RETAINED_PARENT" ] && [ -d "$RETAINED_PARENT" ] \
                        && [ "$(stat -c '%u:%g:%a' "$RETAINED_PARENT")" = '0:0:700' ]
                    else
                      mkdir -- "$RETAINED_PARENT"
                      chown root:root "$RETAINED_PARENT"
                      chmod 700 "$RETAINED_PARENT"
                      sync -f /var/lib/redactwall
                    fi
                    retained_root="$RETAINED_PARENT/$maintenance_id"
                    [ ! -e "$retained_root" ] && [ ! -L "$retained_root" ]
                    mkdir -- "$retained_root"
                    chown root:root "$retained_root"
                    chmod 700 "$retained_root"
                    sync -f "$RETAINED_PARENT"
                    recovery_root_identity=$(stat -c '%d:%i:%u:%g:%a' "$retained_root")
                    latch_created_at=
                    latch_identity=
                    write_latch "preparing" "$maintenance_id" "" "" "" 0
                    read_latch
                    printf 'REDACTWALL_MAINTENANCE_PHASE=preparing\n'
                    printf 'REDACTWALL_MAINTENANCE_SET=%s\n' "$maintenance_id"
                    printf 'REDACTWALL_MAINTENANCE_LATCH_SHA256=%s\n' "$(sha256sum "$MAINTENANCE_LATCH" | awk '{print $1}')"
                    ;;
                  checkpoint)
                    [ "$#" -eq 3 ] && [[ "$2" =~ ^[a-f0-9]{32}$ ]] && [[ "$3" =~ ^[a-f0-9]{64}$ ]]
                    read_latch
                    [ "$latch_phase" = preparing ] && [ "$latch_maintenance_id" = "$2" ]
                    [ "$(sha256sum "$MAINTENANCE_LATCH" | awk '{print $1}')" = "$3" ]
                    maintenance_id=$latch_maintenance_id
                    read_state
                    verify_latch_binding
                    assert_live_state
                    write_latch "drained" "$maintenance_id" "" "" "" 0
                    read_latch
                    docker stop -t 30 "$container_id" >/dev/null
                    [ "$(docker inspect -f '{{.State.Running}}' "$container_id" 2>/dev/null || true)" = false ]
                    write_latch "stopped" "$maintenance_id" "" "" "" 0
                    read_latch

                    container_out="/data/backups/maintenance/$maintenance_id"
                    maintenance_backup() {
                      docker run --rm --network none --read-only --tmpfs /tmp:rw,noexec,nosuid,size=64m \
                        --cap-drop ALL --security-opt no-new-privileges --env-file /etc/redactwall/env \
                        -v /var/lib/redactwall/runtime:/data --entrypoint node "$container_image" "$@"
                    }
                    result=$(maintenance_backup scripts/backup-store.js create --out "$container_out")
                    backup_file=$(printf '%s' "$result" | jq -er --arg prefix "$container_out/" '.file | select(type == "string" and startswith($prefix))')
                    manifest_file=$(printf '%s' "$result" | jq -er --arg prefix "$container_out/" '.manifestFile | select(type == "string" and startswith($prefix))')
                    maintenance_backup scripts/backup-store.js verify --file "$backup_file" --manifest "$manifest_file" >/dev/null
                    retained_root="$RETAINED_PARENT/$maintenance_id"
                    [ "$(stat -c '%d:%i:%u:%g:%a' "$retained_root")" = "$recovery_root_identity" ]
                    source_root="/var/lib/redactwall/runtime/backups/maintenance/$maintenance_id"
                    [ ! -L "$source_root" ] && [ -d "$source_root" ] \
                      && [ "$(stat -c '%u:%g:%a' "$source_root")" = '1000:1000:700' ]
                    artifact_count=0
                    while IFS= read -r source_artifact; do
                      [ -f "$source_artifact" ] && [ ! -L "$source_artifact" ] \
                        && [ "$(stat -c '%h:%u:%g:%a' "$source_artifact")" = '1:1000:1000:600' ]
                      artifact_name=$(basename "$source_artifact")
                      [[ "$artifact_name" =~ ^[A-Za-z0-9._-]{1,180}$ ]]
                      artifact_count=$((artifact_count + 1))
                      [ "$artifact_count" -le 8 ]
                      retained_artifact="$retained_root/$artifact_name"
                      [ ! -e "$retained_artifact" ] && [ ! -L "$retained_artifact" ]
                      cp --reflink=never --no-clobber -- "$source_artifact" "$retained_artifact"
                      chown root:root "$retained_artifact"
                      chmod 600 "$retained_artifact"
                      sync -f "$retained_artifact"
                    done < <(find "$source_root" -mindepth 1 -maxdepth 1 -type f -print)
                    [ "$artifact_count" -ge 4 ]
                    [ "$(find "$source_root" -mindepth 1 -maxdepth 1 | wc -l)" -eq "$artifact_count" ]
                    sync -f "$retained_root"
                    backup_name=$(basename "$backup_file")
                    manifest_name=$(basename "$manifest_file")
                    [[ "$backup_name" =~ ^[A-Za-z0-9._-]{1,180}$ ]]
                    [[ "$manifest_name" =~ ^[A-Za-z0-9._-]{1,180}$ ]]
                    recovery_sha256=$(recovery_digest "$retained_root" "$artifact_count")
                    docker run --rm --network none --read-only --tmpfs /tmp:rw,noexec,nosuid,size=64m \
                      --cap-drop ALL --security-opt no-new-privileges --env-file /etc/redactwall/env \
                      -v "$retained_root:/recovery:ro" --entrypoint node "$container_image" \
                      scripts/backup-store.js verify --file "/recovery/$backup_name" \
                      --manifest "/recovery/$manifest_name" >/dev/null

                    read_latch
                    read_state
                    verify_latch_binding
                    [ "$(docker inspect -f '{{.State.Running}}' "$container_id" 2>/dev/null || true)" = false ]
                    write_latch "stopped" "$maintenance_id" "$backup_name" "$manifest_name" "$recovery_sha256" "$artifact_count"
                    read_latch
                    printf 'REDACTWALL_MAINTENANCE_PHASE=stopped\n'
                    printf 'REDACTWALL_MAINTENANCE_SET=%s\n' "$maintenance_id"
                    printf 'REDACTWALL_MAINTENANCE_BACKUP=%s\n' "$backup_name"
                    printf 'REDACTWALL_MAINTENANCE_MANIFEST=%s\n' "$manifest_name"
                    printf 'REDACTWALL_MAINTENANCE_LATCH_SHA256=%s\n' "$(sha256sum "$MAINTENANCE_LATCH" | awk '{print $1}')"
                    ;;
                  resume)
                    [ "$#" -eq 3 ] && [[ "$2" =~ ^[a-f0-9]{32}$ ]] && [[ "$3" =~ ^[a-f0-9]{64}$ ]]
                    read_latch
                    [ "$latch_phase" != preparing ]
                    [ -n "$recovery_backup" ]
                    [ "$latch_maintenance_id" = "$2" ]
                    [ "$(sha256sum "$MAINTENANCE_LATCH" | awk '{print $1}')" = "$3" ]
                    maintenance_id=$latch_maintenance_id
                    read_state
                    verify_latch_binding
                    verify_recovery_set
                    running=$(docker inspect -f '{{.State.Running}}' "$container_id" 2>/dev/null || true)
                    if [ "$running" = false ]; then docker start "$container_id" >/dev/null; else [ "$running" = true ]; fi
                    assert_live_state
                    write_latch "resumed" "$recovery_set_id" "$recovery_backup" "$recovery_manifest" \
                      "$recovery_set_sha256" "$recovery_artifact_count"
                    read_latch
                    print_status
                    ;;
                  status)
                    [ "$#" -eq 1 ]
                    read_latch
                    read_state
                    verify_latch_binding
                    verify_recovery_set
                    print_status
                    ;;
                  abort)
                    [ "$#" -eq 3 ] && [[ "$2" =~ ^[a-f0-9]{32}$ ]] && [[ "$3" =~ ^[a-f0-9]{64}$ ]]
                    read_latch
                    [ "$latch_maintenance_id" = "$2" ]
                    [ "$(sha256sum "$MAINTENANCE_LATCH" | awk '{print $1}')" = "$3" ]
                    case "$latch_phase" in
                      preparing|drained|stopped) ;;
                      resumed) print_status; exit 0 ;;
                      *) exit 1 ;;
                    esac
                    maintenance_id=$latch_maintenance_id
                    read_state
                    verify_latch_binding
                    verify_recovery_set
                    running=$(docker inspect -f '{{.State.Running}}' "$container_id" 2>/dev/null || true)
                    if [ "$running" = false ]; then docker start "$container_id" >/dev/null; else [ "$running" = true ]; fi
                    assert_live_state
                    if [ -n "$recovery_backup" ]; then
                      write_latch "resumed" "$recovery_set_id" "$recovery_backup" "$recovery_manifest" \
                        "$recovery_set_sha256" "$recovery_artifact_count"
                    else
                      write_latch "resumed-partial" "$recovery_set_id" "" "" "" 0
                    fi
                    read_latch
                    print_status
                    ;;
                  clear)
                    [ "$#" -eq 3 ] && [[ "$2" =~ ^[a-f0-9]{32}$ ]] && [[ "$3" =~ ^[a-f0-9]{64}$ ]]
                    read_latch
                    [ "$latch_maintenance_id" = "$2" ]
                    case "$latch_phase" in resumed|resumed-partial) ;; *) exit 1 ;; esac
                    [ "$(sha256sum "$MAINTENANCE_LATCH" | awk '{print $1}')" = "$3" ]
                    maintenance_id=$latch_maintenance_id
                    read_state
                    verify_latch_binding
                    verify_recovery_set
                    assert_live_state
                    expected_latch_identity=$latch_identity
                    [ "$(stat -c '%d:%i:%s:%Y:%h' "$MAINTENANCE_LATCH")" = "$expected_latch_identity" ]
                    rm -- "$MAINTENANCE_LATCH"
                    sync -f "$DEPLOY_STATE_DIR"
                    ;;
                  *)
                    echo "usage: redactwall-maintenance-control <drain|checkpoint|status|abort|resume|clear> [maintenance-id latch-sha256]" >&2
                    exit 2
                    ;;
                esac
              mode: '000700'
              owner: root
              group: root
            /usr/local/sbin/redactwall-maintenance-drain:
              content: |
                #!/bin/bash
                set -euo pipefail
                [ "$#" -eq 0 ]
                exec /usr/local/sbin/redactwall-maintenance-control drain
              mode: '000700'
              owner: root
              group: root
            /usr/local/sbin/redactwall-maintenance-resume:
              content: |
                #!/bin/bash
                set -euo pipefail
                [ "$#" -eq 2 ]
                exec /usr/local/sbin/redactwall-maintenance-control resume "$1" "$2"
              mode: '000700'
              owner: root
              group: root
            /usr/local/sbin/redactwall-maintenance-clear:
              content: |
                #!/bin/bash
                set -euo pipefail
                [ "$#" -eq 2 ]
                exec /usr/local/sbin/redactwall-maintenance-control clear "$1" "$2"
              mode: '000700'
              owner: root
              group: root
            /usr/local/sbin/redactwall-maintenance-status:
              content: |
                #!/bin/bash
                set -euo pipefail
                [ "$#" -eq 0 ]
                exec /usr/local/sbin/redactwall-maintenance-control status
              mode: '000700'
              owner: root
              group: root
            /usr/local/sbin/redactwall-maintenance-abort:
              content: |
                #!/bin/bash
                set -euo pipefail
                [ "$#" -eq 2 ]
                exec /usr/local/sbin/redactwall-maintenance-control abort "$1" "$2"
              mode: '000700'
              owner: root
              group: root
            /usr/local/sbin/redactwall-maintenance-checkpoint:
              content: |
                #!/bin/bash
                set -euo pipefail
                [ "$#" -eq 2 ]
                exec /usr/local/sbin/redactwall-maintenance-control checkpoint "$1" "$2"
              mode: '000700'
              owner: root
              group: root
          commands:
            01_deploy_redactwall:
              command: /usr/local/sbin/redactwall-deploy
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      MetadataOptions:
        HttpEndpoint: enabled
        HttpTokens: required
        HttpPutResponseHopLimit: 1
        InstanceMetadataTags: disabled
      IamInstanceProfile: !Ref InstanceProfile
      SubnetId: !Ref InstanceSubnetId
      SecurityGroupIds:
        - !Ref AppSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: !Ref RootVolumeGb
            VolumeType: gp3
            Encrypted: true
            DeleteOnTermination: true
      Tags:
        - Key: Name
          Value: !Sub redactwall-${TenantId}
        - Key: RedactWallTenant
          Value: !Ref TenantId
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euo pipefail

          bootstrap_failed() {
            exit_code=$?
            trap - EXIT
            if [ "$exit_code" -eq 0 ]; then exit_code=1; fi
            /opt/aws/bin/cfn-signal --exit-code "$exit_code" '${DeploymentWaitHandle}' || true
            exit "$exit_code"
          }
          trap bootstrap_failed EXIT

          dnf update -y
          dnf install -y docker awscli curl jq aws-cfn-bootstrap xfsprogs util-linux

          DATA_VOLUME_ID='${DataVolumeId}'
          SOURCE_DATA_VOLUME_ID='${SourceDataVolumeId}'
          DATA_STACK_NAME='${DataStackName}'
          TENANT_ID='${TenantId}'
          DATA_VOLUME_SERIAL=$(printf '%s' "$DATA_VOLUME_ID" | tr -d '-' | tr '[:upper:]' '[:lower:]')
          DATA_DEVICE=
          for attempt in $(seq 1 120); do
            while IFS= read -r candidate; do
              [ -n "$candidate" ] || continue
              candidate_serial=$(lsblk -ndo SERIAL "$candidate" 2>/dev/null | tr -d '-' | tr '[:upper:]' '[:lower:]')
              if [ "$candidate_serial" = "$DATA_VOLUME_SERIAL" ]; then
                if [ -n "$DATA_DEVICE" ] && [ "$DATA_DEVICE" != "$candidate" ]; then
                  echo "The retained data volume resolved to multiple block devices" >&2
                  exit 1
                fi
                DATA_DEVICE=$candidate
              fi
            done < <(lsblk -dpno NAME,TYPE | awk '$2 == "disk" { print $1 }')
            [ -n "$DATA_DEVICE" ] && break
            sleep 5
          done
          if [ -z "$DATA_DEVICE" ]; then
            echo "The retained RedactWall data volume did not attach before the deadline" >&2
            exit 1
          fi

          imds_token=$(curl --fail --silent --show-error --max-time 3 -X PUT \
            -H 'X-aws-ec2-metadata-token-ttl-seconds: 60' http://169.254.169.254/latest/api/token)
          instance_id=$(curl --fail --silent --show-error --max-time 3 \
            -H "X-aws-ec2-metadata-token: $imds_token" http://169.254.169.254/latest/meta-data/instance-id)
          [[ "$instance_id" =~ ^i-[a-f0-9]{8,17}$ ]]
          volume_json=
          for describe_attempt in $(seq 1 12); do
            volume_json=$(aws ec2 describe-volumes --volume-ids "$DATA_VOLUME_ID" --region '${AWS::Region}' --output json 2>/dev/null) && break
            sleep 5
          done
          data_stack_id=$(aws cloudformation describe-stacks --stack-name "$DATA_STACK_NAME" --region '${AWS::Region}' \
            --query 'Stacks[0].StackId' --output text)
          [[ "$data_stack_id" =~ ^arn:(aws|aws-us-gov|aws-cn):cloudformation:[a-z0-9-]+:[0-9]{12}:stack/[A-Za-z][-A-Za-z0-9]{0,127}/[a-f0-9-]{16,64}$ ]]
          if [ -z "$volume_json" ] || ! printf '%s' "$volume_json" | jq -e \
            --arg volumeId "$DATA_VOLUME_ID" --arg instanceId "$instance_id" \
            --arg availabilityZone '${InstanceAvailabilityZone}' --arg tenantId "$TENANT_ID" \
            --arg dataStackName "$DATA_STACK_NAME" --arg dataStackId "$data_stack_id" '
              (.Volumes | length) == 1
              and .Volumes[0].VolumeId == $volumeId and .Volumes[0].Encrypted == true
              and .Volumes[0].VolumeType == "gp3" and .Volumes[0].MultiAttachEnabled == false
              and .Volumes[0].AvailabilityZone == $availabilityZone and .Volumes[0].State == "in-use"
              and (.Volumes[0].Attachments | length) == 1
              and any(.Volumes[0].Attachments[]; .InstanceId == $instanceId and .Device == "/dev/sdf"
                and (.State == "attached" or .State == "attaching"))
              and ([.Volumes[0].Tags[] | select(.Key == "RedactWallTenant") | .Value] == [$tenantId])
              and ([.Volumes[0].Tags[] | select(.Key == "RedactWallPurpose") | .Value] == ["evidence-store"])
              and ([.Volumes[0].Tags[] | select(.Key == "RedactWallAuthority") | .Value] == ["retained-external"])
              and ([.Volumes[0].Tags[] | select(.Key == "aws:cloudformation:stack-name") | .Value] == [$dataStackName])
              and ([.Volumes[0].Tags[] | select(.Key == "aws:cloudformation:logical-id") | .Value] == ["CustomerDataVolume"])
              and ([.Volumes[0].Tags[] | select(.Key == "aws:cloudformation:stack-id") | .Value] == [$dataStackId])
              and (.Volumes[0].CreateTime | type == "string")
            ' >/dev/null; then
            echo "The attached data volume failed the exact gp3, tenant, stack, encryption, or attachment contract" >&2
            exit 1
          fi

          FORMATTED_FRESH=0
          DATA_FS_TYPE=$(blkid -s TYPE -o value "$DATA_DEVICE" 2>/dev/null || true)
          if [ -z "$DATA_FS_TYPE" ]; then
            if [ -n "$(wipefs -n --noheadings -o TYPE "$DATA_DEVICE" 2>/dev/null | tr -d '[:space:]')" ]; then
              echo "The unformatted data volume contains an unrecognized filesystem signature" >&2
              exit 1
            fi
            if [ -n "$SOURCE_DATA_VOLUME_ID" ] || ! printf '%s' "$volume_json" | jq -e \
              '(.Volumes[0].SnapshotId == null or .Volumes[0].SnapshotId == "")' >/dev/null; then
              echo "A blank data device was not proven to be this stack's fresh no-snapshot volume" >&2
              exit 1
            fi
            volume_created=$(printf '%s' "$volume_json" | jq -r '.Volumes[0].CreateTime')
            created_epoch=$(date -d "$volume_created" +%s 2>/dev/null || true)
            now_epoch=$(date +%s)
            if ! [[ "$created_epoch" =~ ^[0-9]+$ ]] \
              || [ "$created_epoch" -gt "$now_epoch" ] \
              || [ $((now_epoch - created_epoch)) -gt 3600 ]; then
              echo "A blank retained volume is too old or ambiguous to format automatically" >&2
              exit 1
            fi
            mkfs.xfs -f -L REDACTWALL_DATA "$DATA_DEVICE"
            FORMATTED_FRESH=1
            DATA_FS_TYPE=xfs
          elif [ "$DATA_FS_TYPE" != xfs ]; then
            echo "The retained RedactWall data volume is not XFS" >&2
            exit 1
          fi
          unset volume_json imds_token
          DATA_FS_UUID=$(blkid -s UUID -o value "$DATA_DEVICE")
          if ! [[ "$DATA_FS_UUID" =~ ^[A-Fa-f0-9-]{16,64}$ ]]; then
            echo "The retained data volume has no valid filesystem UUID" >&2
            exit 1
          fi

          install -d -m 700 -o root -g root /var/lib/redactwall
          expected_fstab="UUID=$DATA_FS_UUID /var/lib/redactwall xfs defaults,x-systemd.device-timeout=300 0 2"
          existing_fstab=$(awk '$2 == "/var/lib/redactwall" { print }' /etc/fstab)
          if [ -n "$existing_fstab" ] && [ "$existing_fstab" != "$expected_fstab" ]; then
            echo "The retained data-volume fstab identity does not match this stack" >&2
            exit 1
          fi
          if [ -z "$existing_fstab" ]; then
            printf '%s\n' "$expected_fstab" >> /etc/fstab
            sync -f /etc/fstab
          fi
          mount /var/lib/redactwall
          [ "$(findmnt -n -o UUID --target /var/lib/redactwall)" = "$DATA_FS_UUID" ]
          chown root:root /var/lib/redactwall
          chmod 700 /var/lib/redactwall

          VOLUME_MARKER=/var/lib/redactwall/.redactwall-volume-identity.json
          if [ -e "$VOLUME_MARKER" ] || [ -L "$VOLUME_MARKER" ]; then
            if [ -L "$VOLUME_MARKER" ] || [ ! -f "$VOLUME_MARKER" ] \
              || [ "$(stat -c '%u:%g:%a:%h' "$VOLUME_MARKER")" != '0:0:600:1' ] \
              || ! jq -e --arg volumeId "$DATA_VOLUME_ID" --arg sourceVolumeId "$SOURCE_DATA_VOLUME_ID" \
                --arg filesystemUuid "$DATA_FS_UUID" --arg tenantId "$TENANT_ID" '
                 type == "object" and .filesystemUuid == $filesystemUuid and .tenantId == $tenantId
                 and ((.version == 3 and (keys | sort) == ["filesystemUuid","tenantId","version","volumeId"])
                   or (.version == 4 and (keys | sort) == ["filesystemUuid","sourceVolumeId","tenantId","version","volumeId"]))
                 and (($sourceVolumeId == "" and .version == 3 and .volumeId == $volumeId)
                   or ($sourceVolumeId != "" and
                     ((.volumeId == $sourceVolumeId)
                       or (.version == 4 and .volumeId == $volumeId and .sourceVolumeId == $sourceVolumeId))))' \
                "$VOLUME_MARKER" >/dev/null; then
              echo "The retained data-volume marker does not match the attached volume" >&2
              exit 1
            fi
            marker_volume_id=$(jq -r '.volumeId' "$VOLUME_MARKER")
            if [ "$marker_volume_id" != "$DATA_VOLUME_ID" ]; then
              marker_tmp=$(mktemp /var/lib/redactwall/.redactwall-volume-identity.XXXXXX)
              jq -cn --arg volumeId "$DATA_VOLUME_ID" --arg sourceVolumeId "$marker_volume_id" \
                --arg filesystemUuid "$DATA_FS_UUID" --arg tenantId "$TENANT_ID" \
                '{version:4,volumeId:$volumeId,sourceVolumeId:$sourceVolumeId,filesystemUuid:$filesystemUuid,tenantId:$tenantId}' > "$marker_tmp"
              chmod 600 "$marker_tmp"
              sync -f "$marker_tmp"
              mv -T "$marker_tmp" "$VOLUME_MARKER"
              sync -f /var/lib/redactwall
            fi
          else
            if [ "$FORMATTED_FRESH" -ne 1 ] || [ -n "$SOURCE_DATA_VOLUME_ID" ]; then
              echo "A preformatted or snapshot-restored data volume without a tenant-bound marker will not be adopted" >&2
              exit 1
            fi
            unexpected_entries=$(find /var/lib/redactwall -mindepth 1 -maxdepth 1 ! -name lost+found -print -quit)
            if [ -n "$unexpected_entries" ]; then
              echo "An unbound data volume contains existing state and will not be adopted" >&2
              exit 1
            fi
            marker_tmp=$(mktemp /var/lib/redactwall/.redactwall-volume-identity.XXXXXX)
            jq -cn --arg volumeId "$DATA_VOLUME_ID" --arg filesystemUuid "$DATA_FS_UUID" --arg tenantId "$TENANT_ID" \
              '{version:3,volumeId:$volumeId,filesystemUuid:$filesystemUuid,tenantId:$tenantId}' > "$marker_tmp"
            chmod 600 "$marker_tmp"
            sync -f "$marker_tmp"
            mv -T "$marker_tmp" "$VOLUME_MARKER"
            sync -f /var/lib/redactwall
          fi
          if [ -e /var/lib/redactwall/runtime ] || [ -L /var/lib/redactwall/runtime ]; then
            if [ -L /var/lib/redactwall/runtime ] || [ ! -d /var/lib/redactwall/runtime ] \
              || [ "$(stat -c '%u:%g:%a' /var/lib/redactwall/runtime)" != '1000:1000:700' ]; then
              echo "The retained runtime directory is not trusted private state" >&2
              exit 1
            fi
          else
            install -d -m 700 -o 1000 -g 1000 /var/lib/redactwall/runtime
            sync -f /var/lib/redactwall
          fi

          cat > /usr/local/sbin/redactwall-verify-data-volume <<EOF
          #!/bin/bash
          set -euo pipefail
          mountpoint -q /var/lib/redactwall
          source_device=\$(readlink -f "\$(findmnt -n -o SOURCE --target /var/lib/redactwall)")
          source_serial=\$(lsblk -ndo SERIAL "\$source_device" | tr -d '-' | tr '[:upper:]' '[:lower:]')
          [ "\$source_serial" = '$DATA_VOLUME_SERIAL' ]
          [ "\$(findmnt -n -o UUID --target /var/lib/redactwall)" = '$DATA_FS_UUID' ]
          volume_json=\$(aws ec2 describe-volumes --volume-ids '$DATA_VOLUME_ID' --region '${AWS::Region}' --output json)
          data_stack_id=\$(aws cloudformation describe-stacks --stack-name '$DATA_STACK_NAME' --region '${AWS::Region}' --query 'Stacks[0].StackId' --output text)
          [[ "\$data_stack_id" =~ ^arn:(aws|aws-us-gov|aws-cn):cloudformation:[a-z0-9-]+:[0-9]{12}:stack/[A-Za-z][-A-Za-z0-9]{0,127}/[a-f0-9-]{16,64}$ ]]
          printf '%s' "\$volume_json" | jq -e --arg volumeId '$DATA_VOLUME_ID' --arg instanceId '$instance_id' \
            --arg availabilityZone '${InstanceAvailabilityZone}' --arg tenantId '$TENANT_ID' \
            --arg dataStackName '$DATA_STACK_NAME' --arg dataStackId "\$data_stack_id" '
              (.Volumes | length) == 1 and .Volumes[0].VolumeId == \$volumeId
              and .Volumes[0].Encrypted == true and .Volumes[0].VolumeType == "gp3"
              and .Volumes[0].MultiAttachEnabled == false and .Volumes[0].AvailabilityZone == \$availabilityZone
              and .Volumes[0].State == "in-use" and (.Volumes[0].Attachments | length) == 1
              and any(.Volumes[0].Attachments[]; .InstanceId == \$instanceId and .Device == "/dev/sdf" and .State == "attached")
              and ([.Volumes[0].Tags[] | select(.Key == "RedactWallTenant") | .Value] == [\$tenantId])
              and ([.Volumes[0].Tags[] | select(.Key == "RedactWallPurpose") | .Value] == ["evidence-store"])
              and ([.Volumes[0].Tags[] | select(.Key == "RedactWallAuthority") | .Value] == ["retained-external"])
              and ([.Volumes[0].Tags[] | select(.Key == "aws:cloudformation:stack-name") | .Value] == [\$dataStackName])
              and ([.Volumes[0].Tags[] | select(.Key == "aws:cloudformation:logical-id") | .Value] == ["CustomerDataVolume"])
              and ([.Volumes[0].Tags[] | select(.Key == "aws:cloudformation:stack-id") | .Value] == [\$dataStackId])
            ' >/dev/null
          [ "\$(stat -c '%u:%g:%a:%h' /var/lib/redactwall/.redactwall-volume-identity.json)" = '0:0:600:1' ]
          jq -e --arg volumeId '$DATA_VOLUME_ID' --arg sourceVolumeId '$SOURCE_DATA_VOLUME_ID' --arg filesystemUuid '$DATA_FS_UUID' --arg tenantId '$TENANT_ID' \
            'type == "object"
             and ((\$sourceVolumeId == "" and .version == 3 and (keys | sort) == ["filesystemUuid","tenantId","version","volumeId"])
               or (\$sourceVolumeId != "" and .version == 4 and (keys | sort) == ["filesystemUuid","sourceVolumeId","tenantId","version","volumeId"] and .sourceVolumeId == \$sourceVolumeId))
             and .volumeId == \$volumeId and .filesystemUuid == \$filesystemUuid and .tenantId == \$tenantId' \
            /var/lib/redactwall/.redactwall-volume-identity.json >/dev/null
          [ "\$(stat -c '%u:%g:%a' /var/lib/redactwall/runtime)" = '1000:1000:700' ]
          EOF
          chmod 700 /usr/local/sbin/redactwall-verify-data-volume
          install -d -m 755 /etc/systemd/system/docker.service.d
          cat > /etc/systemd/system/redactwall-data-identity.service <<'EOF'
          [Unit]
          Description=Verify the retained RedactWall evidence volume identity
          RequiresMountsFor=/var/lib/redactwall
          Wants=network-online.target
          After=network-online.target
          Before=docker.service

          [Service]
          Type=oneshot
          ExecStart=/usr/local/sbin/redactwall-verify-data-volume
          RemainAfterExit=yes
          EOF
          cat > /etc/systemd/system/docker.service.d/redactwall-data.conf <<'EOF'
          [Unit]
          Requires=redactwall-data-identity.service
          After=redactwall-data-identity.service
          EOF
          systemctl daemon-reload
          systemctl start redactwall-data-identity.service

          systemctl enable --now docker

          RECOVERY_BACKUP_NAME='${RecoveryBackupName}'
          RECOVERY_MANIFEST_NAME='${RecoveryManifestName}'
          RECOVERY_SET_ID='${RecoverySetId}'
          if [ -n "$RECOVERY_BACKUP_NAME" ]; then
            recovery_root="/var/lib/redactwall/runtime/maintenance-recovery/$RECOVERY_SET_ID"
            recovery_backup="$recovery_root/$RECOVERY_BACKUP_NAME"
            recovery_manifest="$recovery_root/$RECOVERY_MANIFEST_NAME"
            for recovery_artifact in "$recovery_backup" "$recovery_manifest"; do
              [ ! -L "$recovery_artifact" ] && [ -f "$recovery_artifact" ] \
                && [ "$(stat -c '%u:%g:%a:%h' "$recovery_artifact")" = '0:0:600:1' ] || exit 1
            done
            recovery_secret=$(aws secretsmanager get-secret-value --secret-id '${SecretArn}' \
              --version-id '${LicenseSecretVersionId}' --region '${AWS::Region}' --query SecretString --output text)
            recovery_secret_value=$(printf '%s' "$recovery_secret" | jq -er '.REDACTWALL_SECRET | select(type == "string" and length >= 32 and length <= 4096 and (test("[\\u0000-\\u001f\\u007f]") | not))')
            recovery_data_key=$(printf '%s' "$recovery_secret" | jq -er '.REDACTWALL_DATA_KEY | select(type == "string" and length >= 32 and length <= 4096 and (test("[\\u0000-\\u001f\\u007f]") | not))')
            recovery_env=$(mktemp /run/redactwall-recovery-env.XXXXXX)
            chmod 600 "$recovery_env"
            {
              printf 'NODE_ENV=production\n'
              printf 'REDACTWALL_DB_PATH=/data/redactwall.db\n'
              printf 'REDACTWALL_SECRET=%s\n' "$recovery_secret_value"
              printf 'REDACTWALL_DATA_KEY=%s\n' "$recovery_data_key"
              printf 'REDACTWALL_TENANT_ID=%s\n' '${TenantId}'
              printf 'REDACTWALL_CONNECTED_DEPLOYMENT_ID=%s\n' '${DeploymentId}'
            } > "$recovery_env"
            registry=$(printf '%s' '${ImageUri}' | cut -d/ -f1)
            aws ecr get-login-password --region '${AWS::Region}' | docker login --username AWS --password-stdin "$registry" >/dev/null
            docker pull '${ImageUri}' >/dev/null
            recovery_docker() {
              docker run --rm --network none --read-only --tmpfs /tmp:rw,noexec,nosuid,size=64m \
                --cap-drop ALL --security-opt no-new-privileges --env-file "$recovery_env" \
                -v /var/lib/redactwall/runtime:/data -v "$recovery_root:/recovery:ro" \
                --entrypoint node '${ImageUri}' "$@"
            }
            recovery_docker scripts/backup-store.js verify \
              --file "/recovery/$RECOVERY_BACKUP_NAME" --manifest "/recovery/$RECOVERY_MANIFEST_NAME" >/dev/null
            recovery_docker scripts/backup-store.js restore \
              --file "/recovery/$RECOVERY_BACKUP_NAME" --manifest "/recovery/$RECOVERY_MANIFEST_NAME" \
              --to /data/redactwall.db --force >/dev/null
            recovery_docker -e 'const db=require("./server/db");const result=db.verifyAuditChain();db._db.close();process.exit(result.ok?0:1)' >/dev/null
            rm -f "$recovery_env"
            unset recovery_secret recovery_secret_value recovery_data_key
          fi

          install -d -m 700 -o root -g root /etc/redactwall
          install -d -m 700 /etc/cfn/hooks.d

          cat > /etc/cfn/cfn-hup.conf <<EOF
          [main]
          stack=${AWS::StackName}
          region=${AWS::Region}
          interval=1
          umask=077
          EOF
          chmod 600 /etc/cfn/cfn-hup.conf

          cat > /etc/cfn/hooks.d/redactwall-reloader.conf <<EOF
          [redactwall-metadata-update]
          triggers=post.update
          path=Resources.AppInstance.Metadata.AWS::CloudFormation::Init
          action=/usr/local/sbin/redactwall-cfn-update
          runas=root
          EOF
          chmod 600 /etc/cfn/hooks.d/redactwall-reloader.conf

          cat > /etc/systemd/system/cfn-hup.service <<'EOF'
          [Unit]
          Description=Apply RedactWall CloudFormation metadata updates
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          ExecStart=/opt/aws/bin/cfn-hup
          Restart=always
          RestartSec=15

          [Install]
          WantedBy=multi-user.target
          EOF

          /opt/aws/bin/cfn-init -v --stack '${AWS::StackName}' --resource AppInstance --region '${AWS::Region}'
          systemctl daemon-reload
          systemctl enable --now cfn-hup.service

          /opt/aws/bin/cfn-signal --exit-code 0 '${DeploymentWaitHandle}'
          trap - EXIT

  CustomerDataVolumeAttachment:
    Type: AWS::EC2::VolumeAttachment
    Properties:
      Device: /dev/sdf
      InstanceId: !Ref AppInstance
      VolumeId: !Ref DataVolumeId

  DeploymentWaitHandle:
    Type: AWS::CloudFormation::WaitConditionHandle

  DeploymentWaitCondition:
    Type: AWS::CloudFormation::WaitCondition
    DependsOn:
      - CustomerDataVolumeAttachment
    Properties:
      Count: 1
      Handle: !Ref DeploymentWaitHandle
      Timeout: '1800'

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Subnets: !Ref PublicSubnetIds
      Tags:
        - Key: RedactWallTenant
          Value: !Ref TenantId

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    DependsOn:
      - DeploymentWaitCondition
    Properties:
      VpcId: !Ref VpcId
      Port: 4000
      Protocol: HTTP
      TargetType: instance
      HealthCheckEnabled: true
      HealthCheckPath: /readyz
      HealthCheckProtocol: HTTP
      Matcher:
        HttpCode: '200'
      Targets:
        - Id: !Ref AppInstance
          Port: 4000

  HttpRedirectListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: '443'
            StatusCode: HTTP_301

  HttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-Res-2021-06
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

Outputs:
  Url:
    Description: HTTPS customer console URL. Create a DNS alias to LoadBalancerDnsName before using it.
    Value: !Sub 'https://${PublicHostname}'
  LoadBalancerDnsName:
    Description: ALB DNS target for the customer PublicHostname alias record.
    Value: !GetAtt LoadBalancer.DNSName
  TargetGroupArn:
    Description: Target group used by the explicit outage-safe maintenance workflow.
    Value: !Ref TargetGroup
  LogGroupName:
    Description: CloudWatch Logs group used by the RedactWall container.
    Value: !Ref AppLogGroup
  TenantId:
    Description: Tenant id enforced by the stack.
    Value: !Ref TenantId
  DeploymentId:
    Description: Immutable vendor-issued connected deployment identity.
    Value: !Ref DeploymentId
  LicenseSecretVersionId:
    Description: Immutable Secrets Manager version selected for the running customer silo.
    Value: !Ref LicenseSecretVersionId
  InstanceId:
    Description: EC2 instance targeted by the synchronous SSM deployment command.
    Value: !Ref AppInstance
  DataVolumeId:
    Description: Retained encrypted EBS volume that owns the customer evidence store.
    Value: !Ref DataVolumeId
  DataStackName:
    Description: Companion CloudFormation stack that owns the retained data volume.
    Value: !Ref DataStackName
  SourceDataVolumeId:
    Description: Empty for a fresh volume, or the exact prior volume id for restored snapshot lineage.
    Value: !Ref SourceDataVolumeId
  InstanceAvailabilityZone:
    Description: Immutable availability zone shared by the instance subnet and retained data volume.
    Value: !Ref InstanceAvailabilityZone
  AmiId:
    Description: AMI frozen for this stack. Change only through the explicit maintenance replacement workflow.
    Value: !Ref AmiId
  InstanceType:
    Description: Instance type frozen for the ordinary deployment path.
    Value: !Ref InstanceType
  RootVolumeGb:
    Description: Root volume size frozen for the ordinary deployment path.
    Value: !Ref RootVolumeGb
  DesiredConfigSha256:
    Description: Independently computed digest of explicit runtime-rendering inputs.
    Value: !Ref DesiredConfigSha256
  DeploymentTemplateUrl:
    Description: Exact version-bound S3 template used to create or update this stack.
    Value: !Ref DeploymentTemplateUrl
  DeploymentTemplateSha256:
    Description: SHA-256 of the exact deployed template bytes.
    Value: !Ref DeploymentTemplateSha256
  DeploymentTemplateBytes:
    Description: Exact size of the deployed template bytes.
    Value: !Ref DeploymentTemplateBytes
  DeploymentProtocolSha256:
    Description: SHA-256 of the materialized host deployment protocol.
    Value: !Ref DeploymentProtocolSha256
