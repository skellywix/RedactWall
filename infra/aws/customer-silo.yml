AWSTemplateFormatVersion: '2010-09-09'
Description: PromptWall customer-silo SaaS stack using ALB, EC2, Docker, Secrets Manager, and local EBS-backed SQLite storage.

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC for the public load balancer and PromptWall host.
  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: At least two public subnets for the internet-facing load balancer.
  InstanceSubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet for the PromptWall host. It must have outbound internet access to pull the image.
  ImageUri:
    Type: String
    MinLength: 1
    Description: Full ECR image URI, including tag.
  SecretArn:
    Type: String
    MinLength: 1
    Description: Secrets Manager secret ARN with ADMIN_PASSWORD, ADMIN_TOTP_SECRET, SENTINEL_SECRET, SENTINEL_DATA_KEY, and INGEST_API_KEY.
  TenantId:
    Type: String
    AllowedPattern: '^[a-z0-9][a-z0-9_-]{1,62}$'
    Description: Lowercase customer tenant slug, for example cu-acme.
  SeatLimit:
    Type: Number
    MinValue: 1
    Description: Purchased seats for this customer.
  CertificateArn:
    Type: String
    Default: ''
    Description: Optional ACM certificate ARN. When present, HTTP redirects to HTTPS.
  InstanceType:
    Type: String
    Default: t3.small
    AllowedValues:
      - t3.small
      - t3.medium
      - t3.large
      - m7i.large
    Description: EC2 size for the customer-silo control plane.
  RootVolumeGb:
    Type: Number
    Default: 40
    MinValue: 20
    MaxValue: 500
    Description: Encrypted root EBS volume size. SQLite state lives under /var/lib/promptwall.
  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: Amazon Linux 2023 AMI SSM parameter.

Conditions:
  HasCertificate: !Not [!Equals [!Ref CertificateArn, '']]
  NoCertificate: !Equals [!Ref CertificateArn, '']

Resources:
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: PromptWall ALB ingress
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - !If
          - HasCertificate
          - IpProtocol: tcp
            FromPort: 443
            ToPort: 443
            CidrIp: 0.0.0.0/0
          - !Ref AWS::NoValue
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: PromptWall app host ingress from ALB only
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 4000
          ToPort: 4000
          SourceSecurityGroupId: !Ref AlbSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  AppLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /promptwall/${TenantId}
      RetentionInDays: 90

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
      Policies:
        - PolicyName: PromptWallRuntimeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref SecretArn
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                Resource: !Sub ${AppLogGroup.Arn}:*

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  AppInstance:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal:
        Timeout: PT20M
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref InstanceProfile
      SubnetId: !Ref InstanceSubnetId
      SecurityGroupIds:
        - !Ref AppSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: !Ref RootVolumeGb
            VolumeType: gp3
            Encrypted: true
            DeleteOnTermination: false
      Tags:
        - Key: Name
          Value: !Sub promptwall-${TenantId}
        - Key: PromptWallTenant
          Value: !Ref TenantId
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euo pipefail

          dnf update -y
          dnf install -y docker awscli jq aws-cfn-bootstrap
          systemctl enable --now docker

          mkdir -p /var/lib/promptwall /etc/promptwall
          chmod 700 /etc/promptwall
          chown 1000:1000 /var/lib/promptwall

          SECRET_JSON=$(aws secretsmanager get-secret-value --secret-id '${SecretArn}' --region '${AWS::Region}' --query SecretString --output text)
          secret() { echo "$SECRET_JSON" | jq -r --arg key "$1" '.[$key] // empty'; }

          ADMIN_PASSWORD=$(secret ADMIN_PASSWORD)
          ADMIN_TOTP_SECRET=$(secret ADMIN_TOTP_SECRET)
          SENTINEL_SECRET=$(secret SENTINEL_SECRET)
          SENTINEL_DATA_KEY=$(secret SENTINEL_DATA_KEY)
          INGEST_API_KEY=$(secret INGEST_API_KEY)
          AUDITOR_USER=$(secret AUDITOR_USER)
          AUDITOR_PASSWORD=$(secret AUDITOR_PASSWORD)
          SIEM_WEBHOOK_URL=$(secret SIEM_WEBHOOK_URL)
          SIEM_WEBHOOK_TOKEN=$(secret SIEM_WEBHOOK_TOKEN)

          cat > /etc/promptwall/env <<EOF
          PORT=4000
          NODE_ENV=production
          HTTPS=true
          COOKIE_SECURE=true
          SENTINEL_DB_PATH=/data/sentinel.db
          SENTINEL_POLICY_PATH=/data/policy.json
          SENTINEL_CUSTOM_DETECTORS_PATH=/data/custom-detectors.json
          SENTINEL_SAAS_MODE=true
          SENTINEL_TENANT_ID=${TenantId}
          SENTINEL_SEAT_LIMIT=${SeatLimit}
          SENTINEL_REQUIRE_TENANT_CONTEXT=true
          SENTINEL_REQUIRE_USER_IDENTITY=true
          ADMIN_USER=admin
          ADMIN_PASSWORD=$ADMIN_PASSWORD
          ADMIN_TOTP_SECRET=$ADMIN_TOTP_SECRET
          AUDITOR_USER=$AUDITOR_USER
          AUDITOR_PASSWORD=$AUDITOR_PASSWORD
          SENTINEL_SECRET=$SENTINEL_SECRET
          SENTINEL_DATA_KEY=$SENTINEL_DATA_KEY
          INGEST_API_KEY=$INGEST_API_KEY
          SENTINEL_REQUEST_TIMEOUT_MS=10000
          SIEM_WEBHOOK_URL=$SIEM_WEBHOOK_URL
          SIEM_WEBHOOK_TOKEN=$SIEM_WEBHOOK_TOKEN
          SIEM_ALERT_MIN_RISK=25
          SIEM_ALERT_MIN_SEVERITY=3
          EOF
          chmod 600 /etc/promptwall/env

          REGISTRY=$(echo '${ImageUri}' | cut -d/ -f1)
          aws ecr get-login-password --region '${AWS::Region}' | docker login --username AWS --password-stdin "$REGISTRY"
          docker pull '${ImageUri}'
          docker rm -f promptwall || true
          docker run -d \
            --name promptwall \
            --restart unless-stopped \
            --init \
            --read-only \
            --tmpfs /tmp:rw,noexec,nosuid,size=64m \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --stop-timeout 30 \
            --env-file /etc/promptwall/env \
            -p 4000:4000 \
            -v /var/lib/promptwall:/data \
            --log-driver=awslogs \
            --log-opt awslogs-region='${AWS::Region}' \
            --log-opt awslogs-group='${AppLogGroup}' \
            --log-opt awslogs-stream='${TenantId}' \
            '${ImageUri}'

          mkdir -p /var/log/promptwall
          docker cp promptwall:/app/scripts/run-evidence-pack.sh /usr/local/bin/promptwall-run-evidence-pack
          chmod 755 /usr/local/bin/promptwall-run-evidence-pack

          if [ ! -f /var/lib/promptwall/evidence-schedule.json ]; then
            docker cp promptwall:/app/config/evidence-schedule.example.json /var/lib/promptwall/evidence-schedule.json
            jq '.outDir = "/data/evidence-packs" | .generatedBy = "aws-systemd-evidence-export"' \
              /var/lib/promptwall/evidence-schedule.json > /tmp/promptwall-evidence-schedule.json
            mv /tmp/promptwall-evidence-schedule.json /var/lib/promptwall/evidence-schedule.json
            chown 1000:1000 /var/lib/promptwall/evidence-schedule.json
            chmod 600 /var/lib/promptwall/evidence-schedule.json
          fi

          cat > /etc/promptwall/evidence-pack.env <<'EOF'
          PROMPTWALL_EVIDENCE_MODE='docker'
          PROMPTWALL_EVIDENCE_PROJECT_DIR='/app'
          PROMPTWALL_EVIDENCE_CONFIG='/data/evidence-schedule.json'
          PROMPTWALL_EVIDENCE_LOG='/var/log/promptwall/evidence-pack.log'
          PROMPTWALL_EVIDENCE_CONTAINER='promptwall'
          EOF
          chmod 600 /etc/promptwall/evidence-pack.env

          cat > /etc/systemd/system/promptwall-evidence-pack.service <<'EOF'
          [Unit]
          Description=Generate sanitized PromptWall examiner evidence pack
          After=network-online.target docker.service
          Wants=network-online.target

          [Service]
          Type=oneshot
          EnvironmentFile=/etc/promptwall/evidence-pack.env
          ExecStart=/usr/local/bin/promptwall-run-evidence-pack
          User=root
          Group=root
          Nice=5
          EOF

          cat > /etc/systemd/system/promptwall-evidence-pack.timer <<'EOF'
          [Unit]
          Description=Run sanitized PromptWall examiner evidence pack on schedule

          [Timer]
          OnCalendar=quarterly
          Persistent=true
          RandomizedDelaySec=1h
          Unit=promptwall-evidence-pack.service

          [Install]
          WantedBy=timers.target
          EOF

          systemctl daemon-reload
          systemctl enable --now promptwall-evidence-pack.timer

          /opt/aws/bin/cfn-signal --stack '${AWS::StackName}' --resource AppInstance --region '${AWS::Region}' --exit-code 0

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Subnets: !Ref PublicSubnetIds
      Tags:
        - Key: PromptWallTenant
          Value: !Ref TenantId

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !Ref VpcId
      Port: 4000
      Protocol: HTTP
      TargetType: instance
      HealthCheckEnabled: true
      HealthCheckPath: /readyz
      HealthCheckProtocol: HTTP
      Matcher:
        HttpCode: '200'
      Targets:
        - Id: !Ref AppInstance
          Port: 4000

  HttpForwardListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: NoCertificate
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  HttpRedirectListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasCertificate
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: '443'
            StatusCode: HTTP_301

  HttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasCertificate
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

Outputs:
  Url:
    Description: Customer console URL. Attach a Route 53 alias and ACM certificate for production.
    Value: !Sub
      - '${Scheme}://${DnsName}'
      - Scheme: !If [HasCertificate, https, http]
        DnsName: !GetAtt LoadBalancer.DNSName
  TenantId:
    Description: Tenant id enforced by the stack.
    Value: !Ref TenantId
  SeatLimit:
    Description: Paid seats enforced by the application.
    Value: !Ref SeatLimit
