<!DOCTYPE html>
<html><head><meta charset="utf-8"/>
<style>
  body{width:300px;margin:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:#15233a}
  .hd{display:flex;align-items:center;gap:9px;padding:14px 16px;border-bottom:1px solid #eef1f6}
  .logo{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,#3b82f6,#22d3ee);
    display:flex;align-items:center;justify-content:center;font-weight:800;color:#06101f;font-size:11px}
  .hd b{font-size:14px}
  .body{padding:14px 16px}
  .row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .muted{color:#7a879c;font-size:12px}
  .mode{font-weight:600;text-transform:capitalize}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
  .on{background:#22c55e}.off{background:#ef4444}
  .switch{position:relative;width:42px;height:24px}
  .switch input{display:none}
  .slider{position:absolute;inset:0;background:#cbd5e1;border-radius:24px;cursor:pointer;transition:.15s}
  .slider:before{content:"";position:absolute;height:18px;width:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.15s}
  input:checked + .slider{background:#22c55e}
  input:checked + .slider:before{transform:translateX(18px)}
  .stat{background:#f5f8fc;border-radius:9px;padding:10px 12px;font-size:12px;color:#41506a;margin-top:8px}
  a{color:#2563eb;text-decoration:none;font-size:12px}
  .foot{padding:10px 16px;border-top:1px solid #eef1f6;display:flex;justify-content:space-between;align-items:center}
</style></head>
<body>
  <div class="hd"><div class="logo">PS</div><b>PromptWall</b></div>
  <div class="body">
    <div class="row">
      <div><span class="dot on" id="dot"></span><span id="state">Protecting this browser</span></div>
      <label class="switch"><input type="checkbox" id="toggle" checked><span class="slider"></span></label>
    </div>
    <div class="muted">Scans prompts before they reach ChatGPT, Claude, Copilot &amp; Gemini.</div>
    <div class="stat">
      Enforcement mode: <span class="mode" id="mode">block</span><br/>
      <span class="muted">Set by your Security Admin</span>
    </div>
  </div>
  <div class="foot">
    <a id="dash" href="#" target="_blank">Open admin dashboard ↗</a>
    <span class="muted" id="ver">v0.2</span>
  </div>
<script src="popup.js"></script>
</body></html>
