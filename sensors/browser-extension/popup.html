<!DOCTYPE html>
<html><head><meta charset="utf-8"/>
<style>
  :root{--panel:#fff;--panel2:#f7f9fd;--txt:#1d1d1f;--mut:#6e7380;--line:rgba(63,88,128,.18);--blue:#0a84ff;--green:#30a15a;--red:#b4232a;--amber:#ff9f0a;--shadow:0 18px 48px rgba(56,76,110,.16)}
  body{width:312px;margin:0;font-family:Inter,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--txt);background:linear-gradient(180deg,#fbfcff 0,#f3f6fb 100%)}
  .hd{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.82)}
  .logo{width:30px;height:30px;border-radius:50%;border:1px solid rgba(10,132,255,.38);background:linear-gradient(180deg,rgba(10,132,255,.22),rgba(10,132,255,.08));
    display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--blue);font-size:11px;box-shadow:inset 0 0 0 6px rgba(10,132,255,.055)}
  .hd b{font-size:14px}
  .body{padding:14px 16px}
  .row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .muted{color:var(--mut);font-size:12px}
  .mode{font-weight:600;text-transform:capitalize}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
  .on{background:var(--green)}.off{background:var(--red)}
  .switch{position:relative;width:42px;height:24px}
  .switch input{display:none}
  .slider{position:absolute;inset:0;background:#cbd5e1;border-radius:24px;cursor:pointer;transition:.15s;box-shadow:inset 0 0 0 1px rgba(63,88,128,.14)}
  .slider:before{content:"";position:absolute;height:18px;width:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.15s}
  input:checked + .slider{background:var(--green)}
  input:checked + .slider:before{transform:translateX(18px)}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px 12px;font-size:12px;color:#3a3a3c;margin-top:10px;box-shadow:var(--shadow)}
  a{color:var(--blue);text-decoration:none;font-size:12px;font-weight:700}
  .foot{padding:10px 16px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.82)}
  @media(prefers-reduced-motion:reduce){
    .slider,.slider:before{transition:none}
  }
</style></head>
<body>
  <div class="hd"><div class="logo">PW</div><b>PromptWall</b></div>
  <div class="body">
    <div class="row">
      <div><span class="dot on" id="dot"></span><span id="state">Protecting this browser</span></div>
      <label class="switch"><input type="checkbox" id="toggle" checked><span class="slider"></span></label>
    </div>
    <div class="muted">Scans prompts before they reach ChatGPT, Claude, Copilot &amp; Gemini.</div>
    <div class="stat">
      Enforcement mode: <span class="mode" id="mode">block</span><br/>
      <span class="muted">Set by your Security Admin</span>
    </div>
    <div class="stat" id="fleet" hidden>
      <b>Other sensors for your account</b>
      <div class="muted" id="fleetLines"></div>
    </div>
  </div>
  <div class="foot">
    <a id="dash" href="#" target="_blank">Open admin dashboard ↗</a>
    <span class="muted" id="ver">v0.2</span>
  </div>
<script src="lib/browser-api.js"></script>
<script src="popup.js"></script>
</body></html>
