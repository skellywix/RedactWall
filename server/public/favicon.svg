<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3f9fff"/>
      <stop offset="1" stop-color="#0a72e8"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- RedactWall: a wall of redaction bars. Solid bars are "blacked-out" text,
       faint bars are text left in the clear, staggered like courses of brick. -->
  <g fill="#fff">
    <rect x="13" y="16" width="26" height="7" rx="3.5"/>
    <rect x="43" y="16" width="8" height="7" rx="3.5" opacity=".5"/>
    <rect x="13" y="28.5" width="13" height="7" rx="3.5" opacity=".5"/>
    <rect x="30" y="28.5" width="21" height="7" rx="3.5"/>
    <rect x="13" y="41" width="29" height="7" rx="3.5"/>
    <rect x="46" y="41" width="5" height="7" rx="2.5" opacity=".5"/>
  </g>
</svg>
