<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PromptWall - Sign in</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<style>
  :root{
    color-scheme:light;
    --bg:#f5f7fb;
    --panel:#ffffff;
    --panel2:#f7f9fd;
    --line:rgba(63,88,128,.18);
    --line2:rgba(63,88,128,.32);
    --txt:#1d1d1f;
    --mut:#6e7380;
    --soft:#3a3a3c;
    --blue:#0a84ff;
    --green:#30a15a;
    --red:#b4232a;
    --amber:#ff9f0a;
    --shadow:0 24px 70px rgba(56,76,110,.16);
    --glow:rgba(10,132,255,.14);
  }
  @media(prefers-color-scheme:dark){
    :root{
      color-scheme:dark;
      --bg:#101114;
      --panel:#191b20;
      --panel2:#202631;
      --line:rgba(141,154,180,.2);
      --line2:rgba(141,154,180,.36);
      --txt:#f5f5f7;
      --mut:#a6adbb;
      --soft:#d7dbe4;
      --blue:#63b3ff;
      --green:#70d389;
      --red:#ff686f;
      --amber:#ffb340;
      --shadow:0 24px 70px rgba(0,0,0,.44);
      --glow:rgba(99,179,255,.14);
    }
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    min-height:100vh;
    display:grid;
    place-items:center;
    padding:24px;
    background:linear-gradient(180deg,#fbfcff 0,#f3f6fb 54%,#e9eef6 100%);
    color:var(--txt);
    font-family:Inter,Aptos,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    letter-spacing:0;
    line-height:1.45;
  }
  @media(prefers-color-scheme:dark){
    body{background:linear-gradient(180deg,#181a20 0,#101114 58%,#0b0c0f 100%)}
  }
  body:before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background:linear-gradient(180deg,rgba(255,255,255,.72),transparent 34%);
    opacity:.62;
  }
  @media(prefers-color-scheme:dark){
    body:before{background:linear-gradient(180deg,rgba(255,255,255,.05),transparent 28%);opacity:.78}
  }
  .login-shell{
    position:relative;
    width:min(100%,920px);
    min-height:560px;
    display:grid;
    grid-template-columns:minmax(0,1fr) 410px;
    border:1px solid var(--line);
    border-radius:8px;
    overflow:hidden;
    background:var(--panel);
    box-shadow:var(--shadow);
  }
  .brand-panel{
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    padding:34px;
    border-right:1px solid var(--line);
    background:
      linear-gradient(135deg,rgba(10,132,255,.12),rgba(48,159,88,.08) 48%,transparent),
      rgba(255,255,255,.78);
  }
  @media(prefers-color-scheme:dark){
    .brand-panel{
      background:
        linear-gradient(135deg,rgba(99,179,255,.14),rgba(112,211,137,.08) 52%,transparent),
        rgba(24,26,32,.88);
    }
  }
  .brand{display:flex;align-items:center;gap:12px}
  .logo{
    width:38px;
    height:38px;
    border:1px solid rgba(10,132,255,.35);
    border-radius:10px;
    display:grid;
    place-items:center;
    background:linear-gradient(180deg,#3f9fff,#0a72e8);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.25),0 1px 3px rgba(9,30,66,.2);
  }
  .logo svg{width:22px;height:22px;display:block}
  h1{margin:0;font-size:22px;line-height:1.08}
  .brand p{margin:4px 0 0;color:var(--mut);font-size:12px}
  .statement{max-width:420px}
  .statement h2{margin:0;font-size:34px;line-height:1.02;font-weight:800}
  .statement p{margin:14px 0 0;color:var(--mut);line-height:1.55}
  .checks{display:grid;gap:10px;color:var(--soft);font-size:13px}
  .check{display:flex;align-items:center;gap:9px}
  .check i{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px rgba(67,227,138,.12)}
  form{
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:42px 36px;
    background:var(--panel);
  }
  form h2{margin:0;font-size:24px}
  .sub{margin:7px 0 26px;color:var(--mut);font-size:13px}
  label{display:block;font-size:11px;color:var(--mut);margin:16px 0 7px;text-transform:uppercase;letter-spacing:.08em;font-weight:720}
  input{
    width:100%;
    min-height:44px;
    padding:11px 12px;
    border-radius:8px;
    border:1px solid var(--line);
    background:var(--panel2);
    color:var(--txt);
    font-size:14px;
  }
  input:focus{outline:2px solid var(--glow);outline-offset:1px;border-color:var(--blue);background:var(--panel)}
  button{
    width:100%;
    min-height:44px;
    margin-top:22px;
    border:1px solid transparent;
    border-radius:8px;
    background:linear-gradient(180deg,#2b91ff,#0a72e8);
    color:#fff;
    font-weight:700;
    font-size:14px;
    cursor:pointer;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.22),0 1px 3px rgba(9,30,66,.24);
  }
  button:hover{filter:brightness(1.06)}
  button:active{filter:brightness(.96)}
  button.secondary{
    margin-top:10px;
    border-color:var(--line2);
    background:var(--panel2);
    color:var(--txt);
  }
  button.secondary:hover{border-color:var(--blue);filter:none;background:rgba(10,132,255,.08)}
  button[hidden]{display:none}
  .hint[hidden]{display:none}
  .err{color:var(--red);font-size:13px;margin-top:14px;min-height:18px}
  .hint{margin-top:20px;font-size:12px;color:var(--mut);border-top:1px solid var(--line);padding-top:14px;line-height:1.5}
  code{background:var(--panel2);border:1px solid var(--line);padding:2px 6px;border-radius:6px;color:var(--blue)}
  @media(max-width:820px){
    body{display:block;padding:14px}
    .login-shell{grid-template-columns:1fr;min-height:0}
    .brand-panel{gap:34px;border-right:0;border-bottom:1px solid var(--line)}
    .statement h2{font-size:28px}
    form{padding:30px 24px}
  }
</style>
<link rel="stylesheet" href="/console-theme.css" />
</head>
<body class="login-page" data-theme="dark">
  <main class="login-shell">
    <section class="brand-panel" aria-label="PromptWall">
      <div class="brand">
        <div class="logo" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M12 3.2 19 6v5c0 4.3-2.7 6.9-7 8.3-4.3-1.4-7-4-7-8.3V6l7-2.8Z" stroke="#fff" stroke-width="1.6" stroke-linejoin="round"/><path d="M5.6 10h12.8M5.9 14h12.2M12 6v4m-3.2 4v3.4M15.2 14v3.4M8.8 10v4m6.4-4v4" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/></svg></div>
        <div>
          <h1>PromptWall</h1>
          <p>AI Prompt DLP Gateway</p>
        </div>
      </div>
      <div class="statement">
        <h2>Console access</h2>
        <p>Review held prompts, enforce AI-use policy, and export tamper-evident evidence.</p>
      </div>
      <div class="checks">
        <div class="check"><i aria-hidden="true"></i><span>Redacted review by default</span></div>
        <div class="check"><i aria-hidden="true"></i><span>Hash-chained audit history</span></div>
        <div class="check"><i aria-hidden="true"></i><span>Local-first detection posture</span></div>
      </div>
    </section>
    <form id="f">
      <h2>Sign in</h2>
      <div class="sub">Security and Audit Console</div>
      <label for="user">Username</label>
      <input id="user" autocomplete="username" value="admin" aria-describedby="err" />
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="Password" aria-describedby="err" />
      <label for="otp">Authenticator code</label>
      <input id="otp" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="Required for Security Admin MFA" aria-describedby="err" />
      <button type="submit">Continue</button>
      <button type="button" class="secondary" id="oidc" hidden>Continue with SSO</button>
      <div class="err" id="err" role="alert" aria-live="polite"></div>
      <div class="hint" id="demoHint" hidden>Local demo credential: <code>admin</code> / <code>ChangeMe!2026</code></div>
    </form>
  </main>
<script src="/login.js" defer></script>
</body>
</html>
