<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RedactWall - Sign in</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<link rel="stylesheet" href="/console-theme.css" />
<link rel="stylesheet" href="/auth-surface.css" />
</head>
<body class="auth-page login-page" data-theme="dark">
  <main class="auth-shell login-shell">
    <header class="auth-brand">
      <div class="auth-logo" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><g fill="currentColor"><rect x="4.5" y="5.5" width="10" height="3" rx="1.5"/><rect x="16" y="5.5" width="3.5" height="3" rx="1.5" opacity=".5"/><rect x="4.5" y="10.5" width="5" height="3" rx="1.5" opacity=".5"/><rect x="11" y="10.5" width="8.5" height="3" rx="1.5"/><rect x="4.5" y="15.5" width="11" height="3" rx="1.5"/><rect x="17" y="15.5" width="2.5" height="3" rx="1.25" opacity=".5"/></g></svg></div>
      <div>
        <h1>RedactWall</h1>
        <p>Texas FCU AI DLP</p>
      </div>
    </header>
    <section class="auth-intro" aria-labelledby="signInTitle">
      <span class="auth-eyebrow">Security console</span>
      <h2 id="signInTitle">Sign in</h2>
      <p>Review held prompts, enforce AI-use policy, and export tamper-evident evidence.</p>
    </section>
    <form class="auth-form" id="f">
      <label for="user">Username</label>
      <input id="user" autocomplete="username" value="admin" aria-describedby="err" />
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="Password" aria-describedby="err" />
      <label for="otp">Authenticator or recovery code</label>
      <input id="otp" autocomplete="one-time-code" maxlength="11" placeholder="6-digit code or recovery code" aria-describedby="err" />
      <button class="auth-button" id="submit" type="submit">Continue</button>
      <button class="auth-button secondary" type="button" id="oidc" hidden>Continue with SSO</button>
      <div class="auth-error" id="err" role="alert" aria-live="polite"></div>
      <div class="auth-hint" id="demoHint" hidden>Local demo credential: <code>admin</code> / <code>ChangeMe!2026</code></div>
    </form>
    <footer class="auth-assurance" aria-label="Security posture">
      <span>Redacted review</span>
      <span>Hash-chained audit</span>
      <span>Local-first detection</span>
    </footer>
  </main>
<script src="/auth-response.js" defer></script>
<script src="/login.js" defer></script>
</body>
</html>
